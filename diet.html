<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>식단 기록</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
body { font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','맑은 고딕',sans-serif; background:#f0f4f8; color:#222; padding-bottom:80px; }
.wrap { max-width:500px; margin:0 auto; padding:12px; }
.header { background:linear-gradient(135deg,#1a6b3c,#27ae60); color:#fff; border-radius:16px; padding:16px 18px; margin-bottom:12px; }
.header h1 { font-size:19px; }
.header .sub { font-size:11px; opacity:.8; margin-top:2px; }
.nav-link { font-size:12px; color:#fff; opacity:.85; text-decoration:underline; display:inline-block; margin-top:5px; }
.tabs { display:flex; gap:5px; margin-bottom:12px; }
.tab { flex:1; padding:10px; border-radius:10px; border:1.5px solid #c8d6c8; background:#fff; font-size:13px; font-weight:700; color:#666; cursor:pointer; text-align:center; }
.tab.active { background:#27ae60; border-color:#27ae60; color:#fff; }
.card { background:#fff; border-radius:14px; padding:15px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,.06); }
.card h2 { font-size:14px; font-weight:700; color:#1a6b3c; margin-bottom:12px; }
/* 목표 링 */
.goal-row { display:flex; align-items:center; gap:14px; margin-bottom:10px; }
.ring-wrap { position:relative; width:80px; height:80px; flex-shrink:0; }
.ring-wrap svg { transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:#e8f5e9; stroke-width:8; }
.ring-fill { fill:none; stroke:#27ae60; stroke-width:8; stroke-linecap:round; transition:stroke-dashoffset .5s; }
.ring-fill.over { stroke:#e74c3c; }
.ring-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-kcal { font-size:17px; font-weight:800; color:#1a6b3c; line-height:1; }
.ring-unit { font-size:9px; color:#888; }
.goal-info { flex:1; }
.goal-remain { font-size:18px; font-weight:700; color:#1a6b3c; }
.goal-remain.over { color:#e74c3c; }
.goal-bar-wrap { background:#e8f5e9; border-radius:99px; height:7px; overflow:hidden; margin:6px 0 3px; }
.goal-bar { height:100%; background:#27ae60; border-radius:99px; transition:width .4s; }
.goal-bar.over { background:#e74c3c; }
.goal-target-txt { font-size:11px; color:#999; }
/* 체중 인풋 */
.weight-row { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
.weight-row input { flex:1; padding:9px 12px; border:1.5px solid #c8d0d8; border-radius:9px; font-size:15px; text-align:center; font-family:inherit; }
.weight-row .unit { font-size:14px; color:#888; }
.btn-green { border:none; background:#27ae60; color:#fff; border-radius:9px; padding:10px 16px; font-size:13px; font-weight:700; cursor:pointer; }
.btn-gray { border:none; background:#e0e6ea; color:#555; border-radius:9px; padding:10px 14px; font-size:13px; font-weight:700; cursor:pointer; }
/* 날짜 */
.date-row { display:flex; gap:6px; align-items:center; margin-bottom:10px; }
.date-row input[type=date] { flex:1; padding:9px 11px; border:1.5px solid #c8d0d8; border-radius:9px; font-size:13px; font-family:inherit; }
/* 음식 입력 */
.food-input { width:100%; padding:11px 13px; border:1.5px solid #c8d0d8; border-radius:10px; font-size:14px; font-family:inherit; resize:none; min-height:65px; }
.food-input:focus { outline:none; border-color:#27ae60; }
.hint { font-size:11px; color:#aaa; margin:4px 0 9px; }
.analyze-btn { width:100%; padding:13px; border:none; background:#27ae60; color:#fff; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; }
.analyze-btn:disabled { background:#b2dfdb; cursor:not-allowed; }
.spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes sp { to { transform:rotate(360deg); } }
/* 키 설정 */
.key-row { display:flex; gap:6px; align-items:center; margin-bottom:10px; font-size:12px; color:#666; }
.key-row input { flex:1; padding:7px 9px; border:1px solid #ccd; border-radius:7px; font-size:12px; font-family:monospace; }
.key-row button { border:none; background:#1a6b3c; color:#fff; border-radius:7px; padding:7px 10px; font-size:12px; cursor:pointer; }
.key-ok { color:#1e7e44; font-size:11px; }
.key-no { color:#c0392b; font-size:11px; }
/* 기록 목록 */
.rec-item { display:flex; align-items:flex-start; gap:8px; padding:9px 0; border-bottom:1px solid #f0f0f0; }
.rec-item:last-child { border-bottom:none; }
.rec-time { font-size:11px; color:#aaa; flex-shrink:0; padding-top:2px; min-width:34px; }
.rec-body { flex:1; min-width:0; }
.rec-food { font-size:13px; color:#333; word-break:break-word; }
.rec-kcal { font-size:15px; font-weight:800; color:#1a6b3c; }
.rec-detail { font-size:10px; color:#aaa; margin-top:1px; }
.rec-del { border:none; background:transparent; color:#ddd; font-size:15px; cursor:pointer; padding:2px; flex-shrink:0; }
.rec-del:hover { color:#e74c3c; }
.empty-msg { text-align:center; color:#bbb; font-size:13px; padding:20px 0; }
/* 목표 설정 */
.setting-row { display:flex; gap:6px; align-items:center; font-size:12px; color:#666; margin-top:8px; padding-top:8px; border-top:1px dashed #eee; }
.setting-row input[type=number] { width:72px; padding:6px 8px; border:1px solid #ccd; border-radius:7px; font-size:13px; }
.setting-row button { border:none; background:#e8f5e9; color:#1a6b3c; border-radius:7px; padding:6px 10px; font-size:12px; font-weight:700; cursor:pointer; }
/* 그래프 */
.chart-wrap { position:relative; height:200px; margin-bottom:6px; }
.chart-period { display:flex; gap:5px; margin-bottom:10px; }
.chart-period button { flex:1; padding:7px; border-radius:7px; border:1.5px solid #c8d6c8; background:#fff; font-size:12px; font-weight:700; color:#666; cursor:pointer; }
.chart-period button.active { background:#27ae60; border-color:#27ae60; color:#fff; }
/* 달성률 */
.achieve-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.achieve-card { background:#f7fdf8; border:1px solid #c8e6c9; border-radius:10px; padding:12px; text-align:center; }
.achieve-card .ac-label { font-size:11px; color:#888; margin-bottom:4px; }
.achieve-card .ac-val { font-size:22px; font-weight:800; color:#1a6b3c; }
.achieve-card .ac-val.warn { color:#e67e22; }
.achieve-card .ac-val.bad { color:#e74c3c; }
.achieve-card .ac-sub { font-size:11px; color:#aaa; margin-top:2px; }
.week-list { margin-top:12px; }
.week-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid #f0f0f0; font-size:13px; }
.week-row:last-child { border-bottom:none; }
.week-label { color:#555; }
.week-bar-wrap { flex:1; margin:0 10px; background:#e8f5e9; border-radius:99px; height:6px; overflow:hidden; }
.week-bar { height:100%; background:#27ae60; border-radius:99px; }
.week-bar.over { background:#e74c3c; }
.week-pct { font-size:12px; font-weight:700; color:#1a6b3c; min-width:36px; text-align:right; }
.week-pct.over { color:#e74c3c; }
/* 토스트 */
.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(30,40,50,.92); color:#fff; padding:10px 18px; border-radius:20px; font-size:13px; z-index:999; opacity:0; transition:opacity .2s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🥗 식단 기록</h1>
    <div class="sub">제미나이 칼로리 분석 · 체중·섭취 그래프 · <span id="dietVer" style="opacity:.7;"></span></div>
    <a class="nav-link" href="index.html">← 분석 스케줄로</a>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-today" onclick="setTab('today')">🍽 오늘</div>
    <div class="tab" id="tab-graph" onclick="setTab('graph')">📊 그래프</div>
    <div class="tab" id="tab-achieve" onclick="setTab('achieve')">🎯 달성률</div>
  </div>
  <div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var APP_VERSION = 'v2.8';
document.addEventListener('DOMContentLoaded', function(){
  var el = document.getElementById('dietVer');
  if(el) el.textContent = APP_VERSION;
});
var GOAL_KEY = 'diet_goal_kcal';
var GEMINI_KEY_NAME = 'geminiApiKey';
var GEMINI_MODEL = 'gemini-2.5-flash';
var GH_OWNER='SHIN-3889', GH_REPO='lab-daily', GH_BRANCH='main', GH_FILE='diet_data.json';
var GH_TOKEN_KEY='ncc_gh_token';

// ── 상태 ──
var CUR_TAB = 'today';
var SEL_DATE = todayStr();
var CHART_PERIOD = '2w'; // '2w' | '1m' | '3m'
// DATA 구조: { records:{...}, weights:{...}, startWeight:null, cafeteria:{...}, profile:{sex,age,height,activity} }
var DATA = { records:{}, weights:{}, startWeight:null, cafeteria:{}, profile:null };
var SHA = null;
var _syncTimer=null, _syncing=false;
var _charts = {};

function todayStr(){ return ymd(new Date()); }
function ymd(d){ var y=d.getFullYear(), m=('0'+(d.getMonth()+1)).slice(-2), dd=('0'+d.getDate()).slice(-2); return y+'-'+m+'-'+dd; }
function nowTime(){ return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',hour12:false}); }
function getGoal(){ return parseInt(localStorage.getItem(GOAL_KEY)||'1800'); }
function setGoal(v){ localStorage.setItem(GOAL_KEY,String(v)); }

// ── TDEE(하루 소비 칼로리) 계산 ──
var ACTIVITY_FACTORS = {
  sedentary:   {factor:1.2,  label:'거의 안 움직임 (사무직)'},
  light:       {factor:1.375,label:'가벼운 활동 (주 1~3회 운동)'},
  moderate:    {factor:1.55, label:'보통 활동 (주 3~5회 운동)'},
  active:      {factor:1.725,label:'활발한 활동 (주 6~7회 운동)'},
  veryactive:  {factor:1.9,  label:'매우 활발 (육체노동/2회운동)'}
};
// 특정 날짜의 체중 (없으면 가장 가까운 이전 기록, 그것도 없으면 시작체중)
function weightOn(date){
  if(dayWeight(date)) return dayWeight(date);
  var ws=Object.keys(DATA.weights||{}).filter(function(d){return d<=date;}).sort();
  if(ws.length) return DATA.weights[ws[ws.length-1]];
  return DATA.startWeight||null;
}
// Mifflin-St Jeor 공식으로 TDEE 계산 (해당 날짜 체중 기준)
function calcTDEE(date){
  var p=DATA.profile;
  if(!p||!p.height||!p.age||!p.sex) return null;
  var w=weightOn(date||todayStr());
  if(!w) return null;
  var bmr = 10*w + 6.25*p.height - 5*p.age + (p.sex==='male'?5:-161);
  var af = (ACTIVITY_FACTORS[p.activity]||ACTIVITY_FACTORS.sedentary).factor;
  return Math.round(bmr*af);
}
// 이론 감량: 기록 있는 모든 날의 (TDEE - 섭취) 누적 / 7700
function theoreticalLoss(){
  var p=DATA.profile;
  if(!p) return null;
  var dates=Object.keys(DATA.records||{}).sort();
  if(!dates.length) return null;
  var cumDeficit=0, series=[], validDays=0;
  dates.forEach(function(d){
    var tdee=calcTDEE(d);
    var intake=dayKcal(d);
    if(tdee && intake>0){
      cumDeficit += (tdee - intake);  // +면 적자(감량), -면 흑자(증량)
      validDays++;
    }
    series.push({date:d, cumKg: cumDeficit/7700, tdee:tdee, intake:intake});
  });
  return { totalKg: cumDeficit/7700, cumDeficit:cumDeficit, series:series, days:validDays };
}
function getProfile(){ return DATA.profile; }
function saveProfile(p){ DATA.profile=p; scheduleSync(); }
function openProfileEdit(){
  var p=DATA.profile||{sex:'male',age:'',height:'',activity:'sedentary'};
  var ov=document.createElement('div'); ov.id='profile-popup';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:5000;display:flex;align-items:center;justify-content:center;padding:16px;';
  var h='<div style="background:#fff;width:100%;max-width:380px;border-radius:16px;padding:20px 18px;max-height:88vh;overflow-y:auto;">';
  h+='<div style="font-size:17px;font-weight:800;color:#1a6b3c;margin-bottom:4px;">🔬 신체정보 입력</div>';
  h+='<div style="font-size:11px;color:#999;margin-bottom:16px;">하루 소비 칼로리(TDEE) 계산에 쓰여요. 참고용이에요.</div>';
  // 성별
  h+='<label style="font-size:12px;color:#666;font-weight:700;">성별</label>';
  h+='<div style="display:flex;gap:8px;margin:6px 0 14px;">';
  h+='<button type="button" id="pf-male" onclick="_pfSex(\'male\')" style="flex:1;padding:10px;border:1.5px solid '+(p.sex==='male'?'#27ae60':'#ddd')+';background:'+(p.sex==='male'?'#27ae60':'#fff')+';color:'+(p.sex==='male'?'#fff':'#666')+';border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">남성</button>';
  h+='<button type="button" id="pf-female" onclick="_pfSex(\'female\')" style="flex:1;padding:10px;border:1.5px solid '+(p.sex==='female'?'#27ae60':'#ddd')+';background:'+(p.sex==='female'?'#27ae60':'#fff')+';color:'+(p.sex==='female'?'#fff':'#666')+';border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;">여성</button>';
  h+='</div>';
  // 나이 + 키
  h+='<div style="display:flex;gap:10px;margin-bottom:14px;">';
  h+='<div style="flex:1;"><label style="font-size:12px;color:#666;font-weight:700;">나이</label>';
  h+='<input type="number" id="pf-age" value="'+(p.age||'')+'" placeholder="세" min="10" max="100" style="width:100%;padding:9px;border:1.5px solid #c8d0d8;border-radius:8px;font-size:14px;text-align:center;margin-top:6px;"></div>';
  h+='<div style="flex:1;"><label style="font-size:12px;color:#666;font-weight:700;">키(cm)</label>';
  h+='<input type="number" id="pf-height" value="'+(p.height||'')+'" placeholder="cm" min="120" max="220" style="width:100%;padding:9px;border:1.5px solid #c8d0d8;border-radius:8px;font-size:14px;text-align:center;margin-top:6px;"></div>';
  h+='</div>';
  // 활동량
  h+='<label style="font-size:12px;color:#666;font-weight:700;">활동량</label>';
  h+='<select id="pf-activity" style="width:100%;padding:10px;border:1.5px solid #c8d0d8;border-radius:8px;font-size:13px;margin:6px 0 6px;">';
  Object.keys(ACTIVITY_FACTORS).forEach(function(k){
    h+='<option value="'+k+'"'+(p.activity===k?' selected':'')+'>'+ACTIVITY_FACTORS[k].label+'</option>';
  });
  h+='</select>';
  h+='<div style="font-size:11px;color:#aaa;margin-bottom:16px;">교대근무·서서 일하는 직업이면 "보통 활동" 이상을 추천해요.</div>';
  // 체중 안내
  h+='<div style="font-size:11px;color:#888;background:#f7fdf8;padding:9px;border-radius:8px;margin-bottom:16px;">💡 체중은 "오늘" 탭에서 기록한 값을 자동으로 써요. 매일 체중을 기록하면 더 정확해져요.</div>';
  h+='<div style="display:flex;gap:8px;">';
  h+='<button onclick="closeProfilePopup()" style="flex:1;border:none;background:#eee;color:#666;border-radius:9px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;">취소</button>';
  h+='<button onclick="saveProfileFromPopup()" style="flex:2;border:none;background:#27ae60;color:#fff;border-radius:9px;padding:12px;font-size:14px;font-weight:800;cursor:pointer;">저장</button>';
  h+='</div></div>';
  ov.innerHTML=h;
  ov.onclick=function(e){ if(e.target===ov) closeProfilePopup(); };
  document.body.appendChild(ov);
  ov._sex=p.sex;
}
function _pfSex(s){
  var ov=document.getElementById('profile-popup'); if(ov) ov._sex=s;
  document.getElementById('pf-male').style.cssText='flex:1;padding:10px;border:1.5px solid '+(s==='male'?'#27ae60':'#ddd')+';background:'+(s==='male'?'#27ae60':'#fff')+';color:'+(s==='male'?'#fff':'#666')+';border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;';
  document.getElementById('pf-female').style.cssText='flex:1;padding:10px;border:1.5px solid '+(s==='female'?'#27ae60':'#ddd')+';background:'+(s==='female'?'#27ae60':'#fff')+';color:'+(s==='female'?'#fff':'#666')+';border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;';
}
function closeProfilePopup(){ var el=document.getElementById('profile-popup'); if(el) el.remove(); }
function saveProfileFromPopup(){
  var ov=document.getElementById('profile-popup');
  var sex=ov._sex||'male';
  var age=parseInt(document.getElementById('pf-age').value);
  var height=parseInt(document.getElementById('pf-height').value);
  var activity=document.getElementById('pf-activity').value;
  if(!age||age<10||age>100){ alert('나이를 정확히 입력하세요.'); return; }
  if(!height||height<120||height>220){ alert('키를 정확히 입력하세요 (cm).'); return; }
  saveProfile({sex:sex,age:age,height:height,activity:activity});
  closeProfilePopup();
  showToast('🔬 신체정보 저장됨');
  render();
}
function getGeminiKey(){ return localStorage.getItem(GEMINI_KEY_NAME)||''; }
function saveGeminiKey(k){ localStorage.setItem(GEMINI_KEY_NAME,k); }
function getGhToken(){ return localStorage.getItem(GH_TOKEN_KEY)||''; }
function setGhToken(v){ localStorage.setItem(GH_TOKEN_KEY, v); }
function clearGhToken(){ localStorage.removeItem(GH_TOKEN_KEY); }
function onSaveGhToken(){
  var inp=document.getElementById('ghTokenInput');
  var v=(inp&&inp.value||'').trim();
  if(!v){ showToast('토큰을 입력하세요'); return; }
  setGhToken(v); showToast('✓ GitHub 토큰 저장됨'); render();
}
function onClearGhToken(){
  if(!confirm('저장된 GitHub 토큰을 지울까요?')) return;
  clearGhToken(); showToast('토큰 삭제됨'); render();
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function dayRecs(d){ return (DATA.records||{})[d||SEL_DATE]||[]; }
function dayKcal(d){ return dayRecs(d).reduce(function(s,r){return s+(r.kcal||0);},0); }
function dayWeight(d){ return (DATA.weights||{})[d||SEL_DATE]||null; }

// ── GitHub ──
async function loadData(){
  var token=getGhToken();
  try {
    var data=null, sha=null;
    if(token){
      var r=await fetch('https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/'+GH_FILE+'?ref='+GH_BRANCH+'&t='+Date.now(),
        {headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}});
      if(r.ok){ var j=await r.json(); sha=j.sha; data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))); }
      else if(r.status!==404) console.warn('로드 실패',r.status);
    }
    if(!data){
      var r2=await fetch('https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+GH_FILE+'?t='+Date.now());
      if(r2.ok) data=await r2.json();
    }
    if(data){ DATA=Object.assign({records:{},weights:{},startWeight:null,cafeteria:{},profile:null},data); SHA=sha; }
  }catch(e){ console.warn('로드 오류',e); }
  render();
}
function scheduleSync(){
  if(_syncTimer) clearTimeout(_syncTimer);
  _syncTimer=setTimeout(syncNow,1000);
}
async function syncNow(){
  if(_syncTimer){clearTimeout(_syncTimer);_syncTimer=null;}
  var token=getGhToken();
  if(!token){showToast('⚠️ 토큰 없음');return;}
  if(_syncing)return; _syncing=true; showToast('☁️ 저장 중...');
  try {
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(DATA,null,2))));
    var body={message:'update '+GH_FILE,content:content,branch:GH_BRANCH};
    if(SHA) body.sha=SHA;

      {method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});

function portionToText(v){
  if(v===0) return '';
  if(typeof v==='string' && /pc$/.test(v)) return v.replace('pc','')+'조각';
  var f={0.25:'¼',0.33:'⅓',0.5:'½',0.67:'⅔',1:'',1.5:'1.5인분',2:'2인분'};
  return f[v]!=null?f[v]:v+'인분';
}
function portionToPrompt(name, v){
  if(typeof v==='string' && /pc$/.test(v)) return name+' '+v.replace('pc','')+'조각';
  return name+' '+v+'인분';
}
function portionMark(v){
  if(typeof v==='string' && /pc$/.test(v)) return v.replace('pc','')+'개';
  var f={0.25:'¼',0.33:'⅓',0.5:'½',0.67:'⅔',1.5:'1.5',2:'2'};

async function confirmCafeteriaMeal(){
  if(!_cafSel) return;
  var meal=_cafSel.meal;
  var eatenItems=_cafSel.items.filter(function(it){return it.portion!==0;});
  if(!eatenItems.length){ removeMealRecord(meal); closeCafeteriaPopup(); render(); return; }
  var foodParts=eatenItems.map(function(it){ var l=portionToText(it.portion); return it.name+(l?'('+l+')':''); });
  var foodText=foodParts.join(', ');
  var promptText=eatenItems.map(function(it){ return portionToPrompt(it.name, it.portion); }).join(', ');
  try{
    showCafeteriaStatus(meal+' 칼로리 계산 중…');
    var obj=await analyzeCafeteriaFood(promptText);
    removeMealRecord(meal);
    var portions={}; eatenItems.forEach(function(it){ portions[it.name]=it.portion; });
    addRecordWithPortions('회사밥('+meal+'): '+foodText, obj.kcal, obj.detail||'', portions);
    showCafeteriaStatus('');
    closeCafeteriaPopup();
    render();
  }catch(e){
    showCafeteriaStatus('');
    alert('칼로리 계산 실패: '+(e.message||e));
  }
}

function dateRange(days){
  var arr=[];
  for(var i=days-1;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i);
    arr.push(ymd(d));
  }
  return arr;
}
function weekOf(dateStr){
  // 그 날이 속한 주의 월요일 문자열 반환
  var d=new Date(dateStr+'T00:00:00');
  var day=d.getDay()||7;
  d.setDate(d.getDate()-day+1);
  return ymd(d);
}
function formatMD(dateStr){
  var p=dateStr.split('-'); return p[1]+'/'+p[2];
}

    h+='<input type="password" id="ghTokenInput" placeholder="github_pat_... (저장 동기화용)">';
    h+='<button onclick="onSaveGhToken()">저장</button>';
    h+='<span class="key-no">✖ 미등록</span></div>';

  h+='<div class="hint">양을 같이 적으면 더 정확해요. 없으면 1인분 기준으로 계산해요.</div>';

      h+='<div class="rec-kcal">'+r.kcal+'kcal</div>';

      h+='</div>';
      h+='<button class="rec-del" onclick="onDel(\''+esc(SEL_DATE)+'\',\''+r.id+'\')">🗑</button>';
      h+='</div>';

  h+='</div>';
  document.getElementById('app').innerHTML=h;
}

function setChartPeriod(p){ CHART_PERIOD=p; render(); }

function drawCharts(){
  var days={'2w':14,'1m':30,'3m':90}[CHART_PERIOD]||14;
  var dates=dateRange(days);
  var goal=getGoal();

  // 칼로리 차트
  var kcalData=dates.map(function(d){ return dayKcal(d)||null; });
  var kcalCtx=document.getElementById('kcalChart').getContext('2d');
  _charts.kcal=new Chart(kcalCtx,{
    type:'bar',
    data:{
      labels:dates.map(formatMD),
      datasets:[
        { label:'섭취 kcal', data:kcalData, backgroundColor:function(ctx){
            var v=ctx.raw; if(v===null)return 'rgba(200,220,200,.3)';
            return v>goal?'rgba(231,76,60,.6)':'rgba(39,174,96,.6)';
          }, borderRadius:4, borderSkipped:false },
        { label:'목표', data:dates.map(function(){ return goal; }), type:'line',
          borderColor:'rgba(39,174,96,.5)', borderWidth:1.5, borderDash:[4,3],
          pointRadius:0, fill:false }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label:function(ctx){ return ctx.raw!==null?(ctx.raw+'kcal'):'기록없음'; }
      }}},
      scales:{
        x:{ ticks:{font:{size:10}, maxRotation:45, minRotation:30}, grid:{display:false} },
        y:{ ticks:{font:{size:10}, callback:function(v){return v+'kcal';}},
            grid:{color:'rgba(0,0,0,.05)'} }
      }
    }
  });

  // 체중 차트
  var wData=dates.map(function(d){ return dayWeight(d)||null; });
  var wCtx=document.getElementById('weightChart').getContext('2d');
  var datasets=[{
    label:'체중(kg)', data:wData, borderColor:'#27ae60', backgroundColor:'rgba(39,174,96,.1)',
    pointRadius:4, pointHoverRadius:6, fill:true, tension:0.3, spanGaps:true
  }];
  if(DATA.startWeight){
    datasets.push({ label:'시작 체중', data:dates.map(function(){ return DATA.startWeight; }),
      borderColor:'rgba(231,76,60,.4)', borderWidth:1.5, borderDash:[4,3],
      pointRadius:0, fill:false });
  }
  // 이론 예상 체중선 (신체정보 있을 때): 시작체중 − 누적 이론감량
  var prof=getProfile();
  if(prof && DATA.startWeight){
    var lossData=theoreticalLoss();
    if(lossData && lossData.series.length){
      // 날짜별 누적 감량 맵
      var lossMap={};
      lossData.series.forEach(function(s){ lossMap[s.date]=s.cumKg; });
      // dates 각 날짜의 이론 체중 (그 날까지 누적)
      var theoW=dates.map(function(d){
        // d 이하 날짜 중 가장 마지막 누적값
        var keys=Object.keys(lossMap).filter(function(k){return k<=d;}).sort();
        if(!keys.length) return null;
        var cum=lossMap[keys[keys.length-1]];
        return Math.round((DATA.startWeight-cum)*10)/10;
      });
      datasets.push({ label:'이론 예상 체중', data:theoW,
        borderColor:'rgba(52,152,219,.7)', borderWidth:2, borderDash:[6,3],
        pointRadius:0, fill:false, tension:0.2, spanGaps:true });
    }
  }
  _charts.weight=new Chart(wCtx,{
    type:'line', data:{ labels:dates.map(formatMD), datasets:datasets },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ callbacks:{
        label:function(ctx){ return ctx.raw!==null?(ctx.raw+'kg'):'기록없음'; }
      }}},
      scales:{
        x:{ ticks:{font:{size:10}, maxRotation:45, minRotation:30}, grid:{display:false} },
        y:{ ticks:{font:{size:10}, callback:function(v){return v+'kg';}},
            grid:{color:'rgba(0,0,0,.05)'} }
      }
    }
  });
}

// ─── 달성률 탭 ─────────────────────────────────────────────────────
function renderAchieve(){
  var goal=getGoal();
  var today=todayStr();

  // 이번 달
  var ym=today.slice(0,7);
  var allDates=Object.keys(DATA.records||{}).sort();
  var monthDates=dateRange(new Date(today).getDate()).filter(function(d){ return (DATA.records||{})[d]; });
  var monthTotal=monthDates.reduce(function(s,d){return s+dayKcal(d);},0);
  var monthAvg=monthDates.length?Math.round(monthTotal/monthDates.length):0;
  var monthPct=monthAvg?Math.min(100,Math.round(monthAvg/goal*100)):0;
  var monthOk=monthDates.filter(function(d){return dayKcal(d)<=goal;}).length;
  var monthRate=monthDates.length?Math.round(monthOk/monthDates.length*100):0;

  // 이번 주 (월~오늘)
  var weekDates=dateRange(7).filter(function(d){ return (DATA.records||{})[d]; });
  var weekTotal=weekDates.reduce(function(s,d){return s+dayKcal(d);},0);
  var weekAvg=weekDates.length?Math.round(weekTotal/weekDates.length):0;
  var weekOk=weekDates.filter(function(d){return dayKcal(d)<=goal;}).length;

  // 체중 변화
  var allWeights=Object.entries(DATA.weights||{}).sort(function(a,b){return a[0]>b[0]?1:-1;});
  var latestW=allWeights.length?allWeights[allWeights.length-1][1]:null;
  var weightChange=DATA.startWeight&&latestW?parseFloat((DATA.startWeight-latestW).toFixed(1)):null;

  // 최근 4주별 달성률
  var weeks=[];
  for(var i=3;i>=0;i--){
    var wStart=new Date(); wStart.setDate(wStart.getDate()-i*7-6);
    var wEnd=new Date(); wEnd.setDate(wEnd.getDate()-i*7);
    var wDates=[];
    for(var dd=new Date(wStart);dd<=wEnd;dd.setDate(dd.getDate()+1)){
      var ds=ymd(dd);
      if((DATA.records||{})[ds]) wDates.push(ds);
    }
    var wOk=wDates.filter(function(d){return dayKcal(d)<=goal;}).length;
    var wRate=wDates.length?Math.round(wOk/wDates.length*100):null;
    var label=(i===0?'이번 주':(i===1?'지난 주':'~'+ymd(wEnd).slice(5,10)));
    weeks.push({label:label,rate:wRate,ok:wOk,total:wDates.length});
  }

  var h='';

  // ── 이론 예상 감량 카드 ──
  var prof=getProfile();
  var loss=theoreticalLoss();
  h+='<div class="card">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
  h+='<h2 style="margin:0;">🔬 이론 예상 감량</h2>';
  h+='<button onclick="openProfileEdit()" style="border:none;background:#e8f5e9;color:#1a6b3c;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:700;cursor:pointer;">'+(prof?'신체정보 수정':'신체정보 입력')+'</button>';
  h+='</div>';
  if(!prof){
    h+='<div style="font-size:13px;color:#999;padding:6px 0;line-height:1.6;">신체정보(성별·나이·키·활동량)를 입력하면, 매일 먹은 칼로리를 바탕으로 <b>이론상 몇 kg 빠져야 하는지</b> 계산해드려요.<br><span style="font-size:11px;color:#bbb;">※ 참고용 추정치예요. 실제와 다를 수 있어요.</span></div>';
  } else if(!loss || loss.days===0){
    h+='<div style="font-size:13px;color:#999;padding:6px 0;">아직 계산할 기록이 부족해요. 매일 먹은 음식을 기록하면 예상 감량이 나와요.</div>';
  } else {
    var tdeeToday=calcTDEE(todayStr());
    var lossKg=loss.totalKg;
    var isLoss=lossKg>=0;
    h+='<div style="text-align:center;padding:10px 0;">';
    h+='<div style="font-size:34px;font-weight:800;color:'+(isLoss?'#1a6b3c':'#e67e22')+';line-height:1;">'
      +(isLoss?'−':'+')+Math.abs(lossKg).toFixed(2)+'<span style="font-size:18px;"> kg</span></div>';
    h+='<div style="font-size:12px;color:#888;margin-top:6px;">기록된 '+loss.days+'일 누적 기준 이론상 '+(isLoss?'감량':'증량')+'</div>';
    h+='</div>';
    // 상세
    h+='<div style="display:flex;gap:8px;margin-top:8px;">';
    h+='<div class="achieve-card" style="flex:1;"><div class="ac-label">하루 소비(TDEE)</div><div class="ac-val" style="font-size:19px;">'+(tdeeToday||'—')+'</div><div class="ac-sub">kcal/일 (오늘 체중 기준)</div></div>';
    var avgIntake=loss.days?Math.round(loss.series.filter(function(s){return s.intake>0;}).reduce(function(a,s){return a+s.intake;},0)/loss.days):0;
    h+='<div class="achieve-card" style="flex:1;"><div class="ac-label">하루 평균 섭취</div><div class="ac-val" style="font-size:19px;'+(avgIntake>(tdeeToday||9999)?'color:#e67e22;':'')+'">'+avgIntake+'</div><div class="ac-sub">kcal/일</div></div>';
    h+='</div>';
    // 실제 vs 이론 비교
    var latestW=null, ws=Object.keys(DATA.weights||{}).sort();
    if(ws.length) latestW=DATA.weights[ws[ws.length-1]];
    if(DATA.startWeight && latestW){
      var actualLoss=DATA.startWeight-latestW;
      h+='<div style="margin-top:10px;padding:10px;background:#f7fdf8;border-radius:9px;font-size:12px;color:#555;line-height:1.7;">';
      h+='📊 <b>이론 vs 실제</b><br>';
      h+='· 이론상: '+(isLoss?'−':'+')+Math.abs(lossKg).toFixed(2)+'kg<br>';
      h+='· 실제: '+(actualLoss>=0?'−':'+')+Math.abs(actualLoss).toFixed(1)+'kg (체중 기록 기준)';
      var gap=actualLoss-lossKg;
      if(Math.abs(gap)>=0.5){
        h+='<br><span style="color:#999;font-size:11px;">'+(gap<0?'실제가 이론보다 덜 빠졌어요 (활동량이 예상보다 적거나, 섭취 추정이 낮았을 수 있어요)':'실제가 이론보다 더 빠졌어요 (활동량이 예상보다 많았을 수 있어요)')+'</span>';
      }
      h+='</div>';
    }
    h+='<div style="font-size:10px;color:#bbb;margin-top:8px;text-align:center;">※ 체지방 1kg=7,700kcal 기준 참고용 추정. 실제 감량은 수분·근육·개인차로 다를 수 있어요.</div>';
  }
  h+='</div>';

  h+='<div class="card">';
  h+='<div class="achieve-grid">';

  var mRateColor=monthRate>=80?'':'monthRate>=60?\'warn\':\''+'bad\'';
  h+='<div class="achieve-card"><div class="ac-label">목표 달성일</div>';
  h+='<div class="ac-val'+(monthRate<60?' bad':monthRate<80?' warn':'')+'">'+(monthDates.length?monthRate+'%':'—')+'</div>';
  h+='<div class="ac-sub">'+monthOk+'/'+monthDates.length+'일 달성</div></div>';

  h+='<div class="achieve-card"><div class="ac-label">일 평균 칼로리</div>';
  h+='<div class="ac-val'+(monthAvg>goal?' bad':monthAvg>goal*0.95?' warn':'')+'">'+(monthAvg||'—')+'</div>';
  h+='<div class="ac-sub">kcal (목표 '+goal+')</div></div>';

  h+='<div class="achieve-card"><div class="ac-label">이번 주 달성</div>';
  var wRate=weekDates.length?Math.round(weekOk/weekDates.length*100):null;
  h+='<div class="ac-val'+(wRate!==null&&wRate<60?' bad':wRate!==null&&wRate<80?' warn':'')+'">'+(wRate!==null?wRate+'%':'—')+'</div>';
  h+='<div class="ac-sub">'+weekOk+'/'+weekDates.length+'일 달성</div></div>';

  h+='<div class="achieve-card"><div class="ac-label">체중 변화</div>';
  h+='<div class="ac-val'+(weightChange!==null&&weightChange<0?' bad':'')+'">';
  if(weightChange!==null) h+=(weightChange>0?'-'+weightChange:'+'+Math.abs(weightChange))+'kg';
  else h+='—';
  h+='</div><div class="ac-sub">'+(DATA.startWeight?'시작: '+DATA.startWeight+'kg':'시작 체중 미입력')+'</div></div>';

  h+='</div></div>';

  // 최근 4주 바
  h+='<div class="card"><h2>📅 주별 달성률</h2><div class="week-list">';
  weeks.forEach(function(w){
    var p=w.rate!==null?w.rate:0;
    h+='<div class="week-row">';
    h+='<div class="week-label">'+esc(w.label)+'</div>';
    h+='<div class="week-bar-wrap"><div class="week-bar'+(p<60?' over':'')+'" style="width:'+p+'%"></div></div>';
    h+='<div class="week-pct'+(p<60?' over':'')+'">'+( w.rate!==null?w.rate+'%':'—')+'</div>';
    h+='</div>';
  });
  h+='</div></div>';
  document.getElementById('app').innerHTML=h;
}

// ── 이벤트 ──
function selDate(d){ SEL_DATE=d; render(); }
function saveKey(){
  var inp=document.getElementById('gemKey');
  if(!inp){ return; }
  var v=inp.value.trim();
  if(!v){alert('키를 입력하세요.');return;}
  saveGeminiKey(v); showToast('제미나이 키 저장됨'); render();
}
function resetKey(){
  if(!confirm('API 키를 재등록할까요?\n현재 키가 삭제됩니다.')) return;
  localStorage.removeItem(GEMINI_KEY_NAME); render();
}
function saveGoal(){
  var v=parseInt(document.getElementById('goalInp').value)||1800;
  v=Math.max(500,Math.min(5000,v)); setGoal(v); showToast('🎯 목표 '+v+'kcal 저장됨'); render();
}
function onSaveWeight(){
  var v=parseFloat(document.getElementById('wInp').value);
  if(!v||v<30||v>200){alert('체중을 정확히 입력하세요 (30~200kg)');return;}
  saveWeight(SEL_DATE,v); showToast(v+'kg 저장됨'); render();
}
function onSaveStartWeight(){
  var v=parseFloat(document.getElementById('swInp').value);
  if(!v||v<30||v>200){alert('시작 체중을 입력하세요 (30~200kg)');return;}
  saveStartWeight(v); showToast('시작 체중 '+v+'kg 저장됨'); render();
}
function onDel(date,id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  delRecord(date,id); render();
}
async function onAnalyze(){
  var food=document.getElementById('foodInput').value.trim();
  if(!food){alert('음식을 입력하세요.');return;}
  var btn=document.getElementById('analyzeBtn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>분석 중...';
  try {
    var result=await analyzeFood(food);
    addRecord(food,result.kcal,result.detail||'');
    document.getElementById('foodInput').value='';
    render(); showToast('✓ '+result.kcal+'kcal 추가됨');
  } catch(e){
    alert('분석 실패: '+e.message);
    btn.disabled=false; btn.innerHTML='🤖 칼로리 분석하기';
  }
}
function setChartPeriod(p){ CHART_PERIOD=p; render(); }

var _toastTimer=null;
function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  if(_toastTimer) clearTimeout(_toastTimer);
  _toastTimer=setTimeout(function(){el.classList.remove('show');},2200);
}

loadData();
</script>
