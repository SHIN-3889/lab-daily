function pfdDrawSymbol(eq){
  var x=eq.x,y=eq.y,w=eq.w,h=eq.h,t=eq.type;
  var sg=pfdEl('g',{});
  var fill={tower:'#0d1e33',reactor:'#1a0d33',drum:'#151e28',tank:'#0d2a1a',heater:'#2a130d'}[t]||'#151e28';
  var stroke={tower:'#5a8fc7',reactor:'#a47fc7',drum:'#607080',tank:'#5ac77f',heater:'#c76f5a'}[t]||'#607080';
  function P(tag,a){ a.fill=a.fill||fill; a.stroke=stroke; a['stroke-width']=a['stroke-width']||1.5; return pfdEl(tag,a); }
  if(t==='tower'){
    var ry=Math.min(w*0.18,6);
    sg.appendChild(P('rect',{x:x,y:y+ry,width:w,height:h-ry*2}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+h-ry,rx:w/2,ry:ry}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+ry,rx:w/2,ry:ry}));
  } else if(t==='reactor'){
    var ry2=Math.min(w*0.2,8);
    sg.appendChild(P('rect',{x:x,y:y+ry2,width:w,height:h-ry2*2}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+h-ry2,rx:w/2,ry:ry2}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+ry2,rx:w/2,ry:ry2}));
  } else if(t==='drum'){
    var cr=Math.min(w,h)*0.18;
    sg.appendChild(P('rect',{x:x,y:y,width:w,height:h,rx:cr,ry:cr}));
  } else if(t==='tank'){
    var ry4=Math.min(w*0.15,5), roofH=Math.min(h*0.15,8);
    sg.appendChild(P('rect',{x:x,y:y+roofH,width:w,height:h-roofH-ry4}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+h-ry4,rx:w/2,ry:ry4}));
    sg.appendChild(P('line',{x1:x,y1:y+roofH,x2:x+w/2,y2:y}));
    sg.appendChild(P('line',{x1:x+w,y1:y+roofH,x2:x+w/2,y2:y}));
    sg.appendChild(P('ellipse',{cx:x+w/2,cy:y+roofH,rx:w/2,ry:ry4}));
  } else if(t==='heater'){
    sg.appendChild(P('rect',{x:x,y:y,width:w,height:h,rx:3}));
    var fc=['#e05a3a','#e08a3a','#e0b03a'];
    for(var fi=0;fi<3;fi++){ var fx=x+w*(fi+1)/4;
      sg.appendChild(pfdEl('path',{d:'M'+fx+','+(y+h-3)+' Q'+(fx-4)+','+(y+h*0.6)+' '+fx+','+(y+h*0.4)+' Q'+(fx+4)+','+(y+h*0.2)+' '+fx+','+(y+3),fill:'none',stroke:fc[fi],'stroke-width':1.5})); }
    sg.appendChild(P('rect',{x:x+w/2-3,y:y-6,width:6,height:8}));
  }
  sg.appendChild(pfdEl('rect',{x:x,y:y,width:w,height:h,fill:'transparent',stroke:'none'}));
  return sg;
}

function pfdRenderEq(){
  var layer=document.getElementById('pfd-eq'); layer.innerHTML='';
  PFD.eqs.forEach(function(eq){
    if(!pfdInProc(eq)) return;
    var g=pfdEl('g',{style:PFD_EDIT?'cursor:move;':'cursor:pointer;'});
    if(PFD_SELECTED&&PFD_SELECTED.id===eq.id){ g.style.outline='none'; }
    g.appendChild(pfdDrawSymbol(eq));
    if(PFD_SELECTED&&PFD_SELECTED.id===eq.id){
      g.querySelectorAll('rect,ellipse,line,path').forEach(function(el){ if(el.getAttribute('stroke')&&el.getAttribute('stroke')!=='none') el.setAttribute('stroke','#ffd54f'); });
    }
    // 라벨 줄바꿈
    var fs=9, maxW=eq.w-6, cpl=Math.max(2,Math.floor(maxW/(fs*0.62)));
    var lines=[]; eq.label.split('/').forEach(function(part){ part=part.trim();
      if(part.length<=cpl) lines.push(part); else for(var ci=0;ci<part.length;ci+=cpl) lines.push(part.slice(ci,ci+cpl)); });
    if(!lines.length) lines=[''];
    lines.forEach(function(line,i){
      var t=pfdEl('text',{x:eq.x+eq.w/2,y:eq.y+eq.h/2+(i-(lines.length-1)/2)*(fs+2)+1,'font-size':fs,fill:'#cfe0f0','text-anchor':'middle','dominant-baseline':'middle','font-weight':600,style:'pointer-events:none;'});
      t.textContent=line; g.appendChild(t);
    });
    pfdBindEq(g,eq); layer.appendChild(g);
  });
}
function pfdRenderSp(){
  var layer=document.getElementById('pfd-sp'); layer.innerHTML='';
  PFD.sps.forEach(function(sp){
    if(!pfdInProc(sp)) return;
    var g=pfdEl('g',{style:PFD_EDIT?'cursor:move;':'cursor:pointer;'});
    var label=(sp.label||'').trim()||'?';
    var rx=Math.max(9,label.length*3.3+5);
    var sel=PFD_SELECTED&&PFD_SELECTED.id===sp.id;
    g.appendChild(pfdEl('ellipse',{cx:sp.x,cy:sp.y,rx:rx,ry:9,fill:'#e74c3c',stroke:sel?'#ffd54f':'#fff','stroke-width':sel?2.5:1.5}));
    var t=pfdEl('text',{x:sp.x,y:sp.y+1,'font-size':9,fill:'#fff','text-anchor':'middle','dominant-baseline':'middle','font-weight':700,style:'pointer-events:none;'});
    t.textContent=label; g.appendChild(t);
    pfdBindSp(g,sp); layer.appendChild(g);
  });
}
function pfdRenderTexts(){
  var layer=document.getElementById('pfd-text'); layer.innerHTML='';
  (PFD.texts||[]).forEach(function(tx){
    if(!pfdInProc(tx)) return;
    var g=pfdEl('g',{style:PFD_EDIT?'cursor:move;':'default;'});
    var lines=(tx.text||'').split('\n'); var fs=tx.size||14;
    var sel=PFD_SELECTED&&PFD_SELECTED.id===tx.id;
    lines.forEach(function(line,i){
      var t=pfdEl('text',{x:tx.x,y:tx.y+i*(fs+3),'font-size':fs,fill:sel?'#ffd54f':(tx.color||'#e8eef5'),'font-weight':700,'dominant-baseline':'hanging'});
      t.textContent=line||' '; g.appendChild(t);
    });
    var maxLen=Math.max.apply(null,lines.map(function(l){return l.length;}));
    g.appendChild(pfdEl('rect',{x:tx.x-2,y:tx.y-2,width:maxLen*fs*0.6+8,height:lines.length*(fs+3)+4,fill:'transparent'}));
    pfdBindText(g,tx); layer.appendChild(g);
  });
}
function pfdRenderPipes(){
  var layer=document.getElementById('pfd-pipes'); layer.innerHTML='';
  PFD.pipes.forEach(function(p){
    if(!pfdInProc(p)) return;
    if(!p.pts||p.pts.length<2) return;
    var g=pfdEl('g',{style:'cursor:pointer;'});
    var clr=(PFD_COLORS[p.color]||PFD_COLORS.process).stroke;
    var d='M'+p.pts.map(function(pt){return pt[0]+' '+pt[1];}).join(' L');
    var l=pfdEl('path',{d:d,fill:'none',stroke:clr,'stroke-width':(PFD_SELECTED&&PFD_SELECTED.id===p.id)?4:2.5,'stroke-linecap':'round','stroke-linejoin':'round'});
    if(PFD_SELECTED&&PFD_SELECTED.id===p.id) l.setAttribute('stroke-dasharray','6,3');
    g.appendChild(l);
    // 화살표
    var pts=p.pts, ep=pts[pts.length-1].slice(), sp2=null;
    for(var k=pts.length-2;k>=0;k--){ if(pts[k][0]!==ep[0]||pts[k][1]!==ep[1]){ sp2=pts[k]; break; } }
    if(!sp2) sp2=[ep[0]-1,ep[1]];
    var dx=ep[0]-sp2[0],dy=ep[1]-sp2[1],ang=Math.atan2(dy,dx)*180/Math.PI;
    var len=Math.sqrt(dx*dx+dy*dy)||1, ux=dx/len,uy=dy/len, gap=4;
    // 같은 공정 장치만 대상 (SM/MTBE 겹침 방지)
    var eqsInProc=PFD.eqs.filter(function(eq){ return !p.process || !eq.process || eq.process===p.process; });
    // 끝점이 장치에 살짝 못 미치면(20px 이내) 경계까지 연장해서 딱 붙임
    var snapDist=20;
    var nearEq=eqsInProc.find(function(eq){
      var inX=ep[0]>=eq.x-snapDist&&ep[0]<=eq.x+eq.w+snapDist;
      var inY=ep[1]>=eq.y-snapDist&&ep[1]<=eq.y+eq.h+snapDist;
      var insideNow=ep[0]>=eq.x-gap&&ep[0]<=eq.x+eq.w+gap&&ep[1]>=eq.y-gap&&ep[1]<=eq.y+eq.h+gap;
      return inX&&inY&&!insideNow;
    });
    if(nearEq){ var ex=0; while(ex<snapDist+6){ var touch=ep[0]>=nearEq.x-gap&&ep[0]<=nearEq.x+nearEq.w+gap&&ep[1]>=nearEq.y-gap&&ep[1]<=nearEq.y+nearEq.h+gap; if(touch)break; ep[0]+=ux;ep[1]+=uy;ex++; }
      var ext=pts.slice(0,-1).concat([[Math.round(ep[0]),Math.round(ep[1])]]); l.setAttribute('d','M'+ext.map(function(pt){return pt[0]+' '+pt[1];}).join(' L')); }
    var hitEq=eqsInProc.find(function(eq){return ep[0]>=eq.x-gap&&ep[0]<=eq.x+eq.w+gap&&ep[1]>=eq.y-gap&&ep[1]<=eq.y+eq.h+gap;});
    if(hitEq){ var st=0; while(st<300){ var ins=ep[0]>=hitEq.x-gap&&ep[0]<=hitEq.x+hitEq.w+gap&&ep[1]>=hitEq.y-gap&&ep[1]<=hitEq.y+hitEq.h+gap; if(!ins)break; ep[0]-=ux;ep[1]-=uy;st++; }
      var np=pts.slice(0,-1).concat([[Math.round(ep[0]),Math.round(ep[1])]]); l.setAttribute('d','M'+np.map(function(pt){return pt[0]+' '+pt[1];}).join(' L')); }
    var aw=7,ah=6;
    g.appendChild(pfdEl('polygon',{points:'0,'+(-ah/2)+' '+aw+',0 0,'+(ah/2),fill:clr,transform:'translate('+ep[0]+','+ep[1]+') rotate('+ang+')'}));
    if(PFD_EDIT){
      g.addEventListener('dblclick',function(e){e.stopPropagation();pfdEditPipe(p.id);});
      g.addEventListener('click',function(e){if(PFD_MODE==='select'){e.stopPropagation();pfdSelect({type:'pipe',id:p.id});}});
    }
    layer.appendChild(g);
  });
}

// 좌표 변환
function pfdPt(e){ var cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
  var pt=PFD_SVG.createSVGPoint(); pt.x=cx; pt.y=cy; var tp=pt.matrixTransform(PFD_SVG.getScreenCTM().inverse());
  return {x:Math.round(tp.x),y:Math.round(tp.y)}; }

// 툴팁
var PFD_TIP=null;
function pfdShowTip(e,info){ pfdHideTip(); var tip=document.createElement('div');
  tip.id='pfd-tip'; tip.style.cssText='position:fixed;z-index:3000;background:#1a2942;border:1px solid #4a6fa5;border-radius:10px;padding:9px 12px;max-width:240px;font-size:12px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.4);pointer-events:none;color:#d8e4f0;';
  tip.innerHTML='<div style="font-size:13px;font-weight:700;color:#ffd54f;margin-bottom:2px;">'+esc(info.name)+'</div>'+(info.type?'<div style="font-size:10px;color:#8fb0d0;margin-bottom:3px;">'+info.type+'</div>':'')+(info.desc?'<div>'+esc(info.desc)+'</div>':'');
  document.body.appendChild(tip); PFD_TIP=tip; pfdMoveTip(e); }
function pfdMoveTip(e){ if(!PFD_TIP)return; var px=e.touches?e.touches[0].clientX:e.clientX, py=e.touches?e.touches[0].clientY:e.clientY;
  var tw=PFD_TIP.offsetWidth,th=PFD_TIP.offsetHeight,l=px+14,t=py+14;
  if(l+tw>window.innerWidth-8)l=px-tw-14; if(t+th>window.innerHeight-8)t=py-th-14;
  PFD_TIP.style.left=Math.max(4,l)+'px'; PFD_TIP.style.top=Math.max(4,t)+'px'; }
function pfdHideTip(){ if(PFD_TIP){PFD_TIP.remove();PFD_TIP=null;} }

function pfdBindEq(g,eq){
  g.addEventListener('mouseenter',function(e){ if(!PFD_EDIT) pfdShowTip(e,{name:eq.name||eq.label,type:PFD_EQ_TYPES[eq.type]||'장치',desc:eq.desc}); });
  g.addEventListener('mousemove',function(e){ if(!PFD_EDIT) pfdMoveTip(e); });
  g.addEventListener('mouseleave',pfdHideTip);
  g.addEventListener('touchstart',function(e){ if(!PFD_EDIT) pfdShowTip(e,{name:eq.name||eq.label,type:PFD_EQ_TYPES[eq.type]||'장치',desc:eq.desc}); },{passive:true});
  if(PFD_EDIT){
    g.addEventListener('mousedown',function(e){ if(PFD_MODE==='select'){e.preventDefault();e.stopPropagation();var pt=pfdPt(e);PFD_DRAG={item:eq,ox:pt.x-eq.x,oy:pt.y-eq.y};document.getElementById('pfd-wrap').style.overflow='hidden';} });
    g.addEventListener('dblclick',function(e){ e.stopPropagation(); pfdEditEq(eq.id); });
    g.addEventListener('click',function(e){ if(PFD_MODE==='pipe'){e.stopPropagation();var pt=pfdPt(e);pfdPipeClick(pt.x,pt.y);} else {e.stopPropagation();pfdSelect({type:'eq',id:eq.id});} });
  }
}
function pfdBindSp(g,sp){
  g.addEventListener('mouseenter',function(e){ if(!PFD_EDIT) pfdShowTip(e,{name:sp.name||sp.label,type:'🔴 샘플포인트',desc:sp.desc}); });
  g.addEventListener('mousemove',function(e){ if(!PFD_EDIT) pfdMoveTip(e); });
  g.addEventListener('mouseleave',pfdHideTip);
  g.addEventListener('touchstart',function(e){ if(!PFD_EDIT) pfdShowTip(e,{name:sp.name||sp.label,type:'🔴 샘플포인트',desc:sp.desc}); },{passive:true});
  if(PFD_EDIT){
    g.addEventListener('mousedown',function(e){ if(PFD_MODE==='select'){e.preventDefault();e.stopPropagation();var pt=pfdPt(e);PFD_DRAG={item:sp,ox:pt.x-sp.x,oy:pt.y-sp.y};document.getElementById('pfd-wrap').style.overflow='hidden';} });
    g.addEventListener('dblclick',function(e){ e.stopPropagation(); pfdEditSp(sp.id); });
    g.addEventListener('click',function(e){ if(PFD_MODE==='pipe'){e.stopPropagation();var pt=pfdPt(e);pfdPipeClick(pt.x,pt.y);} else {e.stopPropagation();pfdSelect({type:'sp',id:sp.id});} });
  }
}
function pfdBindText(g,tx){
  if(PFD_EDIT){
    g.addEventListener('mousedown',function(e){ if(PFD_MODE==='select'){e.preventDefault();e.stopPropagation();var pt=pfdPt(e);PFD_DRAG={item:tx,ox:pt.x-tx.x,oy:pt.y-tx.y};document.getElementById('pfd-wrap').style.overflow='hidden';} });
    g.addEventListener('dblclick',function(e){ e.stopPropagation(); pfdEditText(tx.id); });
    g.addEventListener('click',function(e){ if(PFD_MODE==='select'){e.stopPropagation();pfdSelect({type:'text',id:tx.id});} });
  }
}

function pfdBindCanvas(){
  document.addEventListener('mousemove',pfdOnMove);
  document.addEventListener('mouseup',pfdOnUp);
  PFD_SVG.addEventListener('mousedown',function(e){
    if(!PFD_EDIT||PFD_MODE!=='pipe')return; var now=Date.now();
    if(now-PFD_LAST_MD<300){ e.preventDefault(); var pt=pfdPt(e); if(PFD_PIPE_START){ var prev=PFD_PIPE_PTS.length>0?PFD_PIPE_PTS[PFD_PIPE_PTS.length-1]:PFD_PIPE_START; if(Math.abs(pt.x-prev[0])>=8||Math.abs(pt.y-prev[1])>=8) PFD_PIPE_PTS.push(pfdOrthoSnap(prev,[pt.x,pt.y])); pfdFinishPipe(); } PFD_LAST_MD=0; }
    else PFD_LAST_MD=now;
  });
  PFD_SVG.addEventListener('click',function(e){
    if(!PFD_EDIT)return;
    if(PFD_MODE==='pipe'){ if(Date.now()-PFD_LAST_MD>250)return; var pt=pfdPt(e); pfdPipeClick(pt.x,pt.y); }
    else if(e.target===PFD_SVG){ pfdSelect(null); }
  });
  PFD_SVG.addEventListener('mousemove',function(e){
    if(!PFD_EDIT||PFD_MODE!=='pipe'||!PFD_PIPE_START)return; var pt=pfdPt(e);
    var prev=PFD_PIPE_PTS.length>0?PFD_PIPE_PTS[PFD_PIPE_PTS.length-1]:PFD_PIPE_START;
    var snap=pfdOrthoSnap(prev,[pt.x,pt.y]);
    var all=pfdOrthoPath([PFD_PIPE_START].concat(PFD_PIPE_PTS).concat([snap]));
    document.getElementById('pfd-preview').setAttribute('d','M'+all.map(function(p){return p[0]+' '+p[1];}).join(' L'));
  });
}
function pfdOnMove(e){ if(!PFD_DRAG)return; var pt=pfdPt(e); PFD_DRAG.item.x=Math.round((pt.x-PFD_DRAG.ox)/5)*5; PFD_DRAG.item.y=Math.round((pt.y-PFD_DRAG.oy)/5)*5; pfdRender(); }
function pfdOnUp(){ if(PFD_DRAG){ pfdPush(); PFD_DRAG=null; var w=document.getElementById('pfd-wrap'); if(w)w.style.overflow='auto'; } }

function pfdOrthoSnap(prev,cur){ var dx=Math.abs(cur[0]-prev[0]),dy=Math.abs(cur[1]-prev[1]); return dx>=dy?[cur[0],prev[1]]:[prev[0],cur[1]]; }
function pfdOrthoPath(pts){ if(pts.length<2)return pts; var out=[pts[0]]; for(var i=1;i<pts.length;i++){var prev=out[out.length-1],cur=pts[i],dx=Math.abs(cur[0]-prev[0]),dy=Math.abs(cur[1]-prev[1]); if(dx>0&&dy>0){if(dx>=dy)out.push([cur[0],prev[1]]);else out.push([prev[0],cur[1]]);} out.push(cur);} return out; }
function pfdSimplify(pts){ if(pts.length<2)return pts; var dd=[pts[0]]; for(var i=1;i<pts.length;i++){var p=pts[i],q=dd[dd.length-1]; if(Math.abs(p[0]-q[0])>1||Math.abs(p[1]-q[1])>1)dd.push(p);} if(dd.length<3)return dd; var out=[dd[0]]; for(var j=1;j<dd.length-1;j++){var a=out[out.length-1],b=dd[j],c=dd[j+1],d1x=b[0]-a[0],d1y=b[1]-a[1],d2x=c[0]-b[0],d2y=c[1]-b[1]; if((d1y===0&&d2y===0)||(d1x===0&&d2x===0))continue; out.push(b);} out.push(dd[dd.length-1]); return out; }
function pfdPipeClick(x,y){ if(!PFD_PIPE_START){PFD_PIPE_START=[x,y];PFD_PIPE_PTS=[];} else { var prev=PFD_PIPE_PTS.length>0?PFD_PIPE_PTS[PFD_PIPE_PTS.length-1]:PFD_PIPE_START; if(Math.abs(x-prev[0])<8&&Math.abs(y-prev[1])<8)return; PFD_PIPE_PTS.push(pfdOrthoSnap(prev,[x,y])); } }
function pfdFinishPipe(){ if(!PFD_PIPE_START){pfdCancelPipe();return;} var raw=[PFD_PIPE_START].concat(PFD_PIPE_PTS); if(raw.length<2){pfdCancelPipe();return;} var all=pfdSimplify(pfdOrthoPath(raw)); if(all.length<2){pfdCancelPipe();return;} pfdPush(); PFD.pipes.push({id:'pipe-'+Date.now(),color:PFD_PIPE_COLOR,pts:all}); pfdCancelPipe(); pfdRender(); }
function pfdCancelPipe(){ PFD_PIPE_START=null;PFD_PIPE_PTS=[];PFD_LAST_MD=0; var pv=document.getElementById('pfd-preview'); if(pv)pv.setAttribute('d',''); }

document.addEventListener('keydown',function(e){ if(currentView()!=='pfd'||!PFD_EDIT)return; if(e.key==='Escape')pfdCancelPipe(); if((e.key==='Delete'||e.key==='Backspace')&&PFD_SELECTED)pfdDelSelected(); if(e.key==='Enter'&&PFD_MODE==='pipe'&&PFD_PIPE_START)pfdFinishPipe(); });

function pfdToggleEdit(on){ PFD_EDIT=on; PFD_MODE='select'; PFD_SELECTED=null; pfdCancelPipe(); render(); }
function pfdSetMode(m){ PFD_MODE=m; PFD_SELECTED=null; pfdCancelPipe(); render(); }
function pfdToggleColor(){ PFD_COLOR_OPEN=!PFD_COLOR_OPEN; render(); }
function pfdPickColor(k){ PFD_PIPE_COLOR=k; PFD_COLOR_OPEN=false; render(); }
function pfdSelect(s){ PFD_SELECTED=s; pfdRender(); var del=document.getElementById('pfd-del'); if(del)del.style.display=(PFD_EDIT&&s)?'':'none'; }
function pfdPush(){ PFD_UNDO.push(JSON.stringify({eqs:PFD.eqs,sps:PFD.sps,pipes:PFD.pipes,texts:PFD.texts})); if(PFD_UNDO.length>30)PFD_UNDO.shift(); }
function pfdUndo(){ if(!PFD_UNDO.length){alert('되돌릴 수 없어요');return;} var h=JSON.parse(PFD_UNDO.pop()); PFD.eqs=h.eqs;PFD.sps=h.sps;PFD.pipes=h.pipes;PFD.texts=h.texts; pfdRender(); }
function pfdDelSelected(){ if(!PFD_SELECTED)return; pfdPush(); var t=PFD_SELECTED.type,id=PFD_SELECTED.id;
  if(t==='eq')PFD.eqs=PFD.eqs.filter(function(x){return x.id!==id;});
  if(t==='sp')PFD.sps=PFD.sps.filter(function(x){return x.id!==id;});
  if(t==='pipe')PFD.pipes=PFD.pipes.filter(function(x){return x.id!==id;});
  if(t==='text')PFD.texts=PFD.texts.filter(function(x){return x.id!==id;});
  PFD_SELECTED=null; pfdRender(); }

function pfdViewCenter(){ var w=document.getElementById('pfd-wrap'); var cx=w.scrollLeft+w.clientWidth/2,cy=w.scrollTop+w.clientHeight/2; return [Math.round(cx/5)*5,Math.round(cy/5)*5]; }
function pfdAddSp(){ PFD_MODE='select'; var c=pfdViewCenter(); var id='sp-'+Date.now().toString(36); pfdPush(); PFD.sps.push({id:id,x:c[0],y:c[1],label:'S-?',name:'새 샘플포인트',desc:'',process:(PFD_PROCESS==='ALL'?'SM':PFD_PROCESS)}); pfdRender(); pfdEditSp(id); }
function pfdAddEq(){ PFD_MODE='select'; var c=pfdViewCenter(); var id='eq-'+Date.now().toString(36); pfdPush(); PFD.eqs.push({id:id,x:c[0]-25,y:c[1]-40,w:50,h:80,type:'tower',label:'새장치',name:'새 장치',desc:'',process:(PFD_PROCESS==='ALL'?'SM':PFD_PROCESS)}); pfdRender(); pfdEditEq(id); }
function pfdAddText(){ PFD_MODE='select'; var c=pfdViewCenter(); var id='txt-'+Date.now().toString(36); pfdPush(); PFD.texts.push({id:id,x:c[0],y:c[1],text:'텍스트',size:14,color:'#e8eef5',process:(PFD_PROCESS==='ALL'?'SM':PFD_PROCESS)}); pfdRender(); pfdEditText(id); }

function pfdModal(html){ var ov=document.createElement('div'); ov.className='warn-edit-overlay'; ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:3000;display:flex;align-items:center;justify-content:center;padding:14px;';
  var m=document.createElement('div'); m.style.cssText='background:#fff;border-radius:14px;padding:18px;width:100%;max-width:360px;max-height:88vh;overflow-y:auto;'; m.innerHTML=html; ov.appendChild(m); document.body.appendChild(ov);
  ov.addEventListener('mousedown',function(e){ov._md=e.target;}); ov.addEventListener('click',function(e){if(e.target===ov&&ov._md===ov)ov.remove();}); return ov; }

function pfdEditEq(id){ var eq=PFD.eqs.find(function(e){return e.id===id;}); if(!eq)return;
  var ov=pfdModal('<h3 style="margin:0 0 12px;color:#1a5276;font-size:15px;">⚙️ 장치 편집</h3>'+
    '<label style="font-size:12px;color:#666;">표시 라벨</label><input id="pfe-label" value="'+esc(eq.label)+'" style="width:100%;padding:8px;border:1px solid #ccd;border-radius:7px;margin:3px 0 8px;">'+
    '<label style="font-size:12px;color:#666;">장치명</label><input id="pfe-name" value="'+esc(eq.name||'')+'" style="width:100%;padding:8px;border:1px solid #ccd;border-radius:7px;margin:3px 0 8px;">'+
    '<label style="font-size:12px;color:#666;">종류</label><select id="pfe-type" style="width:100%;padding:8px;border:1px solid #ccd;border-radius:7px;margin:3px 0 8px;">'+Object.keys(PFD_EQ_TYPES).map(function(t){return '<option value="'+t+'"'+(t===eq.type?' selected':'')+'>'+PFD_EQ_TYPES[t]+'</option>';}).join('')+'</select>'+
    '<label style="font-size:12px;color:#666;">설명</label><textarea id="pfe-desc" style="width:100%;padding:8px;border:1px solid #ccd;border-radius:7px;margin:3px 0;min-height:55px;">'+esc(eq.desc||'')+'</textarea>'+
    '<div style="display:flex;gap:8px;margin-top:12px;"><button class="pfe-cancel" style="flex:0 0 auto;border:none;background:#e0e0e0;border-radius:8px;padding:10px 14px;cursor:pointer;">취소</button><button class="pfe-ok" style="flex:1;border:none;background:#2980b9;color:#fff;border-radius:8px;padding:10px;font-weight:700;cursor:pointer;">저장</button></div>');
  ov.querySelector('.pfe-cancel').onclick=function(){ov.remove();};
  ov.querySelector('.pfe-ok').onclick=function(){ pfdPush(); eq.label=ov.querySelector('#pfe-label').value.trim(); eq.name=ov.querySelector('#pfe-name').value.trim(); eq.type=ov.querySelector('#pfe-type').value; eq.desc=ov.querySelector('#pfe-desc').value.trim(); ov.remove(); pfdRender(); };
}
function pfdEditSp(id){ var sp=PFD.sps.find(function(s){return s.id===id;}); if(!sp)return;
  var ov=pfdModal('<h3 style="margin:0 0 12px;color:#c0392b;font-size:15px;">🔴 샘플포인트 편집</h3>'+

// ── 샘플포인트 미니맵 (분석 이유 💡에서 사용) ──
function buildSampleMiniMap(sampleLabel){
  if(!PFD_LOADED || !PFD.sps || !PFD.sps.length) return '';
  var sp = PFD.sps.find(function(s){return s.label===sampleLabel;});
  if(!sp) return '';
  var proc = sp.process || null;  // 이 샘플의 공정
  function sameProc(item){ return !proc || !item.process || item.process===proc; }
  // 같은 공정 장치 중 샘플에서 가까운 순으로 정렬, 가까운 3개가 다 보이도록 영역 자동 설정
  var procEqs = PFD.eqs.filter(sameProc);
  function eqDist(eq){
    var cx=eq.x+eq.w/2, cy=eq.y+eq.h/2;
    return Math.sqrt((cx-sp.x)*(cx-sp.x)+(cy-sp.y)*(cy-sp.y));
  }
  var nearEqs = procEqs.slice().sort(function(a,b){return eqDist(a)-eqDist(b);}).slice(0,3);
  // 샘플 + 가까운 장치들을 모두 포함하는 경계 계산
  var minX=sp.x-40, maxX=sp.x+40, minY=sp.y-40, maxY=sp.y+40;
  nearEqs.forEach(function(eq){
    minX=Math.min(minX,eq.x-10); maxX=Math.max(maxX,eq.x+eq.w+10);
    minY=Math.min(minY,eq.y-10); maxY=Math.max(maxY,eq.y+eq.h+10);
  });
  // 너무 커지지 않게 최대 범위 제한 (샘플 중심 ±260)
  var CAP=260;
  minX=Math.max(minX,sp.x-CAP); maxX=Math.min(maxX,sp.x+CAP);
  minY=Math.max(minY,sp.y-CAP); maxY=Math.min(maxY,sp.y+CAP);
  var vx=minX, vy=minY, vw=maxX-minX, vh=maxY-minY;
  // 종횡비 보정 (너무 납작/길쭉하지 않게)
  var W=300, H=Math.round(W*vh/vw);
  if(H>300){ H=300; } if(H<160){ H=160; }
  var COL={benzene:'#3aade0',ethylene:'#d4e04a',eb:'#7ec850',peb:'#9b8fd0',styrene:'#e85a9b',residue:'#e0913a',c4r1:'#e8893a',mtbe:'#c4d82e',c4r2:'#f55a8a',butene1:'#7ec850',isobutene:'#c8861f',meoh:'#3ab0d8',process:'#8a9aa8'};
  var EQF={tower:'#0d1e33',reactor:'#1a0d33',drum:'#151e28',tank:'#0d2a1a',heater:'#2a130d'};
  var EQS={tower:'#5a8fc7',reactor:'#a47fc7',drum:'#607080',tank:'#5ac77f',heater:'#c76f5a'};
  function inV(x,y){ return x>=vx-40&&x<=vx+vw+40&&y>=vy-40&&y<=vy+vh+40; }
  function rectInV(x,y,w,h){ return x<=vx+vw+40 && x+w>=vx-40 && y<=vy+vh+40 && y+h>=vy-40; }
  var _mmId='mm'+Math.random().toString(36).slice(2,8);
  var g='<div class="minimap-wrap" id="'+_mmId+'-wrap" data-mmid="'+_mmId+'" style="position:relative;overflow:hidden;border-radius:8px;touch-action:none;-ms-touch-action:none;" '
    +'data-vx="'+vx+'" data-vy="'+vy+'" data-vw="'+vw+'" data-vh="'+vh+'">';
  g+='<div style="position:absolute;top:5px;right:8px;z-index:3;font-size:10px;color:#8ba;background:rgba(15,23,41,.75);padding:2px 7px;border-radius:5px;pointer-events:none;">👆 끌어서 이동 · 두 손가락 확대</div>';
  g+='<svg id="'+_mmId+'" width="'+W+'" height="'+H+'" viewBox="'+vx+' '+vy+' '+vw+' '+vh+'" style="display:block;background:#0f1729;max-width:100%;pointer-events:none;">';
  PFD.pipes.forEach(function(p){
    if(!sameProc(p))return;
    if(!p.pts||p.pts.length<2)return;
    if(!p.pts.some(function(pt){return inV(pt[0],pt[1]);}))return;
    var d='M'+p.pts.map(function(pt){return pt[0]+' '+pt[1];}).join(' L');
    g+='<path d="'+d+'" fill="none" stroke="'+(COL[p.color]||COL.process)+'" stroke-width="2.5" opacity="0.85"/>';
  });
  PFD.eqs.forEach(function(eq){
    if(!sameProc(eq))return;
    if(!rectInV(eq.x,eq.y,eq.w,eq.h))return;
    g+='<rect x="'+eq.x+'" y="'+eq.y+'" width="'+eq.w+'" height="'+eq.h+'" rx="5" fill="'+(EQF[eq.type]||'#151e28')+'" stroke="'+(EQS[eq.type]||'#607080')+'" stroke-width="1.5"/>';
    var elbl=eq.label.split('/')[0];
    g+='<text x="'+(eq.x+eq.w/2)+'" y="'+(eq.y+eq.h/2)+'" font-size="8" fill="#cfe0f0" text-anchor="middle" dominant-baseline="middle" font-weight="700">'+esc(elbl)+'</text>';
  });
  PFD.sps.forEach(function(s){
    if(!sameProc(s))return;
    if(!inV(s.x,s.y))return;
    var isT=(s.label===sampleLabel), rx=Math.max(8,(s.label||'').length*2.8+4);
    g+='<ellipse cx="'+s.x+'" cy="'+s.y+'" rx="'+rx+'" ry="8" fill="#e74c3c" stroke="'+(isT?'#ffd54f':'#fff')+'" stroke-width="'+(isT?2.5:1.3)+'"/>';
    g+='<text x="'+s.x+'" y="'+(s.y+0.5)+'" font-size="7.5" fill="#fff" text-anchor="middle" dominant-baseline="middle" font-weight="700">'+esc(s.label)+'</text>';
    if(isT) g+='<circle cx="'+s.x+'" cy="'+s.y+'" r="'+(rx+6)+'" fill="none" stroke="#ffd54f" stroke-width="2" stroke-dasharray="4,3"/>';
  });
  g+='</svg></div>';
  return g;
}

// ── 미니맵 이동(한 손가락)/확대(두 손가락) ──
var _mmState={};
// 렌더 후 호출: 모든 미니맵에 addEventListener로 터치 핸들러 부착 (삼성 인터넷 등 호환)
function bindMiniMaps(){
  var wraps=document.querySelectorAll('.minimap-wrap[data-mmid]');
  wraps.forEach(function(wrap){
    if(wrap._mmBound) return;  // 중복 방지
    wrap._mmBound=true;
    var id=wrap.getAttribute('data-mmid');
    wrap.addEventListener('touchstart', function(e){ mmTouchStart(e,id); }, {passive:false});
    wrap.addEventListener('touchmove',  function(e){ mmTouchMove(e,id);  }, {passive:false});
    wrap.addEventListener('touchend',   function(e){ mmTouchEnd(e,id);   }, {passive:false});
    wrap.addEventListener('touchcancel',function(e){ mmTouchEnd(e,id);   }, {passive:false});
    // 마우스(PC)도 지원
    wrap.addEventListener('mousedown', function(e){ mmMouseDown(e,id); }, false);
  });
}
// PC 마우스 드래그로 미니맵 이동
var _mmMouse=null;
function mmMouseDown(e,id){
  e.preventDefault(); e.stopPropagation();
  var svg=document.getElementById(id); if(!svg) return;
  var vb=svg.getAttribute('viewBox').split(' ').map(Number);
  _mmMouse={id:id, vb:vb, cx:e.clientX, cy:e.clientY};
  document.addEventListener('mousemove', mmMouseMove, false);
  document.addEventListener('mouseup', mmMouseUp, false);
}
function mmMouseMove(e){
  if(!_mmMouse) return;
  var svg=document.getElementById(_mmMouse.id); if(!svg) return;
  var rect=svg.getBoundingClientRect();
  var vb=_mmMouse.vb.slice();
  var sx=vb[2]/rect.width, sy=vb[3]/rect.height;
  vb[0]-=(e.clientX-_mmMouse.cx)*sx; vb[1]-=(e.clientY-_mmMouse.cy)*sy;
  svg.setAttribute('viewBox', vb.join(' '));
  _mmMouse.vb=vb; _mmMouse.cx=e.clientX; _mmMouse.cy=e.clientY;
}
function mmMouseUp(){
  _mmMouse=null;
  document.removeEventListener('mousemove', mmMouseMove, false);
  document.removeEventListener('mouseup', mmMouseUp, false);
}
// DOM에 미니맵이 추가될 때마다 자동 바인딩
(function(){
  if(window._mmObserverSet) return;
  window._mmObserverSet=true;
  function trySet(){
    if(!document.body) { setTimeout(trySet,100); return; }
    var mo=new MutationObserver(function(){ bindMiniMaps(); });
    mo.observe(document.body, {childList:true, subtree:true});
    bindMiniMaps();
  }
  trySet();
})();
function mmTouchStart(e,id){
  e.stopPropagation();  // 부모(분석이유 롱프레스 등)로 전파 차단
  var svg=document.getElementById(id); if(!svg) return;
  var vb=svg.getAttribute('viewBox').split(' ').map(Number);
  if(e.touches.length===1){
    // 한 손가락 → 이동
    e.preventDefault();
    var t=e.touches[0];
    _mmState[id]={ mode:'pan', vb:vb, cx:t.clientX, cy:t.clientY };
  } else if(e.touches.length===2){
    // 두 손가락 → 확대
    e.preventDefault();
    var t0=e.touches[0], t1=e.touches[1];
    _mmState[id]={ mode:'zoom', vb:vb,
      cx:(t0.clientX+t1.clientX)/2, cy:(t0.clientY+t1.clientY)/2,
      dist:Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY) };
  }
}
function mmTouchMove(e,id){
  var st=_mmState[id]; if(!st) return;
  e.stopPropagation();
  var svg=document.getElementById(id); if(!svg) return;
  var rect=svg.getBoundingClientRect();
  var vb=st.vb.slice();
  var sx=vb[2]/rect.width, sy=vb[3]/rect.height;

  if(st.mode==='pan' && e.touches.length===1){
    // 한 손가락 이동
    e.preventDefault();
    var t=e.touches[0];
    var dx=(t.clientX-st.cx)*sx, dy=(t.clientY-st.cy)*sy;
    vb[0]-=dx; vb[1]-=dy;
    svg.setAttribute('viewBox', vb.join(' '));
    st.vb=vb; st.cx=t.clientX; st.cy=t.clientY;
  } else if(st.mode==='zoom' && e.touches.length===2){
    // 두 손가락 확대 + 이동
    e.preventDefault();
    var t0=e.touches[0], t1=e.touches[1];
    var cx=(t0.clientX+t1.clientX)/2, cy=(t0.clientY+t1.clientY)/2;
    var dist=Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
    var dx2=(cx-st.cx)*sx, dy2=(cy-st.cy)*sy;
    vb[0]-=dx2; vb[1]-=dy2;
    if(st.dist>0 && Math.abs(dist-st.dist)>3){
      var scale=st.dist/dist;
      scale=Math.max(0.85,Math.min(1.15,scale));
      var fx=vb[0]+(cx-rect.left)*sx;
      var fy=vb[1]+(cy-rect.top)*sy;
      var nw=vb[2]*scale, nh=vb[3]*scale;
      nw=Math.max(80,Math.min(1600,nw)); nh=Math.max(50,Math.min(1000,nh));
      vb[0]=fx-(cx-rect.left)/rect.width*nw;
      vb[1]=fy-(cy-rect.top)/rect.height*nh;
      vb[2]=nw; vb[3]=nh;
    }
    svg.setAttribute('viewBox', vb.join(' '));
    st.vb=vb; st.cx=cx; st.cy=cy; st.dist=dist;
  }
}
function mmTouchEnd(e,id){
  if(e.touches.length===0){ delete _mmState[id]; }
  else if(e.touches.length===1 && _mmState[id]){
    // 두 손가락 → 한 손가락으로 줄면 이동 모드로 재시작
    var svg=document.getElementById(id);
    var vb=svg?svg.getAttribute('viewBox').split(' ').map(Number):_mmState[id].vb;
    var t=e.touches[0];
    _mmState[id]={ mode:'pan', vb:vb, cx:t.clientX, cy:t.clientY };
  }
}

// ── PFD 공정 선택 ──
function pfdProcessList(){
  // 데이터에 등장하는 공정 목록 (process 필드 기준)
  var set={};
  (PFD.eqs||[]).forEach(function(e){ if(e.process) set[e.process]=1; });
  (PFD.sps||[]).forEach(function(s){ if(s.process) set[s.process]=1; });
  var arr=Object.keys(set);
  // processes 메타에 정의된 순서 우선
  if(PFD.processes){
    var ordered=Object.keys(PFD.processes).filter(function(p){return set[p];});
    arr.forEach(function(p){ if(ordered.indexOf(p)<0) ordered.push(p); });
    return ordered;
  }
  return arr;
}
function pfdSetProcess(p){ PFD_PROCESS=p; PFD_SELECTED=null; render(); setTimeout(function(){ var w=document.getElementById('pfd-wrap'); if(w){ w.scrollLeft=0; w.scrollTop=0; } },50); }

// ── PFD 확대/축소 ──
function pfdApplyZoom(centerClientX, centerClientY){
  var svg=document.getElementById('pfd-svg'), wrap=document.getElementById('pfd-wrap');
  if(!svg||!wrap) return;
  // 줌 중심점의 캔버스 내 비율 (확대 후 스크롤 보정용)
  var rect=wrap.getBoundingClientRect();
  var cx=(centerClientX!=null?centerClientX:rect.left+rect.width/2)-rect.left+wrap.scrollLeft;
  var cy=(centerClientY!=null?centerClientY:rect.top+rect.height/2)-rect.top+wrap.scrollTop;
  var oldW=svg.width.baseVal.value||1600;
  var ratio=(1600*PFD_ZOOM)/oldW;
  svg.setAttribute('width', Math.round(1600*PFD_ZOOM));
  svg.setAttribute('height', Math.round(1000*PFD_ZOOM));
  // 줌 중심이 화면상 같은 위치에 오도록 스크롤 조정
  wrap.scrollLeft = cx*ratio - (centerClientX!=null?centerClientX-rect.left:rect.width/2);
  wrap.scrollTop  = cy*ratio - (centerClientY!=null?centerClientY-rect.top:rect.height/2);
}
function pfdZoom(factor, cx, cy){
  var nz=PFD_ZOOM*factor;
  nz=Math.max(0.3, Math.min(4, nz));  // 0.3x ~ 4x 제한
  PFD_ZOOM=nz;
  pfdApplyZoom(cx, cy);
}
function pfdZoomFit(){
  // 화면 너비에 맞춰 전체가 보이게
  var wrap=document.getElementById('pfd-wrap');
  if(!wrap) return;
  var avail=wrap.clientWidth-4;
  PFD_ZOOM=Math.max(0.3, Math.min(1, avail/1600));
  var svg=document.getElementById('pfd-svg');
  svg.setAttribute('width', Math.round(1600*PFD_ZOOM));
  svg.setAttribute('height', Math.round(1000*PFD_ZOOM));
  wrap.scrollLeft=0; wrap.scrollTop=0;
}
// 핀치 줌 (모바일)
var _pinchDist=0, _pinchZoom0=1;
function pfdPinchStart(e){
  if(e.touches.length===2){
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    _pinchDist=Math.sqrt(dx*dx+dy*dy); _pinchZoom0=PFD_ZOOM;
  }
}
function pfdPinchMove(e){
  if(e.touches.length===2 && _pinchDist>0){
    e.preventDefault();
    var dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
    var d=Math.sqrt(dx*dx+dy*dy);
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2, cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    PFD_ZOOM=Math.max(0.3, Math.min(4, _pinchZoom0*(d/_pinchDist)));
    pfdApplyZoom(cx, cy);
  }
}
function pfdPinchEnd(e){ if(e.touches.length<2) _pinchDist=0; }
function pfdInProc(item){
  // 공정 필터: ALL이면 전부, 아니면 process 일치(필드 없으면 표시)
  if(PFD_PROCESS==='ALL') return true;
  if(!item.process) return true; // 공정 미지정은 항상 표시(공용 배관 등)
  return item.process===PFD_PROCESS;
}
