<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분석 Schedule</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif; background:#f4f6f9; color:#222; }
  .wrap { max-width:760px; margin:0 auto; padding:14px; }
  .header { background:linear-gradient(135deg,#1a5276,#2980b9); color:#fff; border-radius:14px; padding:18px; margin-bottom:12px; }
  .header h1 { font-size:19px; margin-bottom:4px; }
  .header .date { font-size:13px; opacity:.9; }
  .progress-wrap { background:rgba(255,255,255,.25); border-radius:8px; height:13px; margin-top:10px; overflow:hidden; }
  .progress-bar { background:#7dffb3; height:100%; width:0%; transition:width .3s; }
  .progress-txt { font-size:12px; margin-top:5px; opacity:.95; }
  .view-tabs, .shift-tabs { display:flex; gap:8px; margin-bottom:10px; }
  .view-tabs button, .shift-tabs button { flex:1; padding:11px; border-radius:10px; border:2px solid #ccd6e0; background:#fff; font-size:14px; font-weight:700; cursor:pointer; }
  .view-tabs button.active { background:#2980b9; border-color:#2980b9; color:#fff; }
  .shift-tabs button.active-day { background:#fff8e1; border-color:#f39c12; color:#9a6700; }
  .shift-tabs button.active-night { background:#1a2c47; border-color:#1a2c47; color:#fff; }
  .toggles { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .tg { display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #ccd6e0; border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer; user-select:none; }
  .tg input { width:18px; height:18px; }
  /* 좌우 배열 */
  .slot-cols { display:flex; gap:10px; margin-bottom:12px; }
  .slot-col { flex:1; min-width:0; }
  .slot-card { background:#fff; border-radius:12px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); height:100%; }
  .slot-title { font-size:14px; font-weight:700; color:#1a5276; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid #eaf0f6; }
  .proc-group { margin-bottom:10px; }
  .proc-label { display:inline-block; font-size:15px; font-weight:800; padding:4px 11px; border-radius:7px; margin-bottom:7px; letter-spacing:.5px; }
  .p-SM { background:#d5f5e3; color:#1e8449; }
  .p-MTBE { background:#fdebd0; color:#ca6f1e; }
  .p-C5 { background:#d6eaf8; color:#2471a3; }
  .p-TY { background:#fcf3cf; color:#9a7d0a; }
  .p-SHIP { background:#e8daef; color:#6c3483; }
  .p-CERT { background:#fadbd8; color:#943126; }
  .task { border:1px solid #e3e8ee; border-radius:9px; padding:9px; margin-bottom:7px; display:flex; gap:8px; align-items:flex-start; }
  .task.done { background:#f0fff4; border-color:#b7e4c7; }
  .task.done .t-title { text-decoration:line-through; color:#999; }
  .task input[type=checkbox] { width:20px; height:20px; margin-top:1px; flex-shrink:0; cursor:pointer; }
  .t-body { flex:1; min-width:0; }
  .t-title { font-size:13px; font-weight:600; word-break:break-all; }
  .t-note { font-size:11px; color:#c0392b; margin-top:3px; }
  .t-anal { margin-top:4px; }
  .t-anal span { display:inline-block; font-size:10px; background:#eaf2f8; color:#21618c; border:1px solid #aed6f1; border-radius:4px; padding:1px 5px; margin-right:3px; margin-bottom:2px; }
  .t-week { display:inline-block; font-size:10px; background:#eee; color:#666; border-radius:4px; padding:1px 5px; margin-left:5px; }
  .t-cond { display:inline-block; font-size:10px; background:#fdecea; color:#c0392b; border-radius:4px; padding:1px 5px; margin-left:5px; }
  .cert-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:4px solid #943126; }
  .cert-card .slot-title { color:#943126; border-color:#fadbd8; }
  /* 분석별 보기 */
  .anal-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .anal-title { font-size:16px; font-weight:800; color:#1a5276; margin-bottom:10px; padding:5px 12px; background:#eaf2f8; border-radius:7px; display:inline-block; }
  .anal-sample { font-size:13px; padding:6px 4px; border-bottom:1px solid #f0f0f0; line-height:1.5; }
  .anal-sample:last-child { border-bottom:none; }
  .anal-sample .s-name { font-weight:700; color:#21618c; }
  .anal-sample .s-proc { display:inline-block; font-size:10px; border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:700; }
  .card { background:#fff; border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .card h2 { font-size:14px; margin-bottom:8px; color:#1a5276; }
  .sample-input { width:100%; border:1px solid #ccd6e0; border-radius:8px; padding:10px; font-size:14px; min-height:54px; resize:vertical; font-family:inherit; }
  .btn { border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-blue { background:#2980b9; color:#fff; }
  .btn-green { background:#27ae60; color:#fff; }
  .btn-red { background:#fdecea; color:#c0392b; padding:6px 10px; }
  .row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .adhoc-input { flex:1; border:1px solid #ccd6e0; border-radius:8px; padding:9px; font-size:13px; min-width:684px; }
  .empty { color:#aaa; font-size:12px; padding:6px 0; }
  /* GC 실험실 배치 */
  .gc-layout { position:relative; width:100%; overflow-x:auto; margin-bottom:10px; }
  .gc-map { display:grid; grid-template-columns:repeat(18,34px); grid-template-rows:repeat(8,34px); gap:4px; min-width:684px; }
  /* 전체 보기 모드: 셀 축소해서 가로 스크롤 없이 #27까지 */
  .gc-layout.gc-fit { overflow-x:hidden; }
  .gc-layout.gc-fit .gc-map { grid-template-columns:repeat(18,1fr); grid-template-rows:repeat(8,auto); gap:2px; min-width:0; width:100%; }
  .gc-layout.gc-fit .gc-cell, .gc-layout.gc-fit .gc-blank { width:100%; height:46px; min-width:0; font-size:13px; border-radius:8px; }
  .gc-page-B .gc-cell, .gc-page-B .gc-blank { height:46px; font-size:13px; }
  .gc-page-tabs { display:flex; gap:6px; margin-bottom:10px; }
  .gc-page-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid #aed6f1; background:#eaf2f8; color:#21618c; font-size:13px; font-weight:700; cursor:pointer; }
  .gc-page-btn.on { background:#2980b9; color:#fff; border-color:#2980b9; }
  /* 기본(PC): 전체 배치도만, 탭/모바일 숨김 */
  .gc-page-tabs { display:none; }
  .gc-mobile { display:none; }
  .gc-pc { display:block; }
  /* 모바일(600px 이하): 탭 표시, PC 전체 숨김, 선택 페이지만 */
  @media (max-width:600px) {
    .gc-page-tabs { display:flex; }
    .gc-pc { display:none; }
    .gc-mobile { display:none; }
    .gc-mobile.show { display:block; }
  }
  .gc-cell { width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:7px; font-size:11px; font-weight:700; cursor:pointer;
    border:2px solid #e3e8ee; background:#f4f6f9; color:#ccc; user-select:none; transition:all .15s; }
  .gc-cell-active { background:#eaf2f8; border-color:#2980b9; color:#1a5276; }
  .gc-cell-active:hover { background:#d6eaf8; }
  .gc-cell-empty { cursor:default; }
  .gc-cell-selected { background:#2980b9 !important; border-color:#1a5276 !important; color:#fff !important; }
  .gc-blank { width:34px; height:34px; }
  .gc-sample-area { border-top:1px solid #eaf0f6; padding-top:6px; min-height:40px; }
  /* GC 팝업 */
  .gc-popup-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,.5); z-index:99999; display:flex; align-items:center; justify-content:center; }
  .gc-popup { background:#fff; border-radius:14px; width:88vw; max-width:420px; max-height:80vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,.35); }
  .gc-popup-head { font-size:17px; font-weight:800; color:#1a5276; padding:16px 18px; border-bottom:2px solid #eaf2f8; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; }
  .gc-popup-close { cursor:pointer; font-size:18px; color:#999; padding:2px 8px; border-radius:6px; }
  .gc-popup-close:hover { background:#f0f0f0; }
  .gc-popup-body { padding:10px 18px 18px; }
  /* 분석 토글 카드 */
  .anal-toggle { cursor:pointer; }
  .anal-toggle-head { display:flex; align-items:center; justify-content:space-between; }
  .anal-count { font-size:12px; color:#888; font-weight:600; }
  .anal-arrow { font-size:11px; margin-left:2px; }
  .anal-toggle-body { margin-top:8px; }
  @media (max-width:600px) {
    .slot-cols { flex-direction:column; }
  }
</style>
</head>

function setSelectedDate(v){ SELECTED_DATE = v || null; render(); }
function weekOfMonth(d){ return Math.ceil(d.getDate()/7); }
function loadSchedule(){
  try { var s = JSON.parse(localStorage.getItem('ncc_schedule_v3')); if (s) return s; } catch(e){}
  return SCHEDULE_DEFAULT;
}
function loadCond200(){
  // 200가동은 날짜와 무관하게 전역 저장, 기본값 true(활성화)

  if (v === null) return true;
  return v === '1';
}

function loadDaily(k){
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('ncc_daily-'+k)); } catch(e){}
  var defShift = new Date().getHours() >= 7 && new Date().getHours() < 19 ? 'day' : 'night';
  var base = saved || { shift:defShift, view:'day', checks:{}, samples:'', adhoc:[], adhocChecks:{}, condPAR:false, condSMTK:false, condSMT327:false };
  // cond200은 항상 전역 저장소에서 가져옴

}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getVisibleTasks(daily, dayIdx, week){
  var sched = loadSchedule();
  var allTasks = sched[String(dayIdx)] || [];
  function visible(t){
    if (t.weeks && t.weeks.indexOf(week) === -1) return false;
    if (t.cond === '200가동' && !daily.cond200) return false;
    if (t.cond === 'PAR운전' && !daily.condPAR) return false;
    if (t.cond === 'SMTK' && !daily.condSMTK) return false;
    if (t.cond === 'SMT327' && !daily.condSMT327) return false;
    return true;
  }
  var slots = daily.shift === 'day' ? ['d1','d2','ty','ship'] : ['n1','n2'];
  return allTasks.filter(function(t){ return slots.indexOf(t.slot) !== -1 && visible(t); });
}

function taskHtml(t, daily){
  var id = taskId(t);
  var ck = daily.checks[id] ? 'checked' : '';
  var dn = daily.checks[id] ? ' done' : '';
  var h = '<div class="task'+dn+'"><input type="checkbox" '+ck+' onchange="toggleTask(\''+id.replace(/'/g,"\\'")+'\')">';
  h += '<div class="t-body"><div class="t-title">' + esc(t.title);
  if (t.weeks) h += '<span class="t-week">'+t.weeks.join(',')+'주</span>';
  if (t.cond) h += '<span class="t-cond">'+esc(t.cond==='SMT327'?'비정기':t.cond)+'</span>';
  h += '</div>';
  if (t.note) h += '<div class="t-note">'+esc(t.note)+'</div>';
  if (t.analysis && t.analysis.length) {
    h += '<div class="t-anal">';
    t.analysis.forEach(function(a){ h += '<span>'+esc(a)+'</span>'; });
    h += '</div>';
  }
  h += '</div></div>';
  return h;
}

function renderProcGroups(tasks, daily){
  var h = '';
  PROC_ORDER.forEach(function(proc){
    var ptasks = tasks.filter(function(t){ return t.proc === proc; });
    if (ptasks.length === 0) return;
    var pcls = PROC_CLS[proc] || '';
    h += '<div class="proc-group"><span class="proc-label ' + pcls + '">' + esc(proc) + '</span>';
    ptasks.forEach(function(t){ h += taskHtml(t, daily); });
    h += '</div>';
  });
  return h || '<div class="empty">해당 없음</div>';
}

function render(){
  var app = document.getElementById('app');
  var now = getCurrentDate();
  var tk = todayKey();
  var daily = loadDaily(tk);
  var dayIdx = now.getDay();
  var week = weekOfMonth(now);
  var visTasks = getVisibleTasks(daily, dayIdx, week);

  var total = visTasks.length + daily.adhoc.length, done = 0;
  visTasks.forEach(function(t){ if (daily.checks[taskId(t)]) done++; });
  daily.adhoc.forEach(function(t,i){ if (daily.adhocChecks['a'+i]) done++; });
  var pct = total>0 ? Math.round(done/total*100) : 0;

  var html = '';
  html += '<div class="header"><h1>🧪 분석 Schedule</h1>';
  html += '<div class="date">' + tk + ' (' + DAY_NAMES[dayIdx] + ') · ' + week + '주차 <span style="opacity:.7;font-size:11px;margin-left:6px;">' + APP_VERSION + '</span></div>';
  html += '<div style="margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
  html += '<input type="date" value="'+tk+'" onchange="setSelectedDate(this.value)" style="border:none;border-radius:7px;padding:5px 9px;font-size:12px;font-family:inherit;cursor:pointer;">';
  if (SELECTED_DATE) html += '<button onclick="setSelectedDate(null)" style="border:none;border-radius:7px;padding:5px 10px;font-size:12px;background:rgba(255,255,255,.25);color:#fff;cursor:pointer;">오늘로</button>';
  html += '</div>';
  html += '<div class="progress-wrap"><div class="progress-bar" style="width:'+pct+'%"></div></div>';
  html += '<div class="progress-txt">' + done + ' / ' + total + ' 완료 (' + pct + '%)</div></div>';

  html += '<div class="view-tabs">';
  html += '<button class="'+(daily.view!=='anal'?'active':'')+'" onclick="setView(\'day\')">📅 요일별 보기</button>';
  html += '<button class="'+(daily.view==='anal'?'active':'')+'" onclick="setView(\'anal\')">🔬 분석별 보기</button>';
  html += '</div>';

  html += '<div class="shift-tabs">';
  html += '<button class="' + (daily.shift==='day'?'active-day':'') + '" onclick="setShift(\'day\')">☀️ 주간 (07~19시)</button>';
  html += '<button class="' + (daily.shift==='night'?'active-night':'') + '" onclick="setShift(\'night\')">🌙 야간 (19~07시)</button>';
  html += '</div>';

  html += '<div class="toggles">';
  html += '<label class="tg"><input type="checkbox" ' + (daily.cond200?'checked':'') + ' onchange="toggleCond(\'cond200\')"> 200 가동</label>';
  html += '<label class="tg"><input type="checkbox" ' + (daily.condPAR?'checked':'') + ' onchange="toggleCond(\'condPAR\')"> PAR UNIT</label>';
  html += '<label class="tg"><input type="checkbox" ' + (daily.condSMTK?'checked':'') + ' onchange="toggleCond(\'condSMTK\')"> SM TK(MT-317B) 출하</label>';
  html += '<label class="tg"><input type="checkbox" ' + (daily.condSMT327?'checked':'') + ' onchange="toggleCond(\'condSMT327\')"> S-Mt 327</label>';
  html += '</div>';

  if (daily.view === 'anal') {
    html += renderAnalView(visTasks, daily);
  } else {
    html += renderDayView(visTasks, daily);
  }

  // 메모 + 추가작업
  html += '<div class="card"><h2>📋 특이사항 / LIMS 메모</h2>';
  html += '<textarea class="sample-input" id="sampleMemo">' + esc(daily.samples) + '</textarea>';
  html += '<div class="row"><button class="btn btn-blue" onclick="saveSamples()">메모 저장</button></div></div>';
  html += '<div class="card"><h2>➕ 오늘만 추가 작업</h2>';
  daily.adhoc.forEach(function(t,i){
    var ck = daily.adhocChecks['a'+i] ? 'checked' : '';
    var dn = daily.adhocChecks['a'+i] ? ' done' : '';
    html += '<div class="task'+dn+'"><input type="checkbox" '+ck+' onchange="toggleAdhoc('+i+')">';
    html += '<div class="t-body"><div class="t-title">'+esc(t)+'</div></div>';
    html += '<button class="btn btn-red" onclick="removeAdhoc('+i+')">✕</button></div>';
  });
  html += '<div class="row"><input class="adhoc-input" id="adhocInput" placeholder="예: S-22 재분석">';
  html += '<button class="btn btn-green" onclick="addAdhoc()">추가</button></div></div>';

  app.innerHTML = html;
}

// ── 요일별 보기: 주간이면 전반|후반 좌우, 그 아래 T/Y, 성적서 ──
function renderDayView(visTasks, daily){
  var html = '';
  if (daily.shift === 'day') {
    var d1 = visTasks.filter(function(t){ return t.slot === 'd1'; });
    var d2 = visTasks.filter(function(t){ return t.slot === 'd2'; });
    html += '<div class="slot-cols">';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.d1 + '</div>' + renderProcGroups(d1, daily) + '</div></div>';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.d2 + '</div>' + renderProcGroups(d2, daily) + '</div></div>';
    html += '</div>';
    // T/Y
    var ty = visTasks.filter(function(t){ return t.slot === 'ty'; });
    if (ty.length) html += '<div class="slot-card" style="margin-bottom:12px;"><div class="slot-title">⏰ ' + SLOT_INFO.ty + '</div>' + renderProcGroups(ty, daily) + '</div>';
    // 성적서/출하
    var ship = visTasks.filter(function(t){ return t.slot === 'ship'; });
    if (ship.length) {
      html += '<div class="cert-card"><div class="slot-title">📤 성적서 발송 / 출하</div>';
      ship.forEach(function(t){
        html += taskHtml(t, daily);
      });
      html += '</div>';
    }
  } else {
    var n1 = visTasks.filter(function(t){ return t.slot === 'n1'; });
    var n2 = visTasks.filter(function(t){ return t.slot === 'n2'; });
    html += '<div class="slot-cols">';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.n1 + '</div>' + renderProcGroups(n1, daily) + '</div></div>';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.n2 + '</div>' + renderProcGroups(n2, daily) + '</div></div>';
    html += '</div>';
  }
  return html;
}

// ── 분석별 보기: 분석 종류별로 샘플 나열 (C5 sub 분리) ──
function renderAnalView(visTasks, daily){
  var gcGroups = {};
  var otherGroups = {};

  function addSample(analName, sampleName, proc){
    var gcM = analName.match(/^GC\s*#?([0-9]+)$/i);
    if (gcM) {
      var num = String(parseInt(gcM[1]));
      if (!gcGroups[num]) gcGroups[num] = [];
      gcGroups[num].push({sample: sampleName, proc: proc});
    } else {
      if (!otherGroups[analName]) otherGroups[analName] = [];
      otherGroups[analName].push({sample: sampleName, proc: proc});
    }
  }

  visTasks.forEach(function(t){
    var items = [];
    if (t.sub && t.sub.length) {
      t.sub.forEach(function(s){ items.push({title:s.sample, proc:t.proc, analysis:s.analysis}); });
    } else {
      items.push({title:t.title, proc:t.proc, analysis:t.analysis||[]});
    }
    items.forEach(function(item){
      item.analysis.forEach(function(a){ addSample(a, item.title, item.proc); });
    });
  });

  window._gcData = gcGroups;

  var GC_POS = {
    1:[8,1], 2:[7,1], 3:[6,1], 4:[5,1], 5:[4,1], 6:[3,1],
    7:[2,2],
    8:[1,3], 9:[1,4], 10:[1,5], 11:[1,6],
    12:[2,7],
    13:[3,8], 14:[4,8], 15:[5,8], 16:[6,8],
    17:[6,11], 18:[5,11], 19:[4,11], 20:[3,11],
    21:[1,12], 22:[1,13], 23:[1,14], 24:[1,15], 25:[1,16], 26:[1,17],
    27:[2,17]
  };

  var html = '<div class="anal-card">';
  html += '<div class="anal-title">🔬 GC</div>';
  var gcPage = localStorage.getItem('ncc_gcpage') || 'A';
  // 페이지 탭 (CSS로 모바일에서만 표시)
  html += '<div class="gc-page-tabs">';
  html += '<button class="gc-page-btn'+(gcPage==='A'?' on':'')+'" onclick="setGcPage(\'A\')">#1~16</button>';
  html += '<button class="gc-page-btn'+(gcPage==='B'?' on':'')+'" onclick="setGcPage(\'B\')">#17~27</button>';
  html += '</div>';
  // 배치도 셀 생성 함수 (열 범위 지정)
  function buildMap(cMin, cMax){
    var s = '';
    for (var row=1; row<=8; row++) {
      for (var col=cMin; col<=cMax; col++) {
        var found = null;
        for (var n=1; n<=27; n++) {
          if (GC_POS[n] && GC_POS[n][0]===row && GC_POS[n][1]===col) { found=n; break; }
        }
        if (found) {
          var key = String(found);
          var hasData = !!gcGroups[key];
          var cls = 'gc-cell' + (hasData ? ' gc-cell-active' : ' gc-cell-empty');
          s += '<div class="'+cls+'" onclick="openGcPopup(\''+key+'\')">#'+found+'</div>';
        } else {
          s += '<div class="gc-blank"></div>';
        }
      }
    }
    return s;
  }
  // PC용: 전체(1~18열) 한 번에
  html += '<div class="gc-layout gc-pc"><div class="gc-map gc-map-full" style="grid-template-columns:repeat(18,34px);">';
  html += buildMap(1,18);
  html += '</div></div>';
  // 모바일용 A: 1~8열(#1~16), B: 9~18열(#17~27)
  html += '<div class="gc-layout gc-mobile gc-fit gc-page-A'+(gcPage==='A'?' show':'')+'"><div class="gc-map" style="grid-template-columns:repeat(8,1fr);">';
  html += buildMap(1,8);
  html += '</div></div>';
  html += '<div class="gc-layout gc-mobile gc-fit gc-page-B'+(gcPage==='B'?' show':'')+'"><div class="gc-map" style="grid-template-columns:repeat(7,1fr);">';
  html += buildMap(11,17);
  html += '</div></div>';
  html += '</div>';

  // 기타 분석 카드 - 토글(접기/펼치기)
  var otherKeys = Object.keys(otherGroups).sort(function(a,b){
    if (a==='성적서') return 1; if (b==='성적서') return -1;
    return a.localeCompare(b,'ko');
  });
  otherKeys.forEach(function(a, idx){
    var aid = 'anal-toggle-'+idx;
    html += '<div class="anal-card anal-toggle" onclick="toggleAnal(this)">';
    html += '<div class="anal-toggle-head"><span class="anal-title" style="margin:0;">🔬 '+esc(a)+'</span>';
    html += '<span class="anal-count">'+otherGroups[a].length+'건 <span class="anal-arrow">▾</span></span></div>';
    html += '<div class="anal-toggle-body" style="display:none;">';
    otherGroups[a].forEach(function(item){
      var pcls = PROC_CLS[item.proc]||'';
      html += '<div class="anal-sample"><span class="s-name">'+esc(item.sample)+'</span>'+
              '<span class="s-proc '+pcls+'">'+esc(item.proc)+'</span></div>';
    });
    html += '</div></div>';
  });

  return html || '<div class="card"><div class="empty">표시할 항목이 없어요</div></div>';
}

// 분석 카드 토글
function toggleAnal(card){
  var body = card.querySelector('.anal-toggle-body');
  var arrow = card.querySelector('.anal-arrow');
  if (body.style.display === 'none') { body.style.display='block'; if(arrow)arrow.textContent='▴'; }
  else { body.style.display='none'; if(arrow)arrow.textContent='▾'; }
}

function setGcPage(p){
  localStorage.setItem('ncc_gcpage', p);
  render();
}
// GC 클릭 시 팝업
function openGcPopup(num){
  var data = window._gcData && window._gcData[num];
  if (!data || data.length === 0) return;
  var html = '<div class="gc-popup-overlay" onclick="closeGcPopup(event)">';
  html += '<div class="gc-popup" onclick="event.stopPropagation();">';
  html += '<div class="gc-popup-head">🔬 GC #'+num+' <span style="font-size:13px;color:#888;font-weight:400;">('+data.length+'건)</span>';
  html += '<span class="gc-popup-close" onclick="closeGcPopup(event)">✕</span></div>';
  html += '<div class="gc-popup-body">';
  data.forEach(function(item){
    var pcls = (PROC_CLS||{})[item.proc]||'';
    html += '<div class="anal-sample"><span class="s-name">'+item.sample+'</span>'+
            '<span class="s-proc '+pcls+'">'+item.proc+'</span></div>';
  });
  html += '</div></div></div>';
  // 기존 팝업 제거
  var ex = document.getElementById('gcPopupRoot');
  if (ex) ex.remove();
  var div = document.createElement('div');
  div.id = 'gcPopupRoot';
  div.innerHTML = html;
  // body 맨 끝에 추가 (fixed가 viewport 기준이 되도록)
  document.body.appendChild(div);
  // 스크롤 잠금 (배경 안 움직이게)
  document.body.style.overflow = 'hidden';
}
function closeGcPopup(e){
  if(e) e.stopPropagation();
  var root = document.getElementById('gcPopupRoot');
  if (root) root.remove();
  document.body.style.overflow = '';
}



function setView(v){ var tk=todayKey(); var d=loadDaily(tk); d.view = (v==='anal'?'anal':'day'); saveDaily(tk,d); render(); }
function setShift(s){ var tk=todayKey(); var d=loadDaily(tk); d.shift=s; saveDaily(tk,d); render(); }
function toggleCond(key){
  var tk=todayKey(); var d=loadDaily(tk);
  d[key]=!d[key];
  if (key === 'cond200') { saveCond200(d.cond200); }
  saveDaily(tk,d); render();
}
function toggleTask(id){ var tk=todayKey(); var d=loadDaily(tk); d.checks[id]=!d.checks[id]; saveDaily(tk,d); render(); }
function toggleAdhoc(i){ var tk=todayKey(); var d=loadDaily(tk); d.adhocChecks['a'+i]=!d.adhocChecks['a'+i]; saveDaily(tk,d); render(); }
function saveSamples(){ var tk=todayKey(); var d=loadDaily(tk); d.samples=document.getElementById('sampleMemo').value; saveDaily(tk,d); alert('저장됐어요'); }
function addAdhoc(){
  var v=document.getElementById('adhocInput').value.trim(); if(!v) return;
  var tk=todayKey(); var d=loadDaily(tk); d.adhoc.push(v); saveDaily(tk,d); render();
}
function removeAdhoc(i){
  var tk=todayKey(); var d=loadDaily(tk);
  d.adhoc.splice(i,1);
  var nc={}; d.adhoc.forEach(function(_,j){ nc['a'+j]=d.adhocChecks['a'+(j<i?j:j+1)]||false; });
  d.adhocChecks=nc; saveDaily(tk,d); render();
}

render();
</script>
