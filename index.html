<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분석 Schedule</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html { overflow-x:hidden; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif; background:#f4f6f9; color:#222; overflow-x:hidden; max-width:100%; }
  .wrap { max-width:760px; margin:0 auto; padding:14px; }
  .header { background:linear-gradient(135deg,#1a5276,#2980b9); color:#fff; border-radius:14px; padding:18px; margin-bottom:12px; }
  .header h1 { font-size:19px; margin-bottom:4px; }
  .header .date { font-size:13px; opacity:.9; }
  .progress-wrap { background:rgba(255,255,255,.25); border-radius:8px; height:13px; margin-top:10px; overflow:hidden; }
  .progress-bar { background:#7dffb3; height:100%; width:0%; transition:width .3s; }
  .progress-txt { font-size:12px; margin-top:5px; opacity:.95; }
  .view-tabs, .shift-tabs { display:flex; gap:8px; margin-bottom:10px; }
  .view-tabs button, .shift-tabs button { flex:1; padding:11px; border-radius:10px; border:2px solid #ccd6e0; background:#fff; font-size:14px; font-weight:700; cursor:pointer; }
  .view-tabs button.active { background:#2980b9; border-color:#2980b9; color:#fff; }
  /* 샘플 검색 */
  .sample-search-wrap { position:relative; margin-bottom:10px; }
  .sample-search-wrap input { width:100%; padding:10px 38px 10px 14px; border:1.5px solid #c8d0d8; border-radius:10px; font-size:14px; background:#fff; }
  .sample-search-wrap .s-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); border:none; background:transparent; font-size:16px; color:#aaa; cursor:pointer; padding:0 4px; }
  .sample-search-result { background:#fff; border:1.5px solid #b0c4de; border-radius:12px; padding:14px 15px; margin-top:6px; }
  .sample-search-result .sr-none { color:#aaa; font-size:13px; text-align:center; padding:8px 0; }
  .sr-item { border-bottom:1px solid #f0f0f0; padding:10px 0; }
  .sr-item:last-child { border-bottom:none; }
  .sr-name { font-size:15px; font-weight:700; color:#1a5276; margin-bottom:6px; }
  .sr-row { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:4px; font-size:12px; }
  .sr-label { color:#888; font-weight:600; flex-shrink:0; }
  .sr-val { color:#333; }
  .sr-cycle { display:inline-block; background:#eaf2f8; color:#1a5276; border-radius:5px; padding:1px 7px; margin:2px 3px 0 0; font-size:11px; }
  .sr-anal span { display:inline-block; background:#eaf2f8; color:#21618c; border:1px solid #aed6f1; border-radius:4px; padding:1px 6px; margin:2px 3px 0 0; font-size:11px; }
  .sr-reason { background:#fffde7; border-left:3px solid #f39c12; padding:5px 9px; border-radius:4px; font-size:12px; color:#555; margin-top:4px; }
  .shift-tabs button.active-day { background:#fff8e1; border-color:#f39c12; color:#9a6700; }
  .shift-tabs button.active-night { background:#1a2c47; border-color:#1a2c47; color:#fff; }
  .toggles { display:flex; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .tg { display:flex; align-items:center; gap:6px; background:#fff; border:1px solid #ccd6e0; border-radius:8px; padding:8px 12px; font-size:13px; cursor:pointer; user-select:none; }
  .tg input { width:18px; height:18px; }
  /* 좌우 배열 */
  .slot-cols { display:flex; gap:10px; margin-bottom:12px; }
  .slot-col { flex:1; min-width:0; }
  .slot-card { background:#fff; border-radius:12px; padding:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); height:100%; }
  .slot-title { font-size:14px; font-weight:700; color:#1a5276; margin-bottom:10px; padding-bottom:6px; border-bottom:2px solid #eaf0f6; }
  .proc-group { margin-bottom:10px; }
  .proc-label { display:inline-block; font-size:15px; font-weight:800; padding:4px 11px; border-radius:7px; margin-bottom:7px; letter-spacing:.5px; }
  .p-SM { background:#d5f5e3; color:#1e8449; }
  .p-MTBE { background:#fdebd0; color:#ca6f1e; }
  .p-C5 { background:#d6eaf8; color:#2471a3; }
  .p-TY { background:#fcf3cf; color:#9a7d0a; }
  .p-SHIP { background:#e8daef; color:#6c3483; }
  .p-CERT { background:#fadbd8; color:#943126; }
  .task { border:1px solid #e3e8ee; border-radius:9px; padding:9px; margin-bottom:7px; display:flex; gap:8px; align-items:flex-start; }
  .task.done { background:#f0fff4; border-color:#b7e4c7; }
  .task.done .t-title { text-decoration:line-through; color:#999; }
  .task input[type=checkbox] { width:20px; height:20px; margin-top:1px; flex-shrink:0; cursor:pointer; }
  .t-body { flex:1; min-width:0; }
  /* 분석항목 적은 태스크 2열 그리드 */
  .task-pair { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:7px; }
  .task-pair .task { margin-bottom:0; }
  .t-title { font-size:13px; font-weight:600; word-break:break-all; }
  .name-edit { cursor:pointer; border-bottom:1px dashed #9bc3e0; }
  .name-edit:hover { color:#1967d2; }
  .t-note { font-size:11px; color:#c0392b; margin-top:3px; }
  .t-anal { margin-top:4px; }
  .t-anal span { display:inline-block; font-size:10px; background:#eaf2f8; color:#21618c; border:1px solid #aed6f1; border-radius:4px; padding:1px 5px; margin-right:3px; margin-bottom:2px; }
  .t-week { display:inline-block; font-size:10px; background:#eee; color:#666; border-radius:4px; padding:1px 5px; margin-left:5px; }
  .t-cond { display:inline-block; font-size:10px; background:#fdecea; color:#c0392b; border-radius:4px; padding:1px 5px; margin-left:5px; }
  /* 샘플 주의사항 아이콘 */
  .warn-icon { display:inline-block; margin-left:5px; cursor:pointer; font-size:12px; vertical-align:middle; user-select:none; line-height:1; }
  .warn-icon.has { filter:none; }
  .warn-icon.empty { opacity:.28; }
  .warn-icon.empty:hover { opacity:.7; }
  /* 분석 이유 아이콘 */
  .reason-icon { display:inline-block; margin-left:4px; cursor:pointer; font-size:12px; vertical-align:middle; user-select:none; line-height:1; opacity:.28; transition:opacity .15s; }
  .reason-icon.has { opacity:1; }
  .reason-icon:hover { opacity:.8; }
  /* 분석 이유 툴팁 */
  .reason-tip { position:fixed; z-index:2000; background:#1a1a2e; color:#e8e8f0; border-radius:10px; padding:10px 13px; font-size:12px; line-height:1.6; max-width:260px; white-space:pre-wrap; box-shadow:0 4px 16px rgba(0,0,0,.3); pointer-events:none; opacity:0; transition:opacity .15s; }
  .reason-tip.show { opacity:1; }
  /* 주의사항 툴팁 */
  .warn-tip {
    position:fixed; z-index:99998; max-width:260px;
    background:#2c3e50; color:#fff; font-size:12px; line-height:1.5;
    padding:9px 12px; border-radius:8px; box-shadow:0 4px 14px rgba(0,0,0,.25);
    white-space:pre-wrap; word-break:break-all; pointer-events:none;
    display:none;
  }
  .warn-tip.show { display:block; }
  .warn-tip::after { content:''; position:absolute; bottom:-6px; left:16px; border:6px solid transparent; border-top-color:#2c3e50; border-bottom:none; }
  /* 주의사항 입력 팝업 */
  .warn-edit-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:99999;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .warn-edit-box { background:#fff; border-radius:14px; padding:18px; width:88vw; max-width:380px; }
  .warn-edit-box h3 { font-size:15px; color:#1a5276; margin-bottom:4px; }
  .warn-edit-box .wsub { font-size:12px; color:#888; margin-bottom:10px; }
  .warn-edit-box textarea { width:100%; min-height:90px; border:1.5px solid #b0b8c1; border-radius:8px; padding:10px; font-size:14px; font-family:inherit; resize:vertical; }
  .warn-edit-box textarea:focus { outline:none; border-color:#1967d2; }
  .warn-edit-btns { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:12px; }
  .warn-edit-btns button { padding:11px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
  .wb-save { background:#1967d2; color:#fff; }
  .wb-cancel { background:#eef1f5; color:#555; }
  .wb-del { grid-column:1 / -1; background:transparent; color:#c0392b; border:1px solid #c0392b !important; }
  .cert-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); border-left:4px solid #943126; }
  .cert-card .slot-title { color:#943126; border-color:#fadbd8; }
  /* 분석별 보기 */
  .anal-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:10px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .anal-title { font-size:16px; font-weight:800; color:#1a5276; margin-bottom:10px; padding:5px 12px; background:#eaf2f8; border-radius:7px; display:inline-block; }
  .anal-sample { font-size:13px; padding:6px 4px; border-bottom:1px solid #f0f0f0; line-height:1.5; }
  .anal-sample:last-child { border-bottom:none; }
  .anal-sample .s-name { font-weight:700; color:#21618c; }
  .anal-sample .s-proc { display:inline-block; font-size:10px; border-radius:4px; padding:1px 6px; margin-left:6px; font-weight:700; }
  .card { background:#fff; border-radius:12px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,.06); }
  .card h2 { font-size:14px; margin-bottom:8px; color:#1a5276; }
  .sample-input { width:100%; border:1px solid #ccd6e0; border-radius:8px; padding:10px; font-size:14px; min-height:54px; resize:vertical; font-family:inherit; }
  .btn { border:none; border-radius:8px; padding:10px 14px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-blue { background:#2980b9; color:#fff; }
  .btn-green { background:#27ae60; color:#fff; }
  .btn-red { background:#fdecea; color:#c0392b; padding:6px 10px; }
  .row { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .adhoc-input { flex:1; border:1px solid #ccd6e0; border-radius:8px; padding:9px; font-size:13px; min-width:684px; }
  .empty { color:#aaa; font-size:12px; padding:6px 0; }
  /* GC 실험실 배치 */
  .gc-layout { position:relative; width:100%; overflow-x:auto; margin-bottom:10px; }
  .gc-map { display:grid; grid-template-columns:repeat(18,34px); grid-template-rows:repeat(8,34px); gap:4px; min-width:684px; }
  /* 전체 보기 모드: 셀 축소해서 가로 스크롤 없이 #27까지 */
  .gc-layout.gc-fit { overflow-x:hidden; }
  .gc-layout.gc-fit .gc-map { grid-template-columns:repeat(18,1fr); grid-template-rows:repeat(8,auto); gap:2px; min-width:0; width:100%; }
  .gc-layout.gc-fit .gc-cell, .gc-layout.gc-fit .gc-blank { width:100%; height:46px; min-width:0; font-size:13px; border-radius:8px; }
  .gc-page-B .gc-cell, .gc-page-B .gc-blank { height:46px; font-size:13px; }
  .gc-page-tabs { display:flex; gap:6px; margin-bottom:10px; }
  .gc-page-btn { flex:1; padding:8px; border-radius:8px; border:1.5px solid #aed6f1; background:#eaf2f8; color:#21618c; font-size:13px; font-weight:700; cursor:pointer; }
  .gc-page-btn.on { background:#2980b9; color:#fff; border-color:#2980b9; }
  /* 기본(PC): 전체 배치도만, 탭/모바일 숨김 */
  .gc-page-tabs { display:none; }
  .gc-mobile { display:none; }
  .gc-pc { display:block; }
  /* 모바일(600px 이하): 탭 표시, PC 전체 숨김, 선택 페이지만 */
  @media (max-width:600px) {
    .gc-page-tabs { display:flex; }
    .gc-pc { display:none; }
    .gc-mobile { display:none; }
    .gc-mobile.show { display:block; }
  }
  .gc-cell { width:34px; height:34px; display:flex; align-items:center; justify-content:center;
    border-radius:7px; font-size:11px; font-weight:700; cursor:pointer;
    border:2px solid #e3e8ee; background:#f4f6f9; color:#ccc; user-select:none; transition:all .15s; }
  .gc-cell-active { background:#eaf2f8; border-color:#2980b9; color:#1a5276; }
  .gc-cell-active:hover { background:#d6eaf8; }
  .gc-cell-empty { cursor:default; }
  .gc-cell-selected { background:#2980b9 !important; border-color:#1a5276 !important; color:#fff !important; }
  .gc-blank { width:34px; height:34px; }
  .gc-sample-area { border-top:1px solid #eaf0f6; padding-top:6px; min-height:40px; }
  /* GC 팝업 */
  .gc-popup-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,.5); z-index:99999; display:flex; align-items:center; justify-content:center; }
  .gc-popup { background:#fff; border-radius:14px; width:88vw; max-width:420px; max-height:80vh; overflow-y:auto; box-shadow:0 10px 40px rgba(0,0,0,.35); }
  .gc-popup-head { font-size:17px; font-weight:800; color:#1a5276; padding:16px 18px; border-bottom:2px solid #eaf2f8; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:#fff; }
  .gc-popup-close { cursor:pointer; font-size:18px; color:#999; padding:2px 8px; border-radius:6px; }
  .gc-popup-close:hover { background:#f0f0f0; }
  .gc-popup-body { padding:10px 18px 18px; }
  /* 분석 토글 카드 */
  .anal-toggle { cursor:pointer; }
  .anal-toggle-head { display:flex; align-items:center; justify-content:space-between; }
  .anal-count { font-size:12px; color:#888; font-weight:600; }
  .anal-arrow { font-size:11px; margin-left:2px; }
  .anal-toggle-body { margin-top:8px; }
  @media (max-width:600px) {
    .slot-cols { flex-direction:column; }
  }
  /* GitHub 설정 */
  .gh-settings-toggle { text-align:center; font-size:12px; color:#aaa; padding:14px 0; cursor:pointer; }
  .gh-settings-toggle:hover { color:#555; }
  .gh-settings { margin-top:10px; }
  .gh-card { background:#fff; border-radius:12px; padding:16px; margin-bottom:10px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .gh-status { font-size:13px; padding:9px 11px; border-radius:8px; margin-bottom:10px; text-align:center; }
  .gh-status.ok { background:#e8f5e9; color:#2e7d32; }
  .gh-status.none { background:#fff3e0; color:#e65100; }
  .gh-input { width:100%; padding:9px 11px; font-size:13px; font-family:monospace; border:1.5px solid #b0b8c1; border-radius:8px; background:#f5f5f7; margin-bottom:10px; }
  /* 📢 공지사항 (메일 요약) */
  .notice-box { background:#fff8e1; border:1px solid #f0c36d; border-left:5px solid #f39c12; border-radius:12px; padding:14px 16px; margin-bottom:12px; }
  .notice-head { display:flex; align-items:center; justify-content:space-between; font-size:15px; font-weight:700; color:#9a6700; margin-bottom:10px; }
  .notice-count { font-size:11px; font-weight:600; background:#f39c12; color:#fff; border-radius:10px; padding:2px 8px; }
  .notice-item { padding:10px 0; border-top:1px dashed #e0c080; position:relative; }
  .notice-item:first-of-type { border-top:none; padding-top:0; }
  .notice-title { font-size:14px; font-weight:700; color:#7a4f00; margin-bottom:3px; padding-right:28px; }
  .notice-meta { font-size:11px; color:#a0813a; margin-bottom:6px; }
  .notice-body { font-size:13px; line-height:1.7; color:#3a3a3a; }
  .notice-body ul { margin:4px 0 0 18px; }
  .notice-body li { margin-bottom:3px; }
  .notice-body div { margin-bottom:3px; }
  /* 줄 단위 강조 */
  .notice-body li { display:flex; align-items:baseline; gap:4px; list-style:none; margin-left:-18px; padding-left:0; }
  .notice-body li::before { content:'•'; flex-shrink:0; color:#9a6700; }
  .hl-btn { flex-shrink:0; border:none; background:transparent; cursor:pointer; font-size:13px; opacity:.35; padding:0 1px; line-height:1; transition:opacity .15s; }
  .hl-btn:hover { opacity:.7; }
  .hl-btn.on { opacity:1; }
  .hl-line { flex:1; }
  .hl-line.hl-yellow { background:#fff176; border-radius:3px; padding:0 3px; }
  .hl-line.hl-green  { background:#b9f6ca; border-radius:3px; padding:0 3px; }
  .hl-line.hl-red    { background:#ffcdd2; border-radius:3px; padding:0 3px; }
  .notice-del { border:none; background:transparent; font-size:16px; color:#c09030; cursor:pointer; padding:2px 4px; line-height:1; border-radius:4px; }
  .notice-del:hover { background:rgba(0,0,0,.07); }
  .notice-btn-group { position:absolute; top:8px; right:0; display:flex; gap:2px; align-items:center; }
  .notice-restore-btn { margin-top:8px; border:none; background:transparent; font-size:12px; color:#a0813a; cursor:pointer; text-decoration:underline; padding:0; }
  /* 숨긴 공지 보관함 팝업 */
  .hidden-notice-overlay { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:3000; display:flex; align-items:center; justify-content:center; }
  .hidden-notice-box { background:#fff; border-radius:14px; padding:18px; width:90vw; max-width:400px; max-height:80vh; overflow-y:auto; }
  .hidden-notice-box h3 { font-size:15px; color:#9a6700; margin-bottom:12px; }
  .hidden-notice-item { border:1px solid #e0c080; border-radius:8px; padding:10px 12px; margin-bottom:8px; background:#fffdf0; }
  .hidden-notice-item .hn-title { font-size:13px; font-weight:700; color:#7a4f00; margin-bottom:4px; }
  .hidden-notice-item .hn-meta { font-size:11px; color:#a0813a; margin-bottom:6px; }
  .hidden-notice-item button { border:none; background:#f39c12; color:#fff; border-radius:6px; padding:5px 12px; font-size:12px; font-weight:600; cursor:pointer; }
  .gh-btn { width:100%; padding:11px; background:#2980b9; color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .gh-sync-bar { display:flex; align-items:center; gap:8px; font-size:12px; color:#888; margin-bottom:10px; }
  /* 잠금 화면 (PC 전용) */
  #lock-screen { position:fixed; inset:0; background:#1d1d1f; z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; }
  .lock-icon { font-size:52px; margin-bottom:14px; }
  .lock-title { color:#fff; font-size:20px; font-weight:600; margin-bottom:6px; }
  .lock-sub { color:#86868b; font-size:13px; margin-bottom:26px; }
  #lock-input { width:100%; max-width:300px; padding:13px 15px; font-size:16px; border:1px solid #424245; border-radius:12px; background:#2c2c2e; color:#fff; margin-bottom:10px; text-align:center; }
  #lock-btn { width:100%; max-width:300px; padding:13px; background:#2980b9; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; }
  .lock-err { color:#ff453a; font-size:13px; margin-top:10px; min-height:18px; }
  /* 표시이름(샘플명) 편집 */
  .s-name-edit-btn { font-size:10px; opacity:.35; cursor:pointer; margin-left:3px; }
  .s-name-edit-btn:hover { opacity:.8; }
</style>
</head>
<body>
<div id="lock-screen" style="display:none;">
  <div class="lock-icon">🔒</div>
  <div class="lock-title">분석 Schedule</div>
  <div class="lock-sub">PC에서는 비밀번호가 필요해요</div>
  <input type="password" id="lock-input" placeholder="비밀번호" autocomplete="off" />
  <button id="lock-btn" onclick="checkLockPassword()">잠금 해제</button>
  <div class="lock-err" id="lock-err"></div>
</div>
<div class="wrap" id="app"></div>
<script>

      var res = await fetch(url, { headers: { 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json' } });
      if (res.ok) {
        var data = await res.json();
        _ghFileSha = data.sha;
        var decoded = decodeURIComponent(escape(atob(data.content.replace(/\\n/g,''))));
        applyCloudData(JSON.parse(decoded));
        return true;
      } else if (res.status === 404) {
        // 파일이 아직 없음 — 기본값으로 시작 (단, 이 기기에 임시백업이 있으면 그것부터 살림)
        var backup0 = getLocalBackup();
        CLOUD_DATA = backup0 ? Object.assign(JSON.parse(JSON.stringify(DEFAULT_CLOUD_SHAPE)), backup0)
                              : { refData: JSON.parse(JSON.stringify(REF_DEFAULT)), links:{}, warnings:{}, displayNames:{}, condStates:{cond200:true,condPAR:false,condSMTK:false,condSMT327:false} };
        if (backup0) showSyncStatus('⚠️ 이 컴퓨터의 임시 저장 내용을 불러왔어요. GitHub에 아직 반영 안 됐어요.');
        return true;
      }
    } else {
      // 토큰 없으면 raw.githubusercontent로 읽기 전용 시도
      var rawUrl = 'https://raw.githubusercontent.com/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/'+GH_BRANCH+'/'+GH_FILE_PATH+'?t='+Date.now();
      var r2 = await fetch(rawUrl);
      if (r2.ok) {
        var parsed2 = await r2.json();
        applyCloudData(parsed2);
        // 이 기기에 토큰 없이 작업해둔 임시백업이 있으면, GitHub 최신본 위에 덮어써서 작업분 보존
        var backup1 = getLocalBackup();
        if (backup1) {
          applyCloudData(backup1);
          showSyncStatus('⚠️ 이 컴퓨터에만 저장된 내용이 있어요. GitHub에 반영하려면 토큰을 등록하세요.');
        }
        return true;
      }
    }
  } catch(e){ console.warn('GitHub 로드 실패:', e); }
  // 네트워크 실패 등: 이 기기의 임시백업이 있으면 그걸로, 없으면 기본값
  var backup2 = getLocalBackup();
  if (backup2) {
    CLOUD_DATA = Object.assign(JSON.parse(JSON.stringify(DEFAULT_CLOUD_SHAPE)), backup2);
    showSyncStatus('⚠️ GitHub에 연결하지 못해 이 컴퓨터의 임시 저장 내용을 보여드려요.');
    return false;
  }
  CLOUD_DATA = { refData: JSON.parse(JSON.stringify(REF_DEFAULT)), links:{}, warnings:{}, displayNames:{}, condStates:{cond200:true,condPAR:false,condSMTK:false,condSMT327:false} };
  return false;
}

// CLOUD_DATA 변경 시 자동으로 GitHub에 저장 (디바운스: 800ms 뒤 1번만)
// 단, 사용자가 명시적으로 "저장" 버튼을 누른 변경(메모/참고자료/연결/표시이름/토글)은
// 디바운스 없이 syncNow()로 즉시 저장 — 저장 직후 새로고침해도 끊기지 않게 함.
var _syncTimer = null;
function syncToGitHub(){
  if (_syncTimer) clearTimeout(_syncTimer);
  _syncTimer = setTimeout(doSyncToGitHub, 800);
}
function syncNow(){
  if (_syncTimer) { clearTimeout(_syncTimer); _syncTimer = null; }
  doSyncToGitHub();
}
async function doSyncToGitHub(){
  var token = getGhToken();
  if (!token) {
    // 토큰이 없으면 GitHub엔 못 올리지만, 최소한 이 브라우저(같은 기기)에는 남겨서
    // 새로고침했을 때 작업 내용이 사라지지 않게 함. 단, 다른 기기에선 안 보임.
    try { localStorage.setItem('ncc_cloud_backup', JSON.stringify(CLOUD_DATA)); } catch(e){}
    showSyncStatus('⚠️ GitHub 토큰이 없어 이 컴퓨터에만 임시 저장돼요. 다른 기기에서 보려면 토큰을 등록하세요.');
    return;
  }
  if (_ghSyncing) return;
  _ghSyncing = true;
  showSyncStatus('☁️ 저장 중...');
  try {
    var url = 'https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/'+GH_FILE_PATH;
    var content = btoa(unescape(encodeURIComponent(JSON.stringify(CLOUD_DATA, null, 2))));
    var body = { message:'Update data.json from app', content: content, branch: GH_BRANCH };
    if (_ghFileSha) body.sha = _ghFileSha;
    var res = await fetch(url, {
      method:'PUT',
      headers:{ 'Authorization':'Bearer '+token, 'Accept':'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      var result = await res.json();
      _ghFileSha = result.content.sha;
      try { localStorage.removeItem('ncc_cloud_backup'); } catch(e){} // GitHub 저장 성공했으니 임시백업은 정리
      showSyncStatus('✓ 저장됨 (모든 기기에 반영)');
    } else {
      var err = await res.json().catch(function(){return {};});
      try { localStorage.setItem('ncc_cloud_backup', JSON.stringify(CLOUD_DATA)); } catch(e){}
      showSyncStatus('⚠️ 저장 실패: '+(err.message||res.status)+' (이 컴퓨터에만 임시 저장됨)');
    }
  } catch(e) {
    try { localStorage.setItem('ncc_cloud_backup', JSON.stringify(CLOUD_DATA)); } catch(e2){}
    showSyncStatus('⚠️ 저장 실패: '+e.message+' (이 컴퓨터에만 임시 저장됨)');
  } finally {
    _ghSyncing = false;
  }
}

var LOCK_PASSWORD_HASH = 'be3a0200cadbc7519c69077a3855d83f7c58469ee1fd7a3524587b297a658f88'; // 주식대시보드와 동일 비번

function isPcDevice(){

  var isTouchOnly = ('ontouchstart' in window) && !window.matchMedia('(pointer:fine)').matches;
  return window.innerWidth >= 900 && !isTouchOnly;

async function sha256Hex(text){
  var buf = new TextEncoder().encode(text);
  var hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
}
async function checkLockPassword(){
  var input = document.getElementById('lock-input');
  var err = document.getElementById('lock-err');
  if (!input.value) { err.textContent = '비밀번호를 입력하세요'; return; }
  var hash = await sha256Hex(input.value);
  if (hash === LOCK_PASSWORD_HASH) {
    sessionStorage.setItem(LOCK_SESSION_KEY, '1');
    document.getElementById('lock-screen').style.display = 'none';
    err.textContent = '';
  } else {
    err.textContent = '비밀번호가 틀렸어요';
    input.value = '';
    input.focus();
  }
}
function checkLockOnLoad(){
  if (!isPcDevice()) return; // 모바일은 잠금 없음
  if (sessionStorage.getItem(LOCK_SESSION_KEY) === '1') return; // 이미 해제됨
  document.getElementById('lock-screen').style.display = 'flex';
  var inp = document.getElementById('lock-input');
  inp.addEventListener('keydown', function(e){ if (e.key === 'Enter') checkLockPassword(); });
  inp.focus();
}

function showReasonTip(ev, sample){

  if(txt) html += '<div style="white-space:pre-wrap;">'+esc(txt)+'</div>';
  if(!txt && mini) html += '<div style="color:#9ab;font-size:11px;">분석 이유 미입력 (클릭하여 작성)</div>';
  tip.innerHTML = html;
  tip.style.maxWidth = mini ? '300px' : '260px';
  document.body.appendChild(tip);
  _reasonTipEl = tip;
  var r = ev.target.getBoundingClientRect();
  var tw = tip.offsetWidth || 280;
  var th = tip.offsetHeight || 200;
  var top = r.top - th - 8;
  var left = r.left - 8;
  if(top < 4) top = r.bottom + 8;
  if(left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  if(left < 4) left = 4;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  if(_reasonTipTimer) clearTimeout(_reasonTipTimer);
  _reasonTipTimer = setTimeout(hideReasonTip, 5000);
  // 툴팁 클릭하면 수정 팝업
  tip.style.pointerEvents = 'auto';
  tip.onclick = function(){ hideReasonTip(); openReasonEdit(sample); };
}

}
function warnTouchEnd(ev, sample, analKey){
  if(_warnLongTimer){
    // 짧게 탭 → 툴팁(내용) 표시
    clearTimeout(_warnLongTimer);
    _warnLongTimer = null;
    if(ev && ev.preventDefault) ev.preventDefault();  // 뒤따르는 click 방지
    if(_warnTipEl){ hideWarnTip(); }
    else { showWarnTip(ev, sample, analKey); }
  }
  // long press는 이미 openWarnEdit 호출됨
}
function warnTouchStartEmpty(ev, sample, analKey){
  // 내용 없는 아이콘: 길게 누르든 탭하든 바로 수정창
  if(ev && ev.preventDefault) ev.preventDefault();
  openWarnEdit(sample, analKey);
}
function warnTouchCancel(){
  if(_warnLongTimer){ clearTimeout(_warnLongTimer); _warnLongTimer = null; }
}
// 툴팁
var _warnTipEl = null;
function showWarnTip(ev, sample, analKey){
  var note = analKey ? getCombinedWarning(sample, analKey) : getCombinedWarning(sample);
  if (!note) return;
  hideWarnTip();
  var tip = document.createElement('div');
  tip.className = 'warn-tip show';
  if ('ontouchstart' in window) {
    // 모바일: 내용 + "길게 눌러 수정" 안내
    tip.textContent = note;
    var hint = document.createElement('div');
    hint.textContent = '✏️ 아이콘을 길게 누르면 수정';
    hint.style.cssText = 'margin-top:6px;font-size:11px;opacity:.7;border-top:1px solid rgba(255,255,255,.2);padding-top:5px;';
    tip.appendChild(hint);
  } else {
    tip.textContent = note;
  }
  document.body.appendChild(tip);
  _warnTipEl = tip;
  var r = ev.target.getBoundingClientRect();
  var tr = tip.getBoundingClientRect();
  var top = r.top - tr.height - 9;
  var left = r.left - 8;
  if (top < 4) top = r.bottom + 9;
  if (left + tr.width > window.innerWidth - 8) left = window.innerWidth - tr.width - 8;
  if (left < 4) left = 4;
  tip.style.top = top + 'px';
  tip.style.left = left + 'px';
  // 모바일: 바깥 탭하면 툴팁 닫기
  if ('ontouchstart' in window) {
    setTimeout(function(){
      document.addEventListener('touchstart', _warnOutsideClose, {once:true});
    }, 50);
  }
}
function _warnOutsideClose(e){
  if (e.target && e.target.classList && e.target.classList.contains('warn-icon')) return;
  hideWarnTip();
}
function hideWarnTip(){
  if (_warnTipEl) { _warnTipEl.remove(); _warnTipEl = null; }
}
function onWarnIconClick(ev, sample, analKey){
  if('ontouchstart' in window) return; // 모바일은 터치 이벤트로 처리
  ev.stopPropagation();
  // PC(마우스): 툴팁 떠있으면 수정, 아니면 툴팁
  if (_warnTipEl) { hideWarnTip(); openWarnEdit(sample, analKey); }
  else { showWarnTip(ev, sample, analKey); }
}
// 편집 팝업 (analKey: 분석별 보기 = '샘플명|분석명', 요일별 보기 = undefined)
function openWarnEdit(sample, analKey){
  hideWarnTip();
  var storageKey = analKey || sample;
  var existing = getWarning(sample, analKey);
  var isAnalMode = !!analKey;
  var analLabel = analKey ? analKey.split('|').slice(1).join('|') : '';
  var curCat = isAnalMode ? null : getSampleCategory(sample);
  var ref = loadRefData();
  var catKeys = Object.keys(ref).sort(function(a,b){ return a.localeCompare(b,'ko'); });
  var overlay = document.createElement('div');
  overlay.className = 'warn-edit-overlay';
  overlay._mdTarget=null;
  overlay.addEventListener('mousedown',function(e){ overlay._mdTarget=e.target; });
  overlay.addEventListener('click',function(e){ if(e.target===overlay && overlay._mdTarget===overlay) overlay.remove(); });
  var box = document.createElement('div');
  box.className = 'warn-edit-box';
  var titleHtml = isAnalMode
    ? '<h3>📝 '+esc(sample)+' · <span style="color:#2980b9;">'+esc(analLabel)+'</span> 메모</h3>'
      + '<div class="wsub">이 분석 항목에만 적용되는 메모예요. (분석별 보기 전용)</div>'
    : '<h3>⚠️ '+esc(sample)+' 주의사항</h3>'
      + '<div class="wsub">이 샘플이 나오는 모든 요일에 함께 표시돼요. (내 브라우저에만 저장)</div>';
  var catHtml = isAnalMode ? '' :
    '<div style="font-size:12px;color:#555;margin:10px 0 4px;font-weight:600;">📚 참고자료 분류 연결</div>'+
    '<select id="warnCatSelect" class="ns-input" style="width:100%;padding:9px;border:1.5px solid #b0b8c1;border-radius:8px;font-size:13px;">'+
    '<option value="">연결 안 함</option>'+
    catKeys.map(function(k){ return '<option value="'+esc(k)+'"'+(k===curCat?' selected':'')+'>'+esc(k)+'</option>'; }).join('')+
    '</select>'+
    '<div id="warnCatPreview" style="font-size:11px;color:#888;white-space:pre-wrap;margin:6px 0 2px;max-height:80px;overflow-y:auto;background:#f7f9fb;border-radius:6px;padding:'+(curCat?'8px':'0')+';">'+(curCat?esc(ref[curCat]||''):'')+'</div>';
  var memoLabel = isAnalMode
    ? '<div style="font-size:12px;color:#555;margin:4px 0 4px;font-weight:600;">📝 분석별 메모</div>'
    : '<div style="font-size:12px;color:#555;margin:12px 0 4px;font-weight:600;">📝 이 샘플만의 추가 메모</div>';
  box.innerHTML = titleHtml + catHtml + memoLabel +
    '<textarea id="warnEditText" placeholder="예: 채취 즉시 분석, 빛 차단 보관, 희석 주의 등">'+esc(existing)+'</textarea>'+
    '<div class="warn-edit-btns">'+
    '<button class="wb-cancel">취소</button>'+
    '<button class="wb-save">저장</button>'+
    ((existing||curCat) ? '<button class="wb-del">'+(isAnalMode?'메모 삭제':'전체 삭제(연결+메모)')+'</button>' : '')+
    '</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  var ta = box.querySelector('#warnEditText');
  var sel = isAnalMode ? null : box.querySelector('#warnCatSelect');
  var preview = isAnalMode ? null : box.querySelector('#warnCatPreview');
  if (sel) {
    sel.onchange = function(){
      var r = loadRefData(); var v = sel.value;
      preview.textContent = v ? (r[v]||'') : '';
      preview.style.padding = v ? '8px' : '0';
    };
  }
  ta.focus();
  box.querySelector('.wb-cancel').onclick = function(){ overlay.remove(); };
  box.querySelector('.wb-save').onclick = function(){
    var w = loadWarnings();
    var val = ta.value.trim();
    if (val) w[storageKey] = val; else delete w[storageKey];
    saveWarnings(w);
    if (!isAnalMode) {
      var links = loadLinks();
      if (sel && sel.value) links[sample] = sel.value; else delete links[sample];
      saveLinks(links);
    }
    overlay.remove();
    render();
  };
  var delBtn = box.querySelector('.wb-del');
  if (delBtn) delBtn.onclick = function(){
    var w = loadWarnings();
    delete w[storageKey];
    saveWarnings(w);
    if (!isAnalMode) {
      var links = loadLinks();
      delete links[sample];
      saveLinks(links);
    }
    overlay.remove();
    render();
  };
}
// ── 참고자료 (공정/제품별 주의사항) ──────────────────────────────────
var REF_KEY = 'ncc_ref_data';
var REF_DEFAULT = {"H2": "1.E-S-302라가 벽에 굵게쓰기, 장기분석에는 분석후를 분석하고 나머지는 H2로 보낸다.\n2.#3에 C1-C3 Method를 이용해 Impurity를 분석한다.", "C2": "1.O2를 체크하는 GC는 가장 나중에 체크하고 10분이상은 분석시키고 START를 누르다\n2.U-FB-102는 항상 보표 잡혀있고 U-FB-104는 선반으로만 점도배되어 빠르게 대응하기 위해 104,102번들이 검결정과 104를 먼저 씨도록 한다.\n3.19.8min C2H2가 있는경기 쉽다. 주의해서 처도록 한다.\n4.#2 C2H4의 정상 HP Ethylene에 생물이 들어가서 조성변이 별로 없으로 처임지지 않고 나오기되는 경우\n5.O2,N2,CO2를 분석할 SETting에 Flow를 너무 세게 하면 CO2가 인노이즈 있으니 경우가 작이는데\n6.에틸렌 공정 중 설팅에 일딸의 수문이 들어가면 Chilling 인효수온의 수분이 형성하여 결정, 파이프, 조절 VALVE 입부의 재명에 발수의 문제이 나오기 케 됨\n이 심각한 공정이 있음", "C3": "1.O2를 체크하는 GC는 기간 10분이상은 분석시키고 START를 누르다\n2.CO2를 분석할때 평등을 맞웠는데 보내는 #에서 나오는 경우이 있음\n3.메틸렌 공정 중설팅에 항화수요가 함께 수확분을 형성하여 주십에 자원에 일부의 문제이\n아 심각한 시고를 일으킨다. 그래서 수분을 없게하기 위해 수분을 없게하기 위해 노력한다.\n4.프로필렌을 GC에 Injection처리는 호 평정과 일조 상상에서 압을 맞추 처리해야 한다.\n는 경향이 있음", "C4": "1.#7 와 #14의 O2의 자치를 의미함의 기준 10분이상은 START를 보누다\n에 O2는 #에서 분추다.\n2.Mol%를 사용하는것 : C4 RAFFINATE 1 (선박) 입고 / C4 RAFFINATE 1(분광) 입고 / C4 LPG PROD' (S-105)\n3.나미지는 연갑하면 다 W7%를 사용한다.", "Mixed C4": "1.저온에서 MIXED C4를 절별적으로는데 일반 성적에서는 빨한 안갑고 보냈음\nUK-1,2를 인업갔었는데... 그 후 GS MS등을 이용해서 분석해 결과를 확인했고 M-Cyclo C3, Neo-Pentane인것을 확인했고 그 후\nM-Cyclo,Neo-Pentane로 잡고...시작했는데, Neo-Pentane이 좋은 Mixed C4가 들어가면 성정시에서는 CS's가\n적게 나오므로, 우리가 어떤것 잡오니까 CS's나 작은 그 윗부분 향유의 데이타를 시작했고 그래서 이체\n현장에서 요구로 가는 M-Cyclo C3, Neo-Pentane를 잡는니 절판을 결정이 답", "1,3-BD": "1.금호분에 아민을 처리하는 공정이 있었으나 이의공급요청보 추가됨\n2.아민 데이터는 1,3-BD 수정분량.\n3.1,3-BD 대표비중 : 0.615\n4.상온이 중요점.", "R-1": "1.대립PB로 가는 R1의 O와 R-354) UK-1,2를 M-Cyclo C3, Neo-Pentane으로 보내야한다.(고객사 보내야하지만), \n2.YNCC는 1,3-BD를 DMF로 녹이고, 금호는 NMP(N-메틸 피롤리돈)을 녹인다.\n에 각 공정서에서 측들도 추가됨", "R-4": "1.피크를 잡을때 UK를 잡주의해야한다.(고객사에서 원함)", "R-4-1": "1.R-4-1로 #2P에서 R-1을 원할 그래뉴이 보내라 했을때 #2P에서 PB를 만들고 제품가가 필요시가\n이때 안쪽 들째를 Polymer Grade에 따라 정정의 사용을 결정한 후 F,C1-,F가 함유되어있을수도 있다\nC1-를 정확하게 봐야한다.", "1-C4⁻ (C-602C/603)": "1.O2 체크할 분율을 부주의하야한다.\n2.1-Butene 대표비중 : 0.588", "i-C4⁰ (T-306)": "1.O2 체크할 분율을 부주의하야한다.\n2.iso Butane 대표비중 : 0.62", "C3 LPG (C5⁴)": "1.TBC분석은 단지지지 나오는데 분석을 분류하기 (인하인)\n2.C5공장의 보온데서 IP0.68 PIP's0.69 DCPD0.98 을 쓰지된 출하에서는 비중을 봐야한다.\n3.C5는 며정데이터로 ... CAN생물이 알맞표를 답이히도 당연히..분석가 담아야한다.\n4.봉배의 정확분의 Circulating시키주어야한다.(5분)\n5.C5 DOPA(X)의 DRAIN으로 생물을 미리하기 위해서의 드림이 저장되었다가 다시 FEED로 들어간다.\n6.ISO-TANK로 출하 발했다면 오일에 제품을 채워 넣어다. 그렇게 되면 ISO-TANK에서 생물링을 하지 못하기 때문에\nC5당당에서 집어넣었다고 하는것을 알고 사정서에 입력한다. 물량은 위가 작이서 틀리기 싫지 않음", "IP (Q-760)": "1.Bottle 2개 듣고기 (별증는 오염이 심함)\n2.Sampling함전 Bottle을 어세토를 깨끗이 씻고 짚으로 다 만신상태로 가져가기\n3.ACN,CPD분석", "PIP's (Q-780)": "1.알멍으로 1 / carbonyl 5 / carbonyl 5\n2.IPM peroxide 1 ----> MAX peroxide 5", "DCPD (Q-770)": "1.비중,WTR,TBC,T/S,Color 분석\n1.TBC분석은 단지지자 나오는데 다로 분석후기 (예민함)\n2.C5분광에서 오만 IP0.68 PIP's0.69 DCPD0.98 을 쓰지된 출하에서는 비중을 봐야한다.\n3.C5는 며정데이터로 ... CAN생물이 알맞표를 답이히도 당연히...분석가 담아야한다.\n4.봉배의 정확분의 Circulating시키주어야한다.(5분)\n5.C5 DOPA(X) DRAIN으로 생물을 미리하기 위해서의 드림이 저장되었다가 다시 FEED로 들어간다.\n6.ISO-TANK로 출하 발했다면 오일에 제품을 채워 넣어다. 그렇게 되면 ISO-TANK에서 생물링을 하지 못하기 때문에\nC5당당에서 집어넣었다고 하는것을 알고 사정서에 입력한다.\n1.DCPD Distillation이 필요한 경우 Raw C9+(분보관) Bottle1개(분보관)를 이용한다\n2.범프에서 경우가 아니면 경우는 분쇄1개(분보관) Bottle1개 가지고 한다\n3.범프에 따라 보는경우 #20에 불러오기하면 분석시간 길어짐\n4.정화율분에서 가는 경우인 DCPD의 분석후 후 정확측정 보관하여 한다.", "Benzene (U-119,123)": "1.Distillation 50% 기준은 80.1, 만약 50%가 80.2이라면 (80.2-80.1=0.1)를 IBP,EP에 빼준다.\n2.T/S 별별 LTI이 아니라 소수점 2제자리까지 알겨주기", "Toluene (U-125,120)": "1.Distillation 50% 기준은 110.6, 만약 50%가 111.1이라면 (111.1-110.6=0.5)를 IBP,EP에 빼준다.\n2.T/S 별별 LTI이 아니라 소수점 2제자리까지 알겨주기", "Xylene (U-117,126)": "1.iso-xylene(EB 15%+Xylene 85%) 대표비중 0.8700, Mixed-Xylene(EB 55%+Xylene 45%) 대표비중 0.8710\n2.1공장 M-Xylene(U-117)의 경우 AWC가 높다.(No.4)\n3.isomer Xylene의 경우 1일에 1번 반환 분리에서 확인된다.", "LOP": "1.비중,8.N,WTR,Gum분석\n1.분실으기하면 Method7가 분석되지는데 Method7 PG Diene(DCPD)로 분석해야한다.\n2.3공장 PG실(S-101)에 출하점이 목요일에 보도시기는 경우가 있다.", "PG": "1.PG Peroxide는 재분석된다.\n2.분실으기하면 Method7가 분석되지는데 Method7 PG Diene(출하)으로 분석해야한다.\n3.PG Thiophene이 분석되면 의심해야한다. (대략 Sample 2g에 분석2개가 좀더 정밀자가 들어가서 안일도 50ml보다 더 Make Up하면 좋다)\n단 분류엔서 50ml Make Up되 경우는 너무 짙어서 안일가 더 시명된 적이 있다\n4.수입PG값고 탱크미널에 따는 PG(T-206)의 경우 Xylene생물포인트 바뀌어 영에 GA-206A,B 두개의 펌프가 있는데\n돌아가는 적이 펌프에서 발견된다.", "SM (MT-317,302,327)": "1.MT-3178 1일에 한번 PAR로 돌아온 PAR를 분배합를 이용해서 생물광간을 한다.\n2.평소에 35분되 피크가 크게나오고 검정이 있는 경우라면 이 피크는 검토해야한다.(평소에 농이 0.2,13)\n3.MT-303A/B는 SM정기샘플(Day Tank,평소 일요일) 끝나고 빛니 다 채워 후 생물 채취하고도 적도까지 아이스석시에 넣어놓기\nMT-317,327로 SM당당함\n4.SM 대표비중 : 0.9112\n5.창고에 자무 따우면 모아서 SM에 가져다주면 된다.\n6.얼델하드 미배오시아 분석에서 결리가있으면 데이타에 표기를 갱산하다.\n7.5m의 정상 공정에서는 분석시간 냈갈수가 EG는 사용을 받지않으면 EG는 Flow를 가성하여 (대략 25%)\n8.출하되는 SM의 경우 후 PAB도 다 10.1지리에 입력!!!!\n9.S-11,11B O2는 PARC VIEW에서 4강장->Sm->CONDENSATE/VENT GAS SYSTEM(MS-202B/2148)로 들어가서 분석\nAI5517A를 참고하여 본다.\n10.EO-02의 경우 산촉매에 RUNNING TIME이 너무 긴 경우가 있는데 이는 뒤에 DEB가 나오면 정말 곤나갑\n타입을 늘려 주는 것이고. 이상이면 EG는지여대도 하다.\n11.5m Load DOWN 시에 SHRO를 조절하기 위해서 나오는데 SHRO란 스팀/탄화수소 비율(SHRO)을 알려주는것이고\nSHRO를 줄이면 SHRO를 줄여서 분약하면 보통은 동에는 SHRO을 좋아지수 않으면\n는 경향이 있음", "EB": "1.EB의 대표비중 : 0.8715(는불변수)", "MTBE (C-601,T-202)": "1.C-601A/B/C는 서로 하나의 탱크의 형하다.\n2.메탄올 압부원 입구에 분여면 반응 변하데 의한 DIB 생성\n3.MTBE 함성 반응이 입구의 메탄올/이소부텐 과도하게 높으면 매탄올의 닿수 반응에 의한 DME양 의 생성\n4.선향 부텐을 압예로화 반응에 의한 2MeOC,의 생성\n5.대표비중을 입력하였는데... 다른잭으로 다른건스를 입혀가야 한다.\n6.LIMS에 MTBE를 입력할 때에는 MTBE+2ME를 입력한다.\n7.매탄올/이소부텐 항역에 가두지 나우면 나서아면 함부분 작입로 결정이", "Raw C9+ (R-125)": "1.정기분석에는 R-101 1공장 출하주이안한다.\n2.Distillation시에 따라 흡어있다.\n3.만약 Raw C9+(R-125)와 동시에 하는 경우 분석해서를 성적서를 먼저 분석한다.\n(Styrene 함량 Raw C9+(R-125)를 동시에 Raw C9+(R-126)을 < Raw C9+(R-126) > Raw C9+(R-125), CPD함을\n4.R-125(Raw C9+)는 정상 동도임을", "Raw C9+C (R-126,112 Tie)": "1.정기분석시 신조경쟁때 48분종에 신청에서 넘어가는데 일부 인텔이 인변되서 한안하게 입력한다.\n2.Distillation시 신정때 일정한 적올해야 인텔이 인변되서 안일하게 조정한다.\n3.만약 Raw C9+(R-125)와 동시에 하는 경우 분석해서를 성적서를 먼저 분석한다.\n(Styrene 함량 Raw C9+(R-125)를 동시에 Raw C9+(R-126)을 < Raw C9+(R-126) > Raw C9+(R-125), CPD함을\n4.Raw C9+C에 생산되서 48분점에 신청서 인텔이 인변되서 DCPD의 양이 많이 나오는 경우가 있음", "PHT C9": "1.정기분석 GC분석, 식부정확정에는 오결합되고하고,C,F,P분증의 정도, 동판부식/S를 보면 된다.", "FHT C9": "1.정기분석 GC분석, 식부정확정에는 오결합되고하고,C,F,P분증의 정도, 동판부식/S를 보면 된다.", "Non Aro-R (U-115)": "1.2주에 3공장 분석에서 식부정확정에서 오늘날에 오결합인진 1공장 셈플라인에서 오랑 콘로니인(Copper Corrosion)\n2.한달에 한번 부정확점에서 양건 정밀 위로 탱크리로 위로 탱크리로 위로 펌프대고 따고 위에 준비된다.\n3.생물을 따라 결합에 탱크리오리스템들이 적어요(보통 평소부, 5%)이상 차이가 나오는데 이는 정상보다 부족함이 잘잡고 있다 떨어진다.\n4.#1 NAR의 경우 시인부(어널라이즈)NAR로 정고도/적도, 0.72정도 됨\nC5-NAR 됨하지 NAR(U-118)이 보로 결합하나 부족함이 잡혀나오 #1NAR(U-118)도 쓰이다 끄러대\n매 #1 NAR이 적정심상에 검자가 나오는 경우가 있다. 이때 NAR 비중이 높게 나오는 경우가 있다. 비중이 정상보다 낮다면\n#1 NAR(U-118)이 탕정량에서 처리되는데 이때 검자가 나옴", "C5-NA-R": "1.CS-R 60%, NA-R 35%, M-Xylene 5%\n2.RVP kgf로 환산해서 입력\n3.비중이 보존 CS-R가 NA-R보다 낮으로 비중을 보고\n4.CS-R를 저장하는 기상의 탱크 R-111E\n4.5M 대표비중 : 0.9112\n5.냉장고에 채물을 모으면 갖다 분배두는곳에 가져다 놓으면 Bottle을 갖다가서\nSampling해 용\n6.CS NAR 검토 도려용 확인 (C5R 111C-> RGA128ABC / NAR 118->GA144ABC / XYL->GA137AB)\n7.CS-R,NA-R,Xylene 기상에서 N,A-R이 비싸므로 NA-R이 검사하기는 경향이 강함\n8.CS-R (R-111C) 비중검사를 줄하검사->C5->NA-Raffinate (신규) 입력\nNA-R (R-118) 비중검사를 가상에 줄하고 NA-R을 입력에 (신규)", "Naphtha": "1.GSC 보관 (CS2 호용), GSC는 RVP Psi(단저)로 입력\n2.수입남사는 보압점이 화학현대답화에 중확점을 부탁하고(6227), MTBE에는 데이타 나오지 못해 결대 됨(6193)\n3.Saybot Blank는 셈플 색깔도 넣었고 그냥 잡는다\n4.GS남사는 reformulyzer Method PIPNA,Na 수입남사는 행지하는 데이터 분광이 필요함\n5.수입남사 Bottle에서 갈아와서 셈플을 받아와서 Bottle을 가지고 Bottle을 갖다가서 모아놓다 모면데이터가 오토값이다 입력\n6.GS남사는 분석이 끝나고 갈아드기다 비비고 SAmple 갈아드기 모아놓다 오토 후성장이 보강수서 모데가\n7.GS남사는 S.G.B.Distillation,WTR 만 분석\n8.남사는 분석이 끝나지난 안나서 글나디고 분석이 있어도 항유가 주고있는 영진서 변선 놓치주아면", "NaOCl": "1.U/C에 데이터 들자지않고 글나디고 분목하고 MTBE에 (6227), MTBE는 데이터 나오지 못해 결대 됨(6193)\n2.저자검수신 조정에서 유효염소가 13이라면 분석에 결과 성적서에서 데이터를 불러주면 됨", "검수": "1.B0에서 오는 DMF가 사용된다.\n2.MEOH의 PERMANGANATE 두 입니다는 행지에서 답근하고 있도\n보호 WTR등 그 가정에 행자 답근아고, 그 가정에 행자 답근아고, 그 답근이 답하다", "C3 LPG (#2)": "1.GSC 보관 (CS2 호용), GSC는 RVP Psi(단저)로 입력", "Mixed C4 (#2)": "1.수입남사 중 한건의 PIANO_GS 를 선택해서 답아와서 PIANO_GS 를 선택해서", "C4 LPG (#1,#2)": "1.#1 C4 LPG 분석에는 답나지 모니지 않은 항유가 있다", "Steam(HS,LS)": "1.LS는 Low Pressure Steam, HS는 High Pressure Steam이고 주로 Steam을 사용한다.", "폐수": "1.노수화원 추출법은 비파괴성 결절을 측정하는 방법이고, H/C도 측정하는 BTX,Lighter 등을 사용한다.\n2.노압형 수단 추출법은 PO4 - 20, Ca Hardness : 300-400", "WTR": "1.C/W PO4 : 10-20, Ca Hardness : 0.2\n2.수돗물 PO4 : 0\n3.C.O.C (Cycle Of Concentrate)", "Gassing Up": "1.Gassing 과정 : 질소로 N2 퍼지한다. -> 신고자에 요구하나, 고객사에서 요청하기에 등의\n문제가 발생할 수 있다. 그리고 핸디미터에 따라야 한다.\n2.Gassing Up을 할 때는 Spec에 맞춰 적당한 시점에 N2 부어를 가져야 한다.\n3.Gassing Up이란 신규 사업을 시작하기 전에 N2를 제거하면서 가다리는 과정.\n지만 날아가지 않게 사이클 도착해야 한다.\n4.Gassing UP은 이란 N2 Purge 후 생산물을 요구하고, 고객사에서 요구가 없다 면\nN2 등을 제거하는 과정"};
function loadRefData(){ return CLOUD_DATA.refData || JSON.parse(JSON.stringify(REF_DEFAULT)); }
function saveRefData(obj){ CLOUD_DATA.refData = obj; syncNow(); }
function loadLinks(){ return CLOUD_DATA.links || {}; }
function saveLinks(obj){ CLOUD_DATA.links = obj; syncNow(); }
function loadDisplayNames(){ return CLOUD_DATA.displayNames || {}; }
function saveDisplayNames(obj){ CLOUD_DATA.displayNames = obj; syncNow(); }
function getDisplayName(origTitle){
  var d = loadDisplayNames();
  return d[origTitle] || origTitle;
}
function editDisplayName(origTitle){
  var cur = getDisplayName(origTitle);
  var overlay = document.createElement('div');
  overlay.className = 'warn-edit-overlay';
  overlay._mdTarget=null;
  overlay.addEventListener('mousedown',function(e){ overlay._mdTarget=e.target; });
  overlay.addEventListener('click',function(e){ if(e.target===overlay && overlay._mdTarget===overlay) overlay.remove(); });
  var box = document.createElement('div');
  box.className = 'warn-edit-box';
  box.style.maxWidth = '360px';
  box.innerHTML =
    '<h3>✏️ 표시 이름 수정</h3>'+
    '<div class="wsub">코드 내부 원래 이름("'+esc(origTitle)+'")은 그대로 유지되고, 화면에 보이는 이름만 바뀌어요. 모든 기기에 반영돼요.</div>'+
    '<input type="text" id="dispNameInput" class="ns-input" style="width:100%;padding:10px 12px;border:1.5px solid #b0b8c1;border-radius:8px;font-size:15px;" value="'+esc(cur)+'" />'+
    '<div class="warn-edit-btns">'+
    '<button class="wb-cancel">취소</button>'+
    '<button class="wb-save">저장</button>'+
    (cur !== origTitle ? '<button class="wb-del">원래 이름으로 되돌리기</button>' : '')+
    '</div>';
  overlay.appendChild(box);
  document.body.appendChild(overlay);
  var inp = box.querySelector('#dispNameInput');
  inp.focus();
  inp.select();
  box.querySelector('.wb-cancel').onclick = function(){ overlay.remove(); };
  box.querySelector('.wb-save').onclick = function(){
    var val = inp.value.trim();
    var d = loadDisplayNames();
    if (val && val !== origTitle) d[origTitle] = val; else delete d[origTitle];
    saveDisplayNames(d);
    overlay.remove();
    render();
  };
  var delBtn = box.querySelector('.wb-del');
  if (delBtn) delBtn.onclick = function(){
    var d = loadDisplayNames();
    delete d[origTitle];
    saveDisplayNames(d);
    overlay.remove();
    render();
  };
}
function getSampleCategory(sample){
  var links = loadLinks();
  return links[sample] || '';
}
// 샘플의 전체 주의사항 텍스트 (연결된 분류 + 개별 메모를 합침)
function getCombinedWarning(sample, analKey){
  var parts = [];
  if (!analKey) {
    // 요일별 보기: 참고자료 연결 + 샘플 메모
    var cat = getSampleCategory(sample);
    if (cat) {
      var ref = loadRefData();
      if (ref[cat]) parts.push('📚 ['+cat+']\n' + ref[cat]);
    }
    var memo = getWarning(sample);
    if (memo) parts.push((cat?'\n':'')+'📝 개별 메모\n' + memo);
  } else {
    // 분석별 보기: 해당 분석 전용 메모만
    var analLabel = analKey.split('|').slice(1).join('|');
    var memo2 = getWarning(sample, analKey);
    if (memo2) parts.push('📝 ['+analLabel+'] 메모\n' + memo2);
  }
  return parts.join('\n\n');
}
function hasAnyWarning(sample, analKey){
  if (analKey) return !!getWarning(sample, analKey);
  return !!(getSampleCategory(sample) || getWarning(sample));
}

// ── 참고자료 화면 ──────────────────────────────────────────────────
var REF_SEARCH = '';
function renderRefView(){
  var ref = loadRefData();
  var keys = Object.keys(ref).sort(function(a,b){ return a.localeCompare(b,'ko'); });
  // 검색 필터
  var q = REF_SEARCH.trim().toLowerCase();
  var filtered = q ? keys.filter(function(k){

}
function openRefAdd(){

  if (!name) return;
  name = name.trim();

}
// 텍스트를 "1. ~~~" 같은 번호 패턴 기준으로 줄 배열로 분리
function parseRefLines(text){
  if (!text) return [];
  var raw = text.split('\n').map(function(s){ return s.trim(); }).filter(function(s){ return s; });
  var lines = [];
  raw.forEach(function(line){
    var m = line.match(/^(\d+)[.)]\s*(.*)$/);
    if (m) { lines.push(m[2]); }
    else if (lines.length > 0) { lines[lines.length-1] += ' ' + line; } // 번호 없는 줄은 이전 항목에 이어붙임
    else { lines.push(line); }
  });
  return lines;
}
// 줄 배열을 "1. ~~~\n2. ~~~" 문자열로 재조립 (저장 포맷, 기존 데이터와 호환)
function rebuildRefText(lines){
  return lines.map(function(l,i){ return (i+1)+'. '+l; }).join('\n');
}

function openRefEdit(catName){
  var ref = loadRefData();
  var existing = ref[catName] || '';
  var lines = parseRefLines(existing);
  var overlay = document.createElement('div');
  overlay.className = 'warn-edit-overlay';
  overlay._mdTarget=null;
  overlay.addEventListener('mousedown',function(e){ overlay._mdTarget=e.target; });
  overlay.addEventListener('click',function(e){ if(e.target===overlay && overlay._mdTarget===overlay) overlay.remove(); });
  var box = document.createElement('div');
  box.className = 'warn-edit-box';
  box.style.maxWidth = '480px';

  function renderLineCards(){
    var h = '<h3>📚 '+esc(catName)+'</h3>';
    h += '<div class="wsub">항목별로 따로 수정·삭제할 수 있어요. 연결된 모든 샘플에 함께 표시돼요.</div>';
    h += '<div id="refLinesWrap" style="display:flex;flex-direction:column;gap:6px;max-height:340px;overflow-y:auto;margin:10px 0;">';
    lines.forEach(function(l,i){
      h += '<div style="display:flex;align-items:flex-start;gap:8px;background:#f7f9fb;border-radius:8px;padding:8px 10px;" data-idx="'+i+'">';
      h += '<span style="font-size:12px;color:#aaa;min-width:16px;padding-top:2px;">'+(i+1)+'</span>';
      h += '<span class="ref-line-text" style="font-size:13px;line-height:1.6;flex:1;word-break:break-all;">'+esc(l)+'</span>';
      h += '<span onclick="refLineEdit(this,'+i+')" style="cursor:pointer;font-size:14px;color:#999;" title="수정">✏️</span>';
      h += '<span onclick="refLineDelete(this,'+i+')" style="cursor:pointer;font-size:14px;color:#c0392b;" title="삭제">🗑️</span>';
      h += '</div>';
    });
    h += '</div>';
    h += '<button class="btn btn-gray" onclick="refLineAdd()" style="width:100%;margin-bottom:8px;">+ 항목 추가</button>';
    h += '<button class="btn btn-gray" onclick="refSwitchToPaste()" style="width:100%;font-size:12px;">📋 통째로 붙여넣기로 바꾸기</button>';
    h += '<div class="warn-edit-btns">';
    h += '<button class="wb-cancel">닫기</button>';
    h += '<button class="wb-save">저장</button>';
    h += '</div>';
    box.innerHTML = h;
    bindFooter();
  }

  function renderPasteMode(){
    var h = '<h3>📚 '+esc(catName)+' — 통째로 붙여넣기</h3>';
    h += '<div class="wsub">"1. ~~~ 2. ~~~" 형식의 텍스트를 그대로 붙여넣으면 자동으로 항목별로 나눠져요.</div>';
    h += '<textarea id="refPasteText" style="min-height:220px;">'+esc(rebuildRefText(lines))+'</textarea>';
    h += '<div class="warn-edit-btns">';
    h += '<button class="wb-cancel">취소</button>';
    h += '<button class="wb-save">적용</button>';
    h += '</div>';
    box.innerHTML = h;
    var ta = box.querySelector('#refPasteText');
    ta.focus();
    box.querySelector('.wb-cancel').onclick = function(){ renderLineCards(); };
    box.querySelector('.wb-save').onclick = function(){
      lines = parseRefLines(ta.value);
      renderLineCards();
    };
  }

  function bindFooter(){
    box.querySelector('.wb-cancel').onclick = function(){ overlay.remove(); };
    box.querySelector('.wb-save').onclick = function(){
      var r = loadRefData();
      r[catName] = rebuildRefText(lines);
      saveRefData(r);
      overlay.remove();
      render();
    };
  }

  window._refLineEditInline = function(idx, newVal){ lines[idx] = newVal; };
  window.refLineEdit = function(el, idx){
    var row = el.closest('div[data-idx]');
    var span = row.querySelector('.ref-line-text');
    var cur = lines[idx];
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.value = cur;
    inp.style.cssText = 'flex:1;font-size:13px;border:1px solid #1967d2;border-radius:4px;padding:3px 6px;';
    span.replaceWith(inp);
    inp.focus();
    inp.select();
    function commit(){ lines[idx] = inp.value.trim() || cur; renderLineCards(); }
    inp.onkeydown = function(e){ if (e.key==='Enter') commit(); if (e.key==='Escape') renderLineCards(); };
    inp.onblur = commit;
  };
  window.refLineDelete = function(el, idx){
    lines.splice(idx,1);
    renderLineCards();
  };
  window.refLineAdd = function(){
    var v = prompt('새 항목 내용을 입력하세요');
    if (!v || !v.trim()) return;
    lines.push(v.trim());
    renderLineCards();
  };
  window.refSwitchToPaste = function(){ renderPasteMode(); };

  overlay.appendChild(box);
  document.body.appendChild(overlay);
  renderLineCards();
}
function renameRefCat(oldName){
  var newName = prompt('분류명을 수정하세요', oldName);
  if (newName === null) return;
  newName = newName.trim();
  if (!newName || newName === oldName) return;
  var ref = loadRefData();
  if (ref[newName] !== undefined) { alert('이미 있는 분류명이에요'); return; }
  ref[newName] = ref[oldName];
  delete ref[oldName];
  saveRefData(ref);
  // 이 분류에 연결된 샘플들도 새 이름으로 갱신 (끊어지지 않게)
  var links = loadLinks();
  Object.keys(links).forEach(function(s){ if (links[s] === oldName) links[s] = newName; });
  saveLinks(links);
  render();
}
function deleteRefCat(catName){
  if (!confirm('"'+catName+'" 분류를 삭제할까요?\n이 분류에 연결된 샘플들의 연결도 함께 해제돼요.')) return;
  var ref = loadRefData();
  delete ref[catName];
  saveRefData(ref);
  // 연결 해제
  var links = loadLinks();
  Object.keys(links).forEach(function(s){ if (links[s] === catName) delete links[s]; });
  saveLinks(links);
  render();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getVisibleTasks(daily, dayIdx, week){
  var sched = loadSchedule();
  var allTasks = sched[String(dayIdx)] || [];
  function visible(t){
    if (t.weeks && t.weeks.indexOf(week) === -1) return false;
    if (t.cond === '200가동' && !daily.cond200) return false;
    if (t.cond === 'PAR운전' && !daily.condPAR) return false;
    if (t.cond === 'SMTK' && !daily.condSMTK) return false;
    if (t.cond === 'SMT327' && !daily.condSMT327) return false;
    return true;
  }
  var slots = daily.shift === 'day' ? ['d1','d2','ty','ship'] : ['n1','n2'];
  return allTasks.filter(function(t){ return slots.indexOf(t.slot) !== -1 && visible(t); });
}

function taskHtml(t, daily){

  var h = '<div class="task'+dn+'"><input type="checkbox" '+ck+' onchange="toggleTask(\''+id.replace(/'/g,"\\'")+'\')">';

       '<span class="name-edit" onclick="editDisplayName(\''+titleEsc+'\')" title="이름 수정">'+esc(dispName)+'</span>';

    h += '</div>';

function renderProcGroups(tasks, daily){
  var h = '';
  // compact 기준: 분석 항목 수 ≤ 4개 AND 총 글자 수 ≤ 24자
  function isCompact(t){
    var anals = t.analysis || [];
    if (anals.length > 4) return false;
    var totalLen = anals.reduce(function(acc,a){ return acc+a.length; }, 0);
    return totalLen <= 24;
  }
  PROC_ORDER.forEach(function(proc){
    var ptasks = tasks.filter(function(t){ return t.proc === proc; });
    if (ptasks.length === 0) return;
    var pcls = PROC_CLS[proc] || '';
    h += '<div class="proc-group"><span class="proc-label ' + pcls + '">' + esc(proc) + '</span>';
    // compact 태스크는 2개씩 묶어 pair로, 나머지는 단독
    var i = 0;
    while (i < ptasks.length) {
      var t = ptasks[i];
      if (isCompact(t) && i+1 < ptasks.length && isCompact(ptasks[i+1])) {
        // 2개 묶음
        h += '<div class="task-pair">' + taskHtml(t, daily) + taskHtml(ptasks[i+1], daily) + '</div>';
        i += 2;
      } else {
        h += taskHtml(t, daily);
        i += 1;
      }
    }
    h += '</div>';
  });
  return h || '<div class="empty">해당 없음</div>';
}

// ── 요일별 보기: 주간이면 전반|후반 좌우, 그 아래 T/Y, 성적서 ──
function renderDayView(visTasks, daily){
  var html = '';
  if (daily.shift === 'day') {
    var d1 = visTasks.filter(function(t){ return t.slot === 'd1'; });
    var d2 = visTasks.filter(function(t){ return t.slot === 'd2'; });

    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.d1 + '</div>' + renderProcGroups(d1, daily) + '</div></div>';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.d2 + '</div>' + renderProcGroups(d2, daily) + '</div></div>';
    html += '</div>';
    // T/Y
    var ty = visTasks.filter(function(t){ return t.slot === 'ty'; });
    if (ty.length) html += '<div class="slot-card" style="margin-bottom:12px;"><div class="slot-title">⏰ ' + SLOT_INFO.ty + '</div>' + renderProcGroups(ty, daily) + '</div>';
    // 성적서/출하
    var ship = visTasks.filter(function(t){ return t.slot === 'ship'; });
    if (ship.length) {
      html += '<div class="cert-card"><div class="slot-title">📤 성적서 발송 / 출하</div>';
      ship.forEach(function(t){
        html += taskHtml(t, daily);
      });
      html += '</div>';
    }
  } else {
    var n1 = visTasks.filter(function(t){ return t.slot === 'n1'; });
    var n2 = visTasks.filter(function(t){ return t.slot === 'n2'; });
    html += '<div class="slot-cols">';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.n1 + '</div>' + renderProcGroups(n1, daily) + '</div></div>';
    html += '<div class="slot-col"><div class="slot-card"><div class="slot-title">⏰ ' + SLOT_INFO.n2 + '</div>' + renderProcGroups(n2, daily) + '</div></div>';
    html += '</div>';
  }
  return html;
}

// ── 분석별 보기: 분석 종류별로 샘플 나열 (C5 sub 분리) ──
function renderAnalView(visTasks, daily){
  var gcGroups = {};
  var otherGroups = {};

  function addSample(analName, sampleName, proc){
    var gcM = analName.match(/^GC\s*#?([0-9]+)$/i);
    if (gcM) {
      var num = String(parseInt(gcM[1]));
      if (!gcGroups[num]) gcGroups[num] = [];
      gcGroups[num].push({sample: sampleName, proc: proc});
    } else {
      if (!otherGroups[analName]) otherGroups[analName] = [];
      otherGroups[analName].push({sample: sampleName, proc: proc});
    }
  }

  visTasks.forEach(function(t){
    var items = [];
    if (t.sub && t.sub.length) {
      t.sub.forEach(function(s){ items.push({title:s.sample, proc:t.proc, analysis:s.analysis}); });
    } else {
      items.push({title:t.title, proc:t.proc, analysis:t.analysis||[]});
    }
    items.forEach(function(item){
      item.analysis.forEach(function(a){ addSample(a, item.title, item.proc); });
    });
  });

  window._gcData = gcGroups;

  var GC_POS = {
    1:[8,1], 2:[7,1], 3:[6,1], 4:[5,1], 5:[4,1], 6:[3,1],
    7:[2,2],
    8:[1,3], 9:[1,4], 10:[1,5], 11:[1,6],
    12:[2,7],
    13:[3,8], 14:[4,8], 15:[5,8], 16:[6,8],
    17:[6,11], 18:[5,11], 19:[4,11], 20:[3,11],
    21:[1,12], 22:[1,13], 23:[1,14], 24:[1,15], 25:[1,16], 26:[1,17],
    27:[2,17]
  };

  var html = '<div class="anal-card">';
  html += '<div class="anal-title">🔬 GC</div>';
  var gcPage = localStorage.getItem('ncc_gcpage') || 'A';
  // 페이지 탭 (CSS로 모바일에서만 표시)
  html += '<div class="gc-page-tabs">';
  html += '<button class="gc-page-btn'+(gcPage==='A'?' on':'')+'" onclick="setGcPage(\'A\')">#1~16</button>';
  html += '<button class="gc-page-btn'+(gcPage==='B'?' on':'')+'" onclick="setGcPage(\'B\')">#17~27</button>';
  html += '</div>';
  // 배치도 셀 생성 함수 (열 범위 지정)
  function buildMap(cMin, cMax){
    var s = '';
    for (var row=1; row<=8; row++) {
      for (var col=cMin; col<=cMax; col++) {
        var found = null;
        for (var n=1; n<=27; n++) {
          if (GC_POS[n] && GC_POS[n][0]===row && GC_POS[n][1]===col) { found=n; break; }
        }
        if (found) {
          var key = String(found);
          var hasData = !!gcGroups[key];
          var cls = 'gc-cell' + (hasData ? ' gc-cell-active' : ' gc-cell-empty');
          s += '<div class="'+cls+'" onclick="openGcPopup(\''+key+'\')">#'+found+'</div>';
        } else {
          s += '<div class="gc-blank"></div>';
        }
      }
    }
    return s;
  }
  // PC용: 전체(1~18열) 한 번에
  html += '<div class="gc-layout gc-pc"><div class="gc-map gc-map-full" style="grid-template-columns:repeat(18,34px);">';
  html += buildMap(1,18);
  html += '</div></div>';
  // 모바일용 A: 1~8열(#1~16), B: 9~18열(#17~27)
  html += '<div class="gc-layout gc-mobile gc-fit gc-page-A'+(gcPage==='A'?' show':'')+'"><div class="gc-map" style="grid-template-columns:repeat(8,1fr);">';
  html += buildMap(1,8);
  html += '</div></div>';
  html += '<div class="gc-layout gc-mobile gc-fit gc-page-B'+(gcPage==='B'?' show':'')+'"><div class="gc-map" style="grid-template-columns:repeat(7,1fr);">';
  html += buildMap(11,17);
  html += '</div></div>';
  html += '</div>';

  // 기타 분석 카드 - 우선순위순 정렬
  var ANAL_PRIORITY = {
    // 1순위
    'WTR':1,'T-S':1,'Apha Color':1,'TBC':1,'DNPC':1,'Polymer':1,
    '비중':1,'Sampling':1,'Distillation':1,'AWC':1,'B·N':1,'B.I':1,
    // 2순위
    'pH':2,'Fe':2,'WTR(Gas)':2,'E-OX':2,'Conductivity':2,'PO₄³⁻':2,
    '동점도(cSt)':2,'Cl⁻':2,'Ca-Hard':2,'T-N':2,'WTR(Dew Point)':2,
    'F⁻':2,'Turbidity':2,'SO₃²⁻':2,'phenol':2,'TOC':2,'RVP':2,'NaNO₂':2,'Teledyne':2,
    // 3순위
    'Peroxide':3,'Aldehyde':3,'Acidity':3,'Carbonyl':3,'Gum Test':3,
    'Cu Corrosion':3,'Aniline Point':3,'Residue on Evaporation':3,'NVM':3,'성적서':3
  };
  var otherKeys = Object.keys(otherGroups).sort(function(a,b){
    var pa = ANAL_PRIORITY[a] || 9;
    var pb = ANAL_PRIORITY[b] || 9;
    if (pa !== pb) return pa - pb;
    return a.localeCompare(b,'ko');
  });
  otherKeys.forEach(function(a, idx){
    var aid = 'anal-toggle-'+idx;
    html += '<div class="anal-card anal-toggle" onclick="toggleAnal(this)">';
    html += '<div class="anal-toggle-head"><span class="anal-title" style="margin:0;">🔬 '+esc(a)+'</span>';
    html += '<span class="anal-count">'+otherGroups[a].length+'건 <span class="anal-arrow">▾</span></span></div>';
    html += '<div class="anal-toggle-body" style="display:none;">';
    otherGroups[a].forEach(function(item){
      var pcls = PROC_CLS[item.proc]||'';
      html += '<div class="anal-sample"><span class="s-name">'+esc(item.sample)+'</span>'+warnIconHtml(item.sample, item.sample+'|'+a)+reasonIconHtml(item.sample)+
              '<span class="s-proc '+pcls+'">'+esc(item.proc)+'</span></div>';
    });
    html += '</div></div>';
  });

  return html || '<div class="card"><div class="empty">표시할 항목이 없어요</div></div>';
}

function toggleAnal(card){
  var body = card.querySelector('.anal-toggle-body');
  var arrow = card.querySelector('.anal-arrow');
  if (body.style.display === 'none') { body.style.display='block'; if(arrow)arrow.textContent='▴'; }
  else { body.style.display='none'; if(arrow)arrow.textContent='▾'; }
}

// GC 클릭 시 팝업
function openGcPopup(num){
  var data = window._gcData && window._gcData[num];
  if (!data || data.length === 0) return;
  var html = '<div class="gc-popup-overlay" onclick="closeGcPopup(event)">';
  html += '<div class="gc-popup" onclick="event.stopPropagation();">';
  html += '<div class="gc-popup-head">🔬 GC #'+num+' <span style="font-size:13px;color:#888;font-weight:400;">('+data.length+'건)</span>';
  html += '<span class="gc-popup-close" onclick="closeGcPopup(event)">✕</span></div>';
  html += '<div class="gc-popup-body">';
  data.forEach(function(item){
    var pcls = (PROC_CLS||{})[item.proc]||'';
    html += '<div class="anal-sample"><span class="s-name">'+item.sample+'</span>'+warnIconHtml(item.sample, item.sample+'|GC #'+num)+reasonIconHtml(item.sample)+
            '<span class="s-proc '+pcls+'">'+item.proc+'</span></div>';
  });
  html += '</div></div></div>';
  // 기존 팝업 제거
  var ex = document.getElementById('gcPopupRoot');
  if (ex) ex.remove();
  var div = document.createElement('div');
  div.id = 'gcPopupRoot';
  div.innerHTML = html;
  // body 맨 끝에 추가 (fixed가 viewport 기준이 되도록)
  document.body.appendChild(div);
  // 스크롤 잠금 (배경 안 움직이게)
  document.body.style.overflow = 'hidden';
}
function closeGcPopup(e){
  if(e) e.stopPropagation();
  var root = document.getElementById('gcPopupRoot');
  if (root) root.remove();
  document.body.style.overflow = '';
}

var SS_QUERY = '';

function renderSampleSearch(){
  var h = '<div class="sample-search-wrap">';

     + 'oninput="ssOnInput(this.value)" autocomplete="off">';

function ssOnInput(v){
  SS_QUERY = v;
  // 결과 패널만 업데이트 (전체 render 대신)
  var wrap = document.querySelector('.sample-search-wrap');
  if(!wrap) return;
  // clear 버튼
  var existing = wrap.querySelector('.s-clear');
  if(v && !existing){
    var btn=document.createElement('button'); btn.className='s-clear'; btn.textContent='✕'; btn.onclick=ssClear; wrap.appendChild(btn);
  } else if(!v && existing){ existing.remove(); }
  // 결과 패널
  var panel = wrap.nextElementSibling;
  if(panel && panel.classList.contains('sample-search-result')) panel.remove();

    var div=document.createElement('div'); div.className='sample-search-result';
    div.innerHTML=ssRenderResults(v.trim()); wrap.insertAdjacentElement('afterend',div);

function ssClear(){ SS_QUERY=''; var wrap=document.querySelector('.sample-search-wrap'); if(wrap){ var inp=wrap.querySelector('input'); if(inp) inp.value=''; var btn=wrap.querySelector('.s-clear'); if(btn) btn.remove(); var panel=wrap.nextElementSibling; if(panel&&panel.classList.contains('sample-search-result')) panel.remove(); } }

function ssRenderResults(q){
  var sched = loadSchedule();
  var dayNames = DAY_NAMES; // ['일','월','화','수','목','금','토']
  var slotLabel = { d1:'주간 전반', d2:'주간 후반', n1:'야간 전반', n2:'야간 후반', ty:'T/Y', ship:'출하·성적서' };
  var reasons = loadReasons();

  // 전체 스케줄에서 쿼리와 일치하는 샘플명 수집 (부분 일치)
  var found = {}; // { title: { proc, cycles:[{day,slot,weeks}], anals:Set } }
  for(var day in sched){
    sched[day].forEach(function(t){
      var disp = getDisplayName(t.title); // 사용자 지정 이름 반영
      if(t.title.toLowerCase().indexOf(q.toLowerCase())!==-1 || disp.toLowerCase().indexOf(q.toLowerCase())!==-1){
        if(!found[t.title]) found[t.title]={ proc:t.proc, cycles:[], anals:[] };
        found[t.title].cycles.push({ day:parseInt(day), slot:t.slot, weeks:t.weeks });
        (t.analysis||[]).forEach(function(a){ if(found[t.title].anals.indexOf(a)===-1) found[t.title].anals.push(a); });
      }
    });
  }

  var keys = Object.keys(found);
  if(!keys.length) return '<div class="sr-none">검색 결과가 없어요.</div>';

  var h = '';
  keys.forEach(function(title){
    var info = found[title];
    var disp = getDisplayName(title);
    h += '<div class="sr-item">';
    h += '<div class="sr-name">'+esc(disp)+(disp!==title?'<span style="font-size:11px;color:#aaa;font-weight:400;"> ('+esc(title)+')</span>':'')+'</div>';

    // 공정
    h += '<div class="sr-row"><span class="sr-label">공정</span><span class="sr-val">'+esc(info.proc)+'</span></div>';

    // 분석 주기 (요일+슬롯+주차)
    h += '<div class="sr-row"><span class="sr-label">분석 주기</span><div>';
    info.cycles.forEach(function(c){
      var wk = c.weeks ? c.weeks.join('·')+'주' : '매주';
      var dayN = dayNames[c.day]+'요일';
      var slotN = slotLabel[c.slot] || c.slot;
      h += '<span class="sr-cycle">'+esc(dayN)+' '+esc(slotN)+' ('+esc(wk)+')</span>';
    });
    h += '</div></div>';

    // 분석 항목
    if(info.anals.length){
      h += '<div class="sr-row"><span class="sr-label">분석 항목</span><div class="sr-anal">';
      info.anals.forEach(function(a){ h += '<span>'+esc(a)+'</span>'; });
      h += '</div></div>';
    }

    // 분석 이유 + PFD 미니맵
    var reason = reasons[title] || '';
    var miniMap = (typeof buildSampleMiniMap==='function') ? buildSampleMiniMap(title) : '';
    if(reason || miniMap){
      h += '<div class="sr-reason">';
      if(miniMap) h += '<div style="text-align:center;margin-bottom:'+(reason?'7px':'0')+';">'+miniMap+'<div style="font-size:11px;color:#888;margin-top:3px;">📍 '+esc(title)+' 위치 (PFD)</div></div>';
      if(reason) h += '<div>💡 <b>분석 이유</b> '+esc(reason)+'</div>';
      h += '</div>';
    }

    // 주의사항·개별 메모 (입력된 경우만)
    var w = loadWarnings();
    var memo = w[title] || '';
    if(memo){
      h += '<div class="sr-reason" style="background:#fff3e0;border-color:#e67e22;margin-top:4px;">📝 <b>메모</b> '+esc(memo)+'</div>';
    }

    h += '</div>';
  });
  return h;
}

var SP_FILE = 'special_data.json';
var SP_DATA = { procs:['C5','SM','MTBE','T/Y'], records:{} };
var SP_SHA = null, SP_LOADED = false, SP_SAVING = false, SP_TIMER = null;
var SP_CUR_PROC = null;
var SP_SEARCH = '';
var SP_OPEN = {}; // 펼쳐진 카드 id

function spUid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function spNow(){ return new Date().toLocaleString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\. /g,'-').replace('.',':').replace('. ',''); }

async function loadSpecialData(){
  var token = getGhToken();
  try {
    var data=null, sha=null;
    if(token){
      var r=await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/'+SP_FILE+'?ref='+GH_BRANCH+'&t='+Date.now(),
        {headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}});
      if(r.ok){ var j=await r.json(); sha=j.sha; data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))); }
      else if(r.status===404){ SP_LOADED=true; return; }
    }
    if(!data){
      var r2=await fetch('https://raw.githubusercontent.com/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/'+GH_BRANCH+'/'+SP_FILE+'?t='+Date.now());
      if(r2.ok) data=await r2.json();
    }
    if(data){ SP_DATA={procs:data.procs&&data.procs.length?data.procs:['C5','SM','MTBE','T/Y'],records:data.records||{}}; SP_SHA=sha; }
  } catch(e){ console.warn('special 로드 오류',e); }
  SP_LOADED=true;
  if(!SP_CUR_PROC) SP_CUR_PROC=SP_DATA.procs[0];
  render();
}
function spScheduleSync(){
  if(SP_TIMER) clearTimeout(SP_TIMER);
  SP_TIMER = setTimeout(spSyncNow, 900);
}
async function spSyncNow(){
  if(SP_TIMER){ clearTimeout(SP_TIMER); SP_TIMER=null; }
  var token=getGhToken();
  if(!token){ showSyncStatus('⚠️ 토큰 없음 — Special 데이터 저장 불가'); return; }
  if(SP_SAVING) return;
  SP_SAVING=true; showSyncStatus('☁️ Special 저장 중...');
  try {
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(SP_DATA,null,2))));
    var body={message:'update '+SP_FILE, content:content, branch:GH_BRANCH};
    if(SP_SHA) body.sha=SP_SHA;
    var r=await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/'+SP_FILE,
      {method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){ var j=await r.json(); SP_SHA=j.content.sha; showSyncStatus('✓ Special 저장됨'); }
    else { showSyncStatus('✕ Special 저장 실패 '+r.status); }
  } catch(e){ showSyncStatus('✕ Special 저장 오류'); console.warn(e); }
  finally { SP_SAVING=false; }
}

function spCurRecs(){ return SP_DATA.records[SP_CUR_PROC]||[]; }
function spSetRecs(arr){ SP_DATA.records[SP_CUR_PROC]=arr; spScheduleSync(); }
function spAddRec(rec){ var a=spCurRecs().slice(); a.unshift(rec); spSetRecs(a); }
function spUpdateRec(id,patch){ spSetRecs(spCurRecs().map(function(r){ return r.id===id?Object.assign({},r,patch):r; })); }
function spDelRec(id){ spSetRecs(spCurRecs().filter(function(r){ return r.id!==id; })); }
function spMatch(r,q){ if(!q)return true; return [r.name,r.reason,(r.anals||[]).join(' '),r.result].join(' ').toLowerCase().indexOf(q.toLowerCase())!==-1; }
function spHl(text,q){ var e=esc(text||''); if(!q)return e; try{ return e.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'); }catch(x){ return e; } }

// ── 📢 메일 요약 공지 (notice.json은 Apps Script가 GitHub에 올림. 페이지는 읽기만) ──
function mdLite(t){
  t = esc(t);
  t = t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  var lines=t.split(/\r?\n/), out=[], inUl=false;
  lines.forEach(function(ln){
    var m=ln.match(/^\s*[-*\u2022]\s+(.*)$/);
    if(m){ if(!inUl){out.push('<ul>');inUl=true;} out.push('<li>'+m[1]+'</li>'); }
    else { if(inUl){out.push('</ul>');inUl=false;} if(ln.trim())out.push('<div>'+ln+'</div>'); }
  });
  if(inUl)out.push('</ul>');
  return out.join('');
}
// 공지 본문용: 불릿 줄마다 ★ 강조 버튼 삽입 (nid=공지ID, idx=줄번호)
function mdLiteNotice(t, nid){
  t = esc(t);
  t = t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  var lines=t.split(/\r?\n/), out=[], inUl=false, liIdx=0;
  var hlMap = getHlMap(nid);
  lines.forEach(function(ln){
    var m=ln.match(/^\s*[-*\u2022]\s+(.*)$/);
    if(m){
      if(!inUl){out.push('<ul>');inUl=true;}
      var idx=liIdx++;
      var hl = hlMap[idx] || '';
      var btnOn = hl ? ' on' : '';
      var lineCls = hl ? ' hl-'+hl : '';
      var nidE = nid.replace(/'/g,"\\'");
      out.push('<li>'
        +'<button class="hl-btn'+btnOn+'" onclick="toggleHl(\''+nidE+'\','+idx+')" title="강조">★</button>'
        +'<span class="hl-line'+lineCls+'">'+m[1]+'</span>'
        +'</li>');
    } else {
      if(inUl){out.push('</ul>');inUl=false;}
      if(ln.trim()) out.push('<div>'+ln+'</div>');
    }
  });
  if(inUl)out.push('</ul>');
  return out.join('');
}

// 📢 공지 상태 (notice_state.json) — GitHub 동기화, 모든 기기 공유
//   구조: { hidden:[id,...], hl:{nid:{idx:color}}, edits:{nid:{title,body}}, manual:[{...}] }
//   notice.json (원본 AI요약)은 건드리지 않음
// ══════════════════════════════════════════════════════════════════
var NOTICE_STATE = { hidden:[], hl:{}, edits:{}, manual:[] }; // 로드 전 기본값
var NS_SHA = null;   // notice_state.json 의 GitHub sha (PUT 에 필요)
var NS_DIRTY = false; // 미저장 변경 있음
var NS_SAVE_TIMER = null;

function nsGet(){ return NOTICE_STATE; }
function nsSet(fn){
  fn(NOTICE_STATE);
  NS_DIRTY = true;
  if(NS_SAVE_TIMER) clearTimeout(NS_SAVE_TIMER);
  NS_SAVE_TIMER = setTimeout(saveNoticeState, 1200); // 1.2초 디바운스
  render();
}

// ── GitHub 읽기/쓰기 ──
async function loadNoticeState(){
  var token = getGhToken();
  try {
    var data = null, sha = null;
    if(token){
      var r = await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/notice_state.json?ref='+GH_BRANCH+'&t='+Date.now(),
        {headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}});
      if(r.ok){ var j=await r.json(); sha=j.sha; data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))); }
      else if(r.status!==404){ console.warn('notice_state 로드 실패:', r.status); }
    }
    if(!data){
      var r2=await fetch('https://raw.githubusercontent.com/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/'+GH_BRANCH+'/notice_state.json?t='+Date.now());
      if(r2.ok) data=await r2.json();
    }
    if(data){
      NOTICE_STATE = { hidden:data.hidden||[], hl:data.hl||{}, edits:data.edits||{}, manual:data.manual||[] };
      NS_SHA = sha;
    }
    render();
  } catch(e){ console.warn('notice_state 로드 오류:', e); }
}
async function saveNoticeState(){
  var token = getGhToken();
  if(!token){ console.warn('토큰 없음 — notice_state 저장 불가'); return; }
  NS_DIRTY = false;
  try {
    var payload = { message:'update notice_state.json', branch:GH_BRANCH,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(NOTICE_STATE, null, 2)))) };
    if(NS_SHA) payload.sha = NS_SHA;
    var r = await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/notice_state.json',
      {method:'PUT', headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
       body:JSON.stringify(payload)});
    if(r.ok){ var j=await r.json(); NS_SHA=j.content.sha; }
    else console.warn('notice_state 저장 실패:', r.status, await r.text());
  } catch(e){ console.warn('notice_state 저장 오류:', e); }
}

// ── 숨기기 (최대 15개, 초과 시 가장 오래된 것 삭제) ──
var HIDDEN_MAX = 15;
function hideNotice(id){
  nsSet(function(st){
    if(st.hidden.indexOf(id)===-1){
      st.hidden.push(id);
      if(st.hidden.length > HIDDEN_MAX) st.hidden = st.hidden.slice(st.hidden.length - HIDDEN_MAX);
    }
  });
}
function restoreNotice(id, overlay){
  nsSet(function(st){ st.hidden = st.hidden.filter(function(x){return x!==id;}); });
  if(overlay) overlay.remove();
}

// ── 줄 강조 ──
var HL_COLORS = ['yellow','green','red'];
function getHlMap(nid){ return (NOTICE_STATE.hl||{})[nid] || {}; }
function toggleHl(nid, idx){
  nsSet(function(st){
    var map = st.hl[nid] || {};
    var cur = map[idx] || '';
    var ci = HL_COLORS.indexOf(cur);
    var next = ci < HL_COLORS.length-1 ? HL_COLORS[ci+1] : '';
    if(next) map[idx]=next; else delete map[idx];
    if(Object.keys(map).length) st.hl[nid]=map; else delete st.hl[nid];
  });
}

// ── 전체 공지 목록 (직접작성 + AI요약, 날짜 내림차순) ──
function allNotices(){
  var st = nsGet();
  var ai = (NOTICE||[]).map(function(n){
    var nid = noticeId(n);
    var edit = (st.edits||{})[nid];
    if(edit) return Object.assign({}, n, {title:edit.title, body:edit.body, _nid:nid, _edited:true, _manual:false});
    return Object.assign({}, n, {_nid:nid, _edited:false, _manual:false});
  });
  var manual = (st.manual||[]).map(function(m,i){ return Object.assign({},m,{_nid:'manual||'+i, _manual:true, _midx:i}); });
  var merged = manual.concat(ai);
  merged.sort(function(a,b){ return (b.date||'') > (a.date||'') ? 1 : -1; });
  return merged;
}

function openHiddenNotices(){
  var st = nsGet();
  var all = allNotices();
  var hiddenItems = all.filter(function(n){ return st.hidden.indexOf(noticeId(n))!==-1 || (n._manual && st.hidden.indexOf(n._nid)!==-1); });
  if(!hiddenItems.length){ alert('숨긴 공지가 없어요.'); return; }
  var overlay = document.createElement('div');
  overlay.className = 'hidden-notice-overlay';
  overlay._mdTarget=null;
  overlay.addEventListener('mousedown',function(e){ overlay._mdTarget=e.target; });
  overlay.addEventListener('click',function(e){ if(e.target===overlay && overlay._mdTarget===overlay) overlay.remove(); });
  var box = document.createElement('div');
  box.className = 'hidden-notice-box';
  var h='<h3>🗂 숨긴 공지 보관함 ('+hiddenItems.length+'건)</h3>';
  hiddenItems.forEach(function(n){
    var id = n._manual ? n._nid : noticeId(n);
    var meta=[n.date,n.from].filter(Boolean).join(' · ');
    h+='<div class="hidden-notice-item">';
    h+='<div class="hn-title">'+esc(n.title||'(제목없음)')+'</div>';
    if(meta) h+='<div class="hn-meta">'+esc(meta)+'</div>';
    h+='<button onclick="restoreNotice(\''+id.replace(/'/g,"\\'")+'\',this.closest(\'.hidden-notice-overlay\'))">↩ 되돌리기</button>';
    h+='</div>';
  });
  box.innerHTML=h;
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

function renderNoticeBanner(){

  }
  var hidden = st.hidden||[];
  var visible = all.filter(function(n){

    return hidden.indexOf(id)===-1;
  });
  var hiddenCount = all.length - visible.length;
  var headRight = '<span class="notice-count">'+visible.length+(hiddenCount?' / '+all.length:'')+'건</span>';

      +'<button class="notice-restore-btn" style="margin-left:8px;" onclick="openManualWrite()">✏️ 직접 작성</button></div>';
  }
  var h='<div class="notice-box"><div class="notice-head"><span>📢 공지사항</span>'+headRight+'</div>';
  visible.forEach(function(n){

      h+='<button class="notice-del" onclick="openManualWrite('+n._midx+')" title="수정">✏️</button>';
    } else {
      h+='<button class="notice-del" onclick="openNoticeEdit(\''+nid.replace(/'/g,"\\'")+'\''+')" title="내용 수정">✏️</button>';
    }
    h+='<button class="notice-del" onclick="hideNotice(\''+hideId+'\')" title="숨기기">✕</button>';
    h+='</div>';
    if(n._edited) h+='<div style="font-size:10px;color:#a0813a;margin-bottom:2px;">✏️ 수정됨</div>';
    h+='<div class="notice-title">'+esc(n.title||'(제목없음)')+'</div>';
    var meta=[]; if(n.date) meta.push(esc(n.date)); if(n.from) meta.push(esc(n.from));
    if(meta.length) h+='<div class="notice-meta">'+meta.join(' · ')+'</div>';
    if(n.body) h+='<div class="notice-body">'+mdLiteNotice(n.body, nid)+'</div>';
    h+='</div>';
  });
  if(hiddenCount) h+='<button class="notice-restore-btn" onclick="openHiddenNotices()">🗂 숨긴 공지 '+hiddenCount+'건 보기 / 되돌리기</button>';
  h+='<button class="notice-restore-btn" style="margin-left:8px;" onclick="openManualWrite()">✏️ 공지 직접 작성</button>';
  h+='</div>';
  return h;
}

async function loadPfdData(){
  var token = getGhToken();
  var data=null, sha=null;
  // 1) 토큰 있으면 API에서 sha까지 받기 (실패해도 무시하고 raw로 폴백)
  if(token){
    try {
      var r=await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/'+PFD_FILE+'?ref='+GH_BRANCH+'&t='+Date.now(),
        {headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json'}});
      if(r.ok){ var j=await r.json(); sha=j.sha; data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,''))))); }
    } catch(e){ console.warn('PFD API 로드 실패, raw로 폴백',e); }
  }
  // 2) 아직 데이터 없으면 raw에서 받기 (항상 시도)
  if(!data){
    try {
      var r2=await fetch('https://raw.githubusercontent.com/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/'+GH_BRANCH+'/'+PFD_FILE+'?t='+Date.now());
      if(r2.ok) data=await r2.json();
    } catch(e){ console.warn('PFD raw 로드 실패',e); }
  }
  if(data){ PFD={eqs:data.eqs||[],sps:data.sps||[],pipes:data.pipes||[],texts:data.texts||[]}; PFD_SHA=sha; }
  PFD_LOADED=true;
  if(currentView()==='pfd') render();
}

async function savePfdData(){
  var token=getGhToken();

  if(PFD_SAVING) return;
  PFD_SAVING=true; showSyncStatus('☁️ PFD 저장 중...');
  try {
    var content=btoa(unescape(encodeURIComponent(JSON.stringify(PFD,null,2))));
    var body={message:'update '+PFD_FILE, content:content, branch:GH_BRANCH};
    if(PFD_SHA) body.sha=PFD_SHA;
    var r=await fetch('https://api.github.com/repos/'+GH_REPO_OWNER+'/'+GH_REPO_NAME+'/contents/'+PFD_FILE,
      {method:'PUT',headers:{'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){ var j=await r.json(); PFD_SHA=j.content.sha; showSyncStatus('✓ PFD 저장됨 (모든 기기 반영)'); }
    else { showSyncStatus('✕ PFD 저장 실패 '+r.status); }
